<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil deputat — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Profil complet deputat: partid, județ, comisii, activitate parlamentară, voturi.">
<meta property="og:title" content="Profil deputat — cdep.api">
<meta property="og:type" content="profile">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --purple:#553378;--purple-bg:#EDE7F4;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}

.header{border-bottom:1px solid var(--border);padding:16px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}

.container{max-width:1100px;margin:0 auto;padding:32px 24px}

.profile{display:grid;grid-template-columns:200px 1fr;gap:32px;margin-bottom:32px}
@media(max-width:700px){.profile{grid-template-columns:1fr}}
.photo{width:200px;height:240px;background:var(--bg2);border-radius:var(--radius);overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:64px;font-weight:600}
.photo img{width:100%;height:100%;object-fit:cover}
.profile-info h1{font-size:28px;font-weight:600;margin-bottom:8px}
.profile-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{font-size:12px;padding:4px 10px;border-radius:4px;font-weight:500}
.tag-party{background:var(--blue-bg);color:var(--blue-text)}
.tag-judet{background:var(--green-bg);color:var(--green-text)}
.tag-circ{background:var(--bg3);color:var(--text2)}
.tag-rol{background:var(--purple-bg);color:var(--purple)}
.bio-row{font-size:14px;color:var(--text2);margin-bottom:6px}
.bio-row strong{color:var(--text);font-weight:500}

.activitate{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:32px}
.act-card{background:var(--bg2);border-radius:var(--radius);padding:16px;text-align:center}
.act-num{font-size:28px;font-weight:600;color:var(--text);margin-bottom:4px}
.act-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px}

.section{margin-bottom:32px}
.section h2{font-size:18px;font-weight:600;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.list-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.list-item:last-child{border:none}
.rol{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;background:var(--purple-bg);color:var(--purple);margin-left:8px;font-weight:500}

.cross-links{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:14px}
.cross-link{padding:14px;background:var(--bg2);border-radius:var(--radius);text-decoration:none;color:var(--text);transition:background 0.15s}
.cross-link:hover{background:var(--bg3);text-decoration:none}
.cross-link strong{display:block;font-size:13px;margin-bottom:4px}
.cross-link span{font-size:12px;color:var(--text3)}

.loading{text-align:center;padding:60px 0;color:var(--text3);font-size:14px}
.error{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}

.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.rank-bar-row{margin-bottom:14px}
.rank-bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.rank-bar-label{font-size:13px;color:var(--text)}
.rank-bar-value{font-size:12px;font-weight:600}
.rank-bar-track{background:var(--bg3);border-radius:4px;height:7px;position:relative}
.rank-bar-fill{height:100%;border-radius:4px;opacity:0.75}
.rank-bar-median{position:absolute;top:-3px;left:50%;width:1.5px;height:13px;background:var(--border2);border-radius:1px}
.rank-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.rank-chip{background:var(--bg2);border-radius:var(--radius-sm);padding:8px 12px}
.rank-chip-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px}
.rank-chip-vals{font-size:12px;color:var(--text)}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Cdep<span> stats</span></a>
    <nav class="nav">
      <a href="avere.html">Averi</a>
      <a href="deputati-activitate.html">Activitate</a>
      <a href="interpelari-stats.html">Interpelări</a>
      <a href="proiecte-stats.html">Proiecte</a>
      <a href="partide.html">Partide</a>
      <a href="judete.html">Județe</a>
      <span style="margin-left:auto;font-size:13px;color:var(--text2)"><a href="https://endimion2k.github.io/cdep-api-poc" target="_blank" style="color:var(--blue)">cdep-api ↗</a></span>
      <span id="lang-toggle-slot" style="margin-left:4px;display:flex;align-items:center"></span>
    </nav>
  </div>
</header>

<div class="container">
  <div id="content">
    <div class="loading" data-i18n="loading">Se încarcă profilul deputatului...</div>
  </div>
</div>

<footer class="footer">
  <p><span data-i18n="data_from">Date din</span> <a href="https://cdep.ro" target="_blank">cdep.ro</a>, via CDEP API: <a href="https://github.com/Endimion2k/cdep-api-poc" target="_blank">Endimion2k/cdep-api-poc</a> · <span data-i18n="source">Sursă JSON</span>: <a id="json-link" href="#">/data/v1/deputati/legislatura-2024.json</a> · <a href="index.html" data-i18n="page_main">Înapoi la pagina principală</a></p>
</footer>

<script>
// `current_party` folosește diacritice cu sedilă (ţ/ş) — normalizăm înainte de a căuta.
const PARTY_INFO = [
  {test:'social democrat',    short:'PSD'},
  {test:'national liberal',   short:'PNL'},
  {test:'salvati romania',    short:'USR'},
  {test:'unirea romanilor',   short:'AUR'},
  {test:'democrata maghiara', short:'UDMR'},
  {test:'s.o.s',              short:'S.O.S.'},
  {test:'oamenilor tineri',   short:'POT'},
  {test:'minoritat',          short:'Minorități'},
];
// Cod partid → id pe partid.html (taxonomia paginii de profil partid).
const PARTID_ID = {PSD:'PSD', PNL:'PNL', USR:'USR', AUR:'AUR', UDMR:'UDMR', 'S.O.S.':'SOS RO', 'Minorități':'Minoritati'};

function normRo(s) {
  return (s || '')
    .replace(/[ăâ]/gi, 'a').replace(/î/gi, 'i')
    .replace(/[țţ]/gi, 't').replace(/[șş]/gi, 's')
    .toLowerCase();
}

function partyShort(name) {
  if (!name) return 'Neaf.';
  const n = normRo(name);
  for (const p of PARTY_INFO) if (n.includes(p.test)) return p.short;
  return name.length > 20 ? name.slice(0, 20) + '…' : name;
}

function fmtRON(v) {
  if (!v || v === 0) return '0 RON';
  if (v >= 1_000_000) return (v / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M RON';
  if (v >= 10_000) return Math.round(v / 1_000) + 'K RON';
  return Math.round(v).toLocaleString('ro-RO') + ' RON';
}

function fmtMP(v) {
  if (!v || v === 0) return '0 m²';
  if (v >= 1_000_000) return (v / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M m²';
  if (v >= 10_000) return Math.round(v / 1_000) + 'K m²';
  return Math.round(v).toLocaleString('ro-RO') + ' m²';
}

function renderAvereRanking(ctx) {
  if (!ctx) return '';
  const n = ctx.national.n;
  const METRICS = [
    { key: 'active',    label: 'Active lichide totale', color: 'var(--blue)' },
    { key: 'venituri',  label: 'Venituri anuale',       color: 'var(--green)' },
    { key: 'imobile',   label: 'Nr. imobile',           color: 'var(--text2)' },
    { key: 'suprafata', label: 'Suprafață totală',       color: 'var(--text2)' },
    { key: 'datorii',   label: 'Datorii',               color: 'var(--text2)' },
  ];

  const bars = METRICS.map(({ key, label, color }) => {
    const pct = ctx.national[`${key}_pct`];
    const rank = key === 'active' ? ctx.national.active_rank
               : key === 'venituri' ? ctx.national.venituri_rank : null;

    if (pct === null || pct === undefined) {
      return `<div class="rank-bar-row">
        <div class="rank-bar-header">
          <span class="rank-bar-label">${label}</span>
          <span class="rank-bar-value" style="color:var(--text3);font-style:italic">${key === 'datorii' ? 'nu figurează' : '—'}</span>
        </div>
        <div class="rank-bar-track"><div class="rank-bar-fill" style="width:0%"></div><div class="rank-bar-median"></div></div>
      </div>`;
    }

    const topPct = Math.max(1, 100 - pct);
    const rankText = rank ? ` · #${rank} din ${n}` : '';
    return `<div class="rank-bar-row">
      <div class="rank-bar-header">
        <span class="rank-bar-label">${label}</span>
        <span class="rank-bar-value" style="color:${color}">top ${topPct}%${rankText}</span>
      </div>
      <div class="rank-bar-track">
        <div class="rank-bar-fill" style="width:${pct}%;background:${color}"></div>
        <div class="rank-bar-median"></div>
      </div>
    </div>`;
  }).join('');

  const chips = [
    ctx.party && ctx.party.n >= 3
      ? `<div class="rank-chip"><div class="rank-chip-label">față de ${ctx.party.name} (${ctx.party.n} dep.)</div><div class="rank-chip-vals">active: top ${Math.max(1, 100 - ctx.party.active_pct)}% · venituri: top ${Math.max(1, 100 - ctx.party.venituri_pct)}%</div></div>`
      : '',
    ctx.age && ctx.age.n >= 3
      ? `<div class="rank-chip"><div class="rank-chip-label">față de ${ctx.age.cohort} ani (${ctx.age.n} dep.)</div><div class="rank-chip-vals">active: top ${Math.max(1, 100 - ctx.age.active_pct)}% · venituri: top ${Math.max(1, 100 - ctx.age.venituri_pct)}%</div></div>`
      : '',
    ctx.judet && ctx.judet.n >= 3
      ? `<div class="rank-chip"><div class="rank-chip-label">față de ${ctx.judet.name} (${ctx.judet.n} dep.)</div><div class="rank-chip-vals">active: top ${Math.max(1, 100 - ctx.judet.active_pct)}% · venituri: top ${Math.max(1, 100 - ctx.judet.venituri_pct)}%</div></div>`
      : '',
  ].filter(Boolean).join('');

  return `<div class="section">
    <h2>Ranking național <span style="font-weight:400;color:var(--text3);font-size:13px">· ${n} deputați cu declarație</span></h2>
    <div>${bars}</div>
    ${chips ? `<div class="rank-chips">${chips}</div>` : ''}
  </div>`;
}

function renderAvere(avere, ctx = null) {
  if (!avere?.data?.declaratii?.length) return '';
  const decl = avere.data.declaratii[avere.data.declaratii.length - 1];

  // ── Section 1: Stat cards ────────────────────────────────────────────────
  const cardDefs = [
    { num: fmtRON(decl.total_active_monetare_ron), lbl: 'Total active' },
    { num: fmtRON(decl.avere_neta_ron), lbl: 'Avere netă', red: (decl.avere_neta_ron || 0) < 0 },
    { num: (decl.terenuri_count || 0) + (decl.cladiri_count || 0), lbl: 'Nr. imobile' },
    { num: fmtMP(decl.suprafata_total_mp), lbl: 'Suprafață totală' },
    { num: fmtRON(decl.venituri_anuale_ron), lbl: 'Venituri anuale' },
    { num: fmtRON(decl.conturi_total_ron), lbl: 'Conturi bancare' },
    ...((decl.bijuterii_total_ron || 0) > 0 ? [{ num: fmtRON(decl.bijuterii_total_ron), lbl: 'Bijuterii / artă' }] : []),
    { num: decl.auto_count || 0, lbl: 'Vehicule' },
  ];
  const cardsHtml = cardDefs.map(c => `
    <div class="act-card">
      <div class="act-num"${c.red ? ' style="color:var(--red-text)"' : ''}>${c.num}</div>
      <div class="act-lbl">${c.lbl}</div>
    </div>`).join('');

  const meta = [
    decl.an_prima_proprietate ? `Prima proprietate: ${decl.an_prima_proprietate}` : '',
    (decl.nr_judete || 0) > 0 ? `${decl.nr_judete} județe` : '',
    (decl.nr_companii || 0) > 0 ? `${decl.nr_companii} companii` : '',
  ].filter(Boolean).join(' · ');

  const sec1 = `
    <div class="section">
      <h2>Declarație de avere <span style="font-weight:400;color:var(--text3);font-size:14px">· ${decl.data_depunere || ''} · <a href="${decl.pdf_url || '#'}" target="_blank" rel="noopener">PDF ↗</a></span></h2>
      <div class="activitate">${cardsHtml}</div>
      ${meta ? `<div style="font-size:13px;color:var(--text3);margin-top:8px">${meta}</div>` : ''}
    </div>`;

  // ── Section 2: Imobile by category ───────────────────────────────────────
  const nrImobile = (decl.terenuri_count || 0) + (decl.cladiri_count || 0);
  const CAT_LABEL = {
    forestier: 'Terenuri forestiere', agricol: 'Terenuri agricole',
    extravilan: 'Terenuri extravilane', intravilan: 'Terenuri intravilane',
    luciu_apa: 'Luciu de apă', locuinta: 'Clădiri — locuință',
    apartament: 'Clădiri — apartament', comercial: 'Clădiri — comerciale',
    vacanta: 'Clădiri — vacanță', alte_cladiri: 'Clădiri — alte categorii',
    necunoscuta: 'Imobile — categorie necunoscută',
  };
  let sec2 = '';
  if (nrImobile > 0) {
    const catMap = {};
    for (const im of (decl.imobile_detaliate || [])) {
      const cat = im.categorie || 'necunoscuta';
      if (!catMap[cat]) catMap[cat] = { count: 0, mp: 0 };
      catMap[cat].count++;
      catMap[cat].mp += im.suprafata_mp || 0;
    }
    const imRows = Object.entries(catMap)
      .sort((a, b) => b[1].mp - a[1].mp)
      .map(([cat, { count, mp }]) => `
        <div class="list-item" style="display:flex;align-items:baseline;gap:8px">
          <span>${CAT_LABEL[cat] || cat}</span>
          <span style="color:var(--text3);font-size:13px">${count} parcel${count === 1 ? 'ă' : 'e'}</span>
          <span style="margin-left:auto;font-size:13px;color:var(--text2)">${fmtMP(mp)}</span>
        </div>`).join('');
    const judetNote = (decl.nr_judete || 0) > 0
      ? `<div style="font-size:13px;color:var(--text3);margin-top:8px">Județe: ${decl.nr_judete}</div>` : '';
    sec2 = `
      <div class="section">
        <h2>Imobile (${nrImobile})</h2>
        ${imRows}
        ${judetNote}
      </div>`;
  }

  // ── Section 3: Vehicule ───────────────────────────────────────────────────
  let sec3 = '';
  if ((decl.vehicule || []).length > 0) {
    const vRows = decl.vehicule.map(v => `
      <div class="list-item" style="display:flex;align-items:baseline;gap:8px">
        <span>${v.natura || '—'}</span>
        ${v.marca ? `<span style="color:var(--text3);font-size:13px">${v.marca}</span>` : ''}
        ${v.an_fabricatie ? `<span style="margin-left:auto;font-size:13px;color:var(--text3)">${v.an_fabricatie}</span>` : ''}
      </div>`).join('');
    sec3 = `
      <div class="section">
        <h2>Vehicule (${decl.vehicule.length})</h2>
        ${vRows}
      </div>`;
  }

  // ── Section 4: Plasamente ─────────────────────────────────────────────────
  let sec4 = '';
  if ((decl.plasamente_detaliate || []).length > 0) {
    const TIP = { imprumut: 'Împrumut', actiuni: 'Acțiuni', parti_sociale: 'Părți sociale', titluri_stat: 'Titluri stat' };
    const pRows = decl.plasamente_detaliate.map(p => `
      <div class="list-item" style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <span>${p.emitent || '—'}</span>
        ${p.tip ? `<span style="font-size:11px;padding:2px 8px;border-radius:3px;background:var(--bg3);color:var(--text2)">${TIP[p.tip] || p.tip}</span>` : ''}
        <span style="margin-left:auto;font-size:13px;color:var(--text2)">${fmtRON(p.valoare_ron)}</span>
      </div>`).join('');
    sec4 = `
      <div class="section">
        <h2>Plasamente &amp; investiții (${decl.plasamente_detaliate.length})</h2>
        ${pRows}
      </div>`;
  }

  // ── Section 5: Bunuri înstrăinate ─────────────────────────────────────────
  let sec5 = '';
  if ((decl.bunuri_instrainate_count || 0) > 0) {
    sec5 = `
      <div class="section">
        <h2>Bunuri înstrăinate în ultimele 12 luni (${decl.bunuri_instrainate_count})</h2>
        <div class="list-item" style="display:flex;justify-content:space-between">
          <span>${decl.bunuri_instrainate_count} bunuri</span>
          <span style="font-size:13px;color:var(--text2)">total ${fmtRON(decl.bunuri_instrainate_total_ron)}</span>
        </div>
      </div>`;
  }

  return sec1 + renderAvereRanking(ctx) + sec2 + sec3 + sec4 + sec5;
}

function getParam(name) {
  const url = new URL(window.location);
  return url.searchParams.get(name);
}

async function loadDeputat() {
  const id = getParam('id') || getParam('idm');
  const leg = getParam('leg') || '2024';
  if (!id) {
    showError('Parametru lipsă. Folosește URL: <code>deputat.html?id=189</code>');
    return;
  }

  const jsonUrl = `data/v1/deputati/legislatura-${leg}.json`;
  document.getElementById('json-link').href = jsonUrl;
  document.getElementById('json-link').textContent = jsonUrl;

  let dep, allInterpelari, allMotiuni, avereResp, avereCtx = null;
  try {
    const [depResp, intResp, motResp, avereJson, ctxJson, corrJson] = await Promise.all([
      fetch(jsonUrl).then(r => r.json()),
      fetch(`data/v1/interpelari/legislatura-${leg}.json`).then(r => r.json()).catch(() => null),
      fetch(`data/v1/motiuni/legislatura-${leg}.json`).then(r => r.json()).catch(() => null),
      fetch(`data/v1/declaratii-avere/legislatura-${leg}/${parseInt(id)}.json`).then(r => r.json()).catch(() => null),
      fetch(`data/v1/stats/avere-context-${leg}.json`).then(r => r.json()).catch(() => null),
      fetch(`data/v1/correspondence/monitorul_idm_lookup.json`).then(r => r.json()).catch(() => null),
    ]);
    avereResp = avereJson;
    avereCtx = ctxJson?.deputies?.[String(parseInt(id))] ?? null;
    const idNum = parseInt(id);
    const monitorulUrl = corrJson?.[`${idNum}_${leg}`]?.monitorul_url ?? null;
    dep = depResp.data.find(d => d.cdep_idm === idNum);
    allInterpelari = intResp?.data || [];
    allMotiuni = motResp?.data || [];
  } catch (e) {
    showError('Eroare la încărcarea datelor: ' + e.message);
    return;
  }

  if (!dep) {
    showError(`Deputatul cu id=${id} nu a fost găsit în legislatura ${leg}.`);
    return;
  }

  document.title = `${dep.name} — Camera Deputaților`;

  const partid = partyShort(dep.current_party);
  const initials = (dep.name || '?').split(/\s+/).filter(Boolean).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  const photoBlock = dep.image
    ? `<img src="${dep.image}" alt="${dep.name}" onerror="this.parentNode.innerHTML='${initials}'">`
    : initials;

  const pid = PARTID_ID[partid];
  const partyTag = pid
    ? `<a class="tag tag-party" style="text-decoration:none" href="partid.html?id=${encodeURIComponent(pid)}&leg=${leg}">${partid}</a>`
    : `<span class="tag tag-party">${partid}</span>`;
  const tags = [
    partyTag,
    dep.judet ? `<a class="tag tag-judet" style="text-decoration:none" href="judete.html">${dep.judet}</a>` : '',
    dep.circumscriptie ? `<span class="tag tag-circ">circ. ${dep.circumscriptie}</span>` : '',
    dep.group_role && dep.group_role !== 'Membru' ? `<span class="tag tag-rol">${dep.group_role}</span>` : '',
  ].filter(Boolean).join('');

  // Cross-link counts: interpelări + moțiuni semnate
  const cid = dep.id;
  const myInterpelari = allInterpelari.filter(i => i.adresant_canonical_id === cid);
  const mySemnaturi = allMotiuni.filter(m => (m.semnatari || []).some(s => s.canonical_id === cid));

  const comisiiHtml = (dep.comisii || []).map(c => `
    <div class="list-item">
      ${c.comisia} <span style="color:var(--text3)">(${c.tip})</span>
      ${c.rol && c.rol !== 'Membru' ? `<span class="rol">${c.rol}</span>` : ''}
    </div>
  `).join('') || '<div style="color:var(--text3);padding:14px 0">Nicio comisie listată.</div>';

  const delegatiiHtml = (dep.delegatii || []).map(d => `<div class="list-item">${d}</div>`).join('');
  const grupuriHtml = (dep.grupuri_prietenie || []).map(g => `<div class="list-item">${g}</div>`).join('');

  document.getElementById('content').innerHTML = `
    <div class="profile">
      <div class="photo">${photoBlock}</div>
      <div class="profile-info">
        <h1>${dep.name}</h1>
        <div class="profile-meta">${tags}</div>
        <div class="bio-row"><strong data-i18n="party">Partid</strong>: ${dep.current_party || '(fără partid)'}</div>
        <div class="bio-row"><strong data-i18n="group">Grup parlamentar</strong>: ${dep.current_group || '-'}</div>
        ${dep.birth_date ? `<div class="bio-row"><strong>Data nașterii:</strong> ${dep.birth_date}</div>` : ''}
        ${dep.data_validare ? `<div class="bio-row"><strong>Validat:</strong> ${dep.data_validare} · ${dep.hcd_validare || ''}</div>` : ''}
        ${dep.birou_parlamentar ? `<div class="bio-row"><strong>Birou parlamentar:</strong> ${dep.birou_parlamentar}</div>` : ''}
        <div class="bio-row" style="margin-top:12px"><a href="${dep.profile_url}" target="_blank"><span data-i18n="profile_official">Profil oficial cdep.ro</span> ↗</a></div>
        ${monitorulUrl ? `<div class="bio-row"><a href="${monitorulUrl}" target="_blank" rel="noopener"><span data-i18n="profile_monitorul">Profil monitorul.ai</span> ↗</a></div>` : ''}
      </div>
    </div>

    <div class="activitate">
      <div class="act-card"><div class="act-num">${dep.activitate_sedinte || 0}</div><div class="act-lbl">Ședințe</div></div>
      <div class="act-card"><div class="act-num">${dep.activitate_luari_cuvant || 0}</div><div class="act-lbl">Luări de cuvânt</div></div>
      <div class="act-card"><div class="act-num">${dep.activitate_propuneri_legislative || 0}</div><div class="act-lbl">Propuneri legislative</div></div>
      <div class="act-card"><div class="act-num">${dep.activitate_legi_promulgate || 0}</div><div class="act-lbl">Legi promulgate</div></div>
      <div class="act-card"><div class="act-num">${dep.activitate_intrebari_interpelari || 0}</div><div class="act-lbl">Întrebări/Interpelări</div></div>
      <div class="act-card"><div class="act-num">${dep.activitate_declaratii_politice || 0}</div><div class="act-lbl">Declarații politice</div></div>
    </div>

    <div class="section">
      <h2><span data-i18n="committees">Comisii</span> (${(dep.comisii || []).length})</h2>
      ${comisiiHtml}
    </div>

    ${delegatiiHtml ? `<div class="section"><h2><span data-i18n="delegations">Delegații</span> (${dep.delegatii.length})</h2>${delegatiiHtml}</div>` : ''}
    ${grupuriHtml ? `<div class="section"><h2><span data-i18n="friendship_groups">Grupuri de prietenie</span> (${dep.grupuri_prietenie.length})</h2>${grupuriHtml}</div>` : ''}

    <div class="section">
      <h2 data-i18n="activity">Activitate cross-endpoint</h2>
      <div class="cross-links">
        <a class="cross-link" href="search.html?q=${encodeURIComponent(dep.name)}">
          <strong data-i18n="hero_btn_search">Caută în date</strong>
          <span>Pagefind search</span>
        </a>
        ${myInterpelari.length > 0 ? `
        <a class="cross-link" href="search.html?q=${encodeURIComponent(dep.name)}">
          <strong>${myInterpelari.length} <span data-i18n="interpellations_addressed">interpelări adresate</span></strong>
          <span data-i18n="addressed_to">Adresate de acest deputat</span>
        </a>` : ''}
        ${mySemnaturi.length > 0 ? `
        <a class="cross-link" href="search.html?q=${encodeURIComponent(dep.name)}">
          <strong>${mySemnaturi.length} <span data-i18n="motions_signed">moțiuni semnate</span></strong>
          <span data-i18n="with_signature">Cu semnătura acestui deputat</span>
        </a>` : ''}
        <a class="cross-link" href="${jsonUrl}">
          <strong data-i18n="raw_json">Date raw JSON</strong>
          <span data-i18n="full_profile">Profil complet în format API</span>
        </a>
      </div>
    </div>
    ${renderAvere(avereResp, avereCtx)}
  `;
  if (typeof applyI18n === 'function') applyI18n();
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="error">${msg}</div>`;
}

loadDeputat();
</script>
<script src="i18n.js"></script>

</body>
</html>
