<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activitate parlamentară — vizualizare · Camera Deputaților</title>
<meta name="description" content="Fiecare deputat ca un cerc — mărimea proporțională cu activitatea parlamentară selectată.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}

.toolbar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 0}
.toolbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.view-btn{padding:5px 12px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}
.view-btn:disabled{opacity:0.4;cursor:not-allowed}
.metric-select{font-size:13px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer;flex-shrink:0}
.party-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.party-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 4px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);font-size:11px;cursor:pointer;user-select:none;transition:opacity .15s}
.party-chip img{width:14px;height:14px;object-fit:contain;border-radius:2px;flex-shrink:0}
.party-chip.off{opacity:0.3}
.search-input{font-size:13px;padding:5px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);width:160px;flex-shrink:0}
.count-badge{font-size:12px;color:var(--text3);white-space:nowrap;margin-left:auto}

.main{max-width:1200px;margin:0 auto;padding:20px 24px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:20px}

.circle-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:8px 0}
.dep-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;text-decoration:none;color:inherit}
.dep-item:hover .dep-circle{opacity:0.82}
.dep-circle{border-radius:50%;overflow:visible;position:relative;flex-shrink:0;transition:width .25s,height .25s}
.dep-circle-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;position:relative}
.dep-circle-inner img{width:100%;height:100%;object-fit:cover;display:block}
.dep-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;border-radius:50%;font-size:inherit}
.dep-badge{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:9px;color:#fff;font-weight:700;white-space:nowrap;pointer-events:none;line-height:1.4}
.dep-badge img{width:10px;height:10px;object-fit:contain;flex-shrink:0}
.dep-name{font-size:9px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;line-height:1.3}
.dep-value{font-size:8px;color:var(--text3);text-align:center;line-height:1.3}
.dep-item.zero-val .dep-circle-inner{opacity:0.4}

.tooltip{position:fixed;z-index:100;background:rgba(0,0,0,.82);color:#fff;font-size:12px;padding:7px 10px;border-radius:6px;pointer-events:none;max-width:240px;line-height:1.5;display:none}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.dep-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dep-table{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
.dep-table thead th{padding:9px 10px;background:var(--bg2);border-bottom:2px solid var(--border);font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;user-select:none;text-align:left}
.dep-table thead th.sort-active{color:var(--blue);border-bottom-color:var(--blue)}
.dep-table thead th.sort-name{cursor:default;min-width:160px;position:sticky;left:0;z-index:1;background:var(--bg2)}
.dep-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
.dep-table tbody tr:hover{background:var(--bg2)}
.dep-table tbody td{padding:6px 10px;vertical-align:middle}
.dep-table td.td-name{position:sticky;left:0;background:var(--bg);white-space:nowrap;z-index:1}
.dep-table tbody tr:hover td.td-name{background:var(--bg2)}
.bar-cell-val{font-size:11px;margin-bottom:3px;font-variant-numeric:tabular-nums}
.bar-cell-track{height:3px;background:var(--bg3);border-radius:2px;width:80px}
.bar-cell-fill{height:100%;border-radius:2px;opacity:0.75}
.dep-table .null-val{color:var(--text3);font-style:italic;font-size:11px}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">cdep<span>-api</span> <em>stats</em></a>
    <nav class="nav">
      <a href="avere.html">Averi</a>
      <a href="deputati-avere.html">Averi++</a>
      <a href="deputati-activitate.html" class="active">Activitate</a>
      <a href="interpelari-stats.html">Interpelări</a>
      <a href="proiecte-stats.html">Proiecte</a>
      <!-- <a href="search.html" data-i18n="search">Caută</a> -->
      <span id="lang-toggle-slot" style="margin-left:4px;display:flex;align-items:center"></span>
    </nav>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="view-toggle" id="leg-toggle"></div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-circles">⬤ Cercuri</button>
      <button class="view-btn" id="btn-table">≡ Tabel</button>
    </div>
    <select class="metric-select" id="metric-select">
      <option value="activitate_sedinte">Ședințe (prezență)</option>
      <option value="activitate_luari_cuvant">Luări de cuvânt</option>
      <option value="activitate_propuneri_legislative">Propuneri legislative</option>
      <option value="activitate_legi_promulgate">Legi promulgate</option>
      <option value="activitate_declaratii_politice">Declarații politice</option>
      <option value="activitate_intrebari_interpelari">Întrebări / interpelări</option>
    </select>
    <div class="party-chips" id="party-chips"></div>
    <input class="search-input" id="search-input" type="text" placeholder="Caută deputat…"
           data-i18n-attr="placeholder:search_deputies">
    <span class="count-badge" id="count-badge"></span>
  </div>
</div>

<div class="main">
  <h1>Activitate parlamentară</h1>
  <p class="sub" id="page-sub">Fiecare cerc = un deputat · mărimea = metrica selectată</p>
  <div id="circle-grid" class="circle-grid">
    <div class="loading" data-i18n="loading">Se încarcă…</div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<footer class="footer">
  <p><span data-i18n="data_from">Date din</span> <a href="https://cdep.ro" target="_blank">cdep.ro</a>, via CDEP API: <a href="https://github.com/Endimion2k/cdep-api-poc" target="_blank">Endimion2k/cdep-api-poc</a> ·
  <span data-i18n="source">Sursă JSON</span>: <a id="json-link" href="#">activitate-deputies.json</a> ·
  <a href="index.html" data-i18n="page_main">Pagina principală</a></p>
</footer>

<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/stats/activitate-deputies-${LEG}.json`;

document.getElementById('json-link').href = DATA_URL;
document.getElementById('json-link').textContent = `activitate-deputies-${LEG}.json`;

// Leg toggle
(function(){
  document.getElementById('leg-toggle').innerHTML = [2024,2020].map(l =>
    `<button class="view-btn${l===LEG?' active':''}" onclick="location.href='deputati-activitate.html?leg=${l}'">${l}</button>`
  ).join('');
})();

const METRIC_LABELS = {
  activitate_sedinte: 'Ședințe',
  activitate_luari_cuvant: 'Luări de cuvânt',
  activitate_propuneri_legislative: 'Propuneri legislative',
  activitate_legi_promulgate: 'Legi promulgate',
  activitate_declaratii_politice: 'Declarații politice',
  activitate_intrebari_interpelari: 'Întrebări/interpelări',
};

const PARTY_COLORS = {
  'PSD':'#185FA5','PNL':'#993C1D','USR':'#3B6D11','AUR':'#854F0B',
  'UDMR':'#5F5E5A','SOSRO':'#A32D2D','POT':'#553378','PMP':'#6D5A9E',
  'Neafiliat':'#777',
};
function partyColor(p){return PARTY_COLORS[p]||'#777';}

function fmtVal(v){
  if(v==null||v===0)return '0';
  return v.toLocaleString('ro-RO');
}

function circleSize(v,maxV){
  if(!v||maxV<=0)return 12;
  return Math.round(Math.max(12,Math.min(68,12+56*Math.sqrt(v/maxV))));
}

function initials(name){
  const parts=name.split(/[\s,]+/).filter(Boolean);
  if(parts.length>=2)return(parts[0][0]+parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

let ALL=[],PARTIES={},activeParties=new Set(),query='',metric='activitate_sedinte';
let viewMode='circles', sortKey=null, sortDir='desc';

const COLUMNS=[
  {key:'activitate_sedinte',               label:'Ședințe',    fmt:v=>fmtVal(v)},
  {key:'activitate_luari_cuvant',          label:'Cuvânt',     fmt:v=>fmtVal(v)},
  {key:'activitate_propuneri_legislative', label:'Propuneri',  fmt:v=>fmtVal(v)},
  {key:'activitate_legi_promulgate',       label:'Legi',       fmt:v=>fmtVal(v)},
  {key:'activitate_declaratii_politice',   label:'Declarații', fmt:v=>fmtVal(v)},
  {key:'activitate_intrebari_interpelari', label:'Întrebări',  fmt:v=>fmtVal(v)},
];

function filtered(){
  return ALL.filter(d=>activeParties.has(d.partid)&&(!query||d.name.toLowerCase().includes(query)));
}
function sorted(deps){
  return[...deps].sort((a,b)=>(b[metric]||0)-(a[metric]||0));
}

function renderTable(){
  const deps=filtered();
  if(!deps.length)return'<p style="color:var(--text3);padding:40px 0">Niciun deputat.</p>';

  const sk=sortKey||COLUMNS[0].key;
  const rows=[...deps].sort((a,b)=>{
    const av=a[sk]??null,bv=b[sk]??null;
    if(av===null&&bv===null)return 0;
    if(av===null)return 1;
    if(bv===null)return-1;
    return sortDir==='asc'?av-bv:bv-av;
  });

  const maxes=Object.fromEntries(COLUMNS.map(c=>[c.key,Math.max(0,...deps.map(d=>Math.abs(d[c.key]??0)))]));

  const headers=COLUMNS.map(c=>{
    const active=c.key===sk;
    const arrow=active?(sortDir==='desc'?' ↓':' ↑'):'';
    return`<th class="dep-table-th${active?' sort-active':''}" data-sort="${c.key}" style="min-width:90px">${c.label}${arrow}</th>`;
  }).join('');

  const bodyRows=rows.map(d=>{
    const url=`deputat.html?id=${d.cdep_idm}&leg=${LEG}`;
    const color=partyColor(d.partid);
    const logo=PARTIES[d.partid];
    const ini=initials(d.name);
    const shortName=d.name.split(',')[0].trim();
    const photoHtml=d.image
      ?`<img src="${d.image}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0"><div style="display:none;width:28px;height:28px;border-radius:50%;background:${color};align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${ini}</div>`
      :`<div style="width:28px;height:28px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${ini}</div>`;
    const badgeImg=logo?`<img src="data/assets/imagini/partide/${logo}" onerror="this.style.display='none'" style="width:10px;height:10px;object-fit:contain;margin-right:2px;vertical-align:middle">`:'';

    const cells=COLUMNS.map(c=>{
      const v=d[c.key];
      const active=c.key===sk;
      if(v==null)return`<td class="dep-table-td"><span class="null-val">—</span></td>`;
      const mx=maxes[c.key];
      const barW=mx>0?Math.min(100,Math.abs(v)/mx*100).toFixed(1):0;
      const valColor=active?'var(--blue)':'var(--text2)';
      const fillColor=active?'var(--blue)':'var(--border2)';
      return`<td class="dep-table-td">
        <div class="bar-cell-val" style="color:${valColor}">${c.fmt(v)}</div>
        <div class="bar-cell-track"><div class="bar-cell-fill" style="width:${barW}%;background:${fillColor}"></div></div>
      </td>`;
    }).join('');

    return`<tr class="dep-table-row" onclick="location.href='${url}'">
      <td class="dep-table-td td-name">
        <div style="display:flex;align-items:center;gap:8px">
          ${photoHtml}
          <div>
            <div style="font-size:12px;color:var(--text);font-weight:500">${shortName}</div>
            <span style="font-size:10px;padding:1px 5px;border-radius:3px;background:${color}22;color:${color}">${badgeImg}${d.partid}</span>
          </div>
        </div>
      </td>${cells}
    </tr>`;
  }).join('');

  return`<div class="dep-table-wrap">
    <table class="dep-table">
      <thead><tr>
        <th class="dep-table-th sort-name">Deputat</th>${headers}
      </tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>`;
}

function render(){
  const unfiltered=filtered();
  document.getElementById('count-badge').textContent=unfiltered.length+' deputați';
  const grid=document.getElementById('circle-grid');

  if(viewMode==='table'){
    document.getElementById('page-sub').textContent='';
    grid.innerHTML=renderTable();
    return;
  }

  document.getElementById('page-sub').textContent=
    `Fiecare cerc = un deputat · ${METRIC_LABELS[metric]||metric} · legislatura ${LEG}`;
  const deps=sorted(unfiltered);
  const vals=deps.map(d=>d[metric]||0).filter(v=>v>0);
  const maxV=vals.length?Math.max(...vals):1;

  if(!deps.length){grid.innerHTML='<p style="color:var(--text3);padding:40px 0">Niciun deputat.</p>';return;}

  grid.innerHTML=deps.map(d=>{
    const v=d[metric]||0;
    const sz=circleSize(v,maxV);
    const color=partyColor(d.partid);
    const logo=PARTIES[d.partid];
    const showBadge=sz>=14;
    const profileUrl=`deputat.html?id=${d.cdep_idm}&leg=${LEG}`;
    const fontSize=Math.max(8,Math.round(sz*0.3));

    const badgeHtml=showBadge?(logo
      ?`<span class="dep-badge" style="background:${color}"><img src="data/assets/imagini/partide/${logo}" onerror="this.style.display='none'" alt="">${d.partid}</span>`
      :`<span class="dep-badge" style="background:${color}">${d.partid}</span>`):'';

    const circleInner=d.image
      ?`<img src="${d.image}" alt="${d.name.replace(/"/g,'&quot;')}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="dep-initials" style="font-size:${fontSize}px;background:${color};display:none">${initials(d.name)}</div>`
      :`<div class="dep-initials" style="font-size:${fontSize}px;background:${color}">${initials(d.name)}</div>`;

    return`<a class="dep-item${v===0?' zero-val':''}"
              href="${profileUrl}"
              data-name="${d.name.replace(/"/g,'&quot;')}"
              data-value="${v}" data-partid="${d.partid}">
      <div class="dep-circle" style="width:${sz}px;height:${sz}px">
        <div class="dep-circle-inner" style="width:${sz}px;height:${sz}px">${circleInner}</div>
        ${badgeHtml}
      </div>
      <div class="dep-name" style="max-width:${sz+8}px">${d.name.split(',')[0].trim()}</div>
      <div class="dep-value">${fmtVal(v)}</div>
    </a>`;
  }).join('');
}

function buildChips(partids){
  document.getElementById('party-chips').innerHTML=partids.map(p=>{
    const logo=PARTIES[p],color=partyColor(p);
    const img=logo
      ?`<img src="data/assets/imagini/partide/${logo}" onerror="this.style.display='none'" alt="">`
      :`<span style="width:10px;height:10px;border-radius:2px;background:${color};display:inline-block;flex-shrink:0"></span>`;
    return`<span class="party-chip" data-partid="${p}" onclick="toggleParty('${p}')">${img}${p}</span>`;
  }).join('');
}

function toggleParty(p){
  if(activeParties.has(p))activeParties.delete(p); else activeParties.add(p);
  document.querySelectorAll('.party-chip').forEach(el=>el.classList.toggle('off',!activeParties.has(el.dataset.partid)));
  render();
}

const tooltip=document.getElementById('tooltip');
document.addEventListener('mouseover',e=>{
  const item=e.target.closest('.dep-item');
  if(!item){tooltip.style.display='none';return;}
  tooltip.textContent=`${item.dataset.name} · ${item.dataset.partid} · ${METRIC_LABELS[metric]||metric}: ${Number(item.dataset.value).toLocaleString('ro-RO')}`;
  tooltip.style.display='block';
});
document.addEventListener('mousemove',e=>{tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-32)+'px';});
document.addEventListener('mouseout',e=>{if(!e.target.closest('.dep-item'))tooltip.style.display='none';});

async function load(){
  try{
    const res=await fetch(DATA_URL);
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    ALL=data.deputies; PARTIES=data.parties||{};
    const counts={};
    ALL.forEach(d=>counts[d.partid]=(counts[d.partid]||0)+1);
    const partids=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
    activeParties=new Set(partids);
    buildChips(partids);
    render();
  }catch(e){
    document.getElementById('circle-grid').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Rulează <code>python scripts/build_activitate_deputies.py --leg ${LEG}</code>.</div>`;
  }
}

document.getElementById('metric-select').addEventListener('change',e=>{metric=e.target.value;render();});
document.getElementById('search-input').addEventListener('input',e=>{query=e.target.value.toLowerCase().trim();render();});

document.getElementById('btn-circles').addEventListener('click',()=>{
  if(viewMode==='circles')return;
  viewMode='circles';
  document.getElementById('btn-circles').classList.add('active');
  document.getElementById('btn-table').classList.remove('active');
  document.getElementById('metric-select').style.display='';
  const metricKeys=COLUMNS.map(c=>c.key);
  if(sortKey&&metricKeys.includes(sortKey)){
    metric=sortKey;
    document.getElementById('metric-select').value=metric;
  }
  render();
});

document.getElementById('btn-table').addEventListener('click',()=>{
  if(viewMode==='table')return;
  viewMode='table';
  document.getElementById('btn-table').classList.add('active');
  document.getElementById('btn-circles').classList.remove('active');
  document.getElementById('metric-select').style.display='none';
  if(!sortKey)sortKey=metric;
  render();
});

document.getElementById('circle-grid').addEventListener('click',e=>{
  const th=e.target.closest('[data-sort]');
  if(!th)return;
  const key=th.dataset.sort;
  if(sortKey===key){
    if(sortDir==='desc')sortDir='asc';
    else{sortKey=null;sortDir='desc';}
  }else{sortKey=key;sortDir='desc';}
  render();
});

load();
</script>
<script src="i18n.js"></script>
</body>
</html>
