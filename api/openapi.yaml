openapi: 3.0.3
info:
  title: Camera Deputaților — API Deschis
  description: |
    API REST public pentru datele Camerei Deputaților din România.

    Această specificație descrie atât **endpoint-urile implementate** (servite ca
    fișiere JSON statice prin GitHub Pages, scraped automat din cdep.ro), cât și
    **propunerile de extindere** (servite de Camera Deputaților după adopție).

    Datele sunt deja publice pe [cdep.ro](https://www.cdep.ro) — acest API le
    expune într-un format structurat, machine-readable, accesibil oricărui
    developer, jurnalist sau cetățean.

    **Autor propunere:** Cătălin Popa — Candidat Internship Camera Deputaților, Ed. I/2026

    **Sursă date:** www.cdep.ro (date publice)

    **Licență:** Open Government License v3.0

    **Repository:** [github.com/Endimion2k/cdep-api-poc](https://github.com/Endimion2k/cdep-api-poc)

    **Search full-text:** [/search](https://endimion2k.github.io/cdep-api-poc/search.html) (Pagefind, ~14k entități)
  version: "1.0.0-poc"
  contact:
    name: Propunere internship
    url: https://github.com/Endimion2k/cdep-api-poc
  license:
    name: Open Government License v3.0
    url: https://www.nationalarchives.gov.uk/doc/open-government-licence/version/3/

servers:
  - url: https://endimion2k.github.io/cdep-api-poc/data/v1
    description: POC live (GitHub Pages, fișiere JSON statice)
  - url: https://cdep.ro/api/v1
    description: Server propus (după adopție de către Camera Deputaților)

tags:
  - name: Deputați
    description: Membrii Camerei Deputaților, biografii, comisii, activitate
  - name: Voturi
    description: Voturi electronice în plen — agregate și defalcare nominală
  - name: Sancțiuni
    description: Sancțiuni disciplinare aplicate deputaților
  - name: Interpelări
    description: Interpelări și întrebări parlamentare adresate Guvernului
  - name: Comisii
    description: Comisii parlamentare (permanente, speciale comune) cu lista membrilor
  - name: Proiecte
    description: Proiecte legislative cu stadiu, inițiator, timeline, voturi
  - name: Propuse
    description: Endpoint-uri propuse, încă neimplementate

paths:
  /deputati/legislatura-{legislatura}.json:
    get:
      tags: [Deputați]
      summary: Listă deputați (legislatura completă)
      description: |
        Returnează toți deputații dintr-o legislatură, cu profile complete:
        biografie, comisii, delegații, contoare de activitate.
      parameters:
        - name: legislatura
          in: path
          required: true
          description: Anul de start al legislaturii
          schema:
            type: integer
            enum: [2016, 2020, 2024]
            example: 2024
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeputatiResponse"

  /voturi/{legislatura}/_index.json:
    get:
      tags: [Voturi]
      summary: Index voturi
      description: |
        Listă agregată a tuturor voturilor electronice din plen pentru o legislatură.
        Conține metadate (data, descriere, counts) — fără defalcare nominală.
      parameters:
        - name: legislatura
          in: path
          required: true
          schema:
            type: integer
            example: 2024
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoturiIndexResponse"

  /voturi/{legislatura}/{idv}.json:
    get:
      tags: [Voturi]
      summary: Detalii vot (cu defalcare nominală)
      description: |
        Returnează un vot specific, cu lista completă a deputaților și opțiunile lor
        (DA / NU / abținere / nu au votat).
      parameters:
        - name: legislatura
          in: path
          required: true
          schema:
            type: integer
            example: 2024
        - name: idv
          in: path
          required: true
          description: ID votului (cdep_idv)
          schema:
            type: integer
            example: 36892
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteEvent"
        "404":
          description: Vot inexistent

  /sanctiuni/legislatura-{legislatura}.json:
    get:
      tags: [Sancțiuni]
      summary: Sancțiuni disciplinare
      description: |
        Listă de sancțiuni aplicate deputaților (diminuare indemnizație, avertismente,
        chemări la ordine, retragere cuvânt).
      parameters:
        - name: legislatura
          in: path
          required: true
          schema:
            type: integer
            example: 2024
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SanctiuniResponse"

  /interpelari/legislatura-{legislatura}.json:
    get:
      tags: [Interpelări]
      summary: Interpelări și întrebări parlamentare
      description: |
        Listă de interpelări și întrebări adresate de deputați Guvernului sau
        ministerelor, cu informații despre răspuns dacă a fost primit.
      parameters:
        - name: legislatura
          in: path
          required: true
          schema:
            type: integer
            example: 2024
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterpelariResponse"

  /comisii/legislatura-{legislatura}.json:
    get:
      tags: [Comisii]
      summary: Lista comisiilor parlamentare
      description: |
        Lista comisiilor permanente și speciale comune ale Camerei Deputaților,
        cu membrii și conducerea fiecăreia.

        **Sursa**: agregat derivat din `/deputati/legislatura-{legislatura}.json`
        — datele despre apartenența la comisii sunt incluse în profilurile deputaților.
      parameters:
        - name: legislatura
          in: path
          required: true
          schema:
            type: integer
            example: 2024
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComisiiResponse"

  /proiecte/legislatura-{legislatura}.json:
    get:
      tags: [Proiecte]
      summary: Proiecte legislative
      description: |
        Lista proiectelor și propunerilor legislative depuse într-o legislatură,
        cu stadiu, inițiator, timeline procedural și (când există) rezultatul votului final.
      parameters:
        - name: legislatura
          in: path
          required: true
          schema:
            type: integer
            example: 2024
      responses:
        "200":
          description: Succes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProiecteResponse"

components:
  schemas:
    Meta:
      type: object
      description: Metadate de generare (envelope-ul oricărui răspuns)
      properties:
        generated_at:
          type: string
          format: date-time
          description: Timestamp UTC când a fost generat fișierul
        source_url:
          type: string
          format: uri
          description: URL sursa cdep.ro de unde au fost extrase datele
        scraper_version:
          type: string
          example: "0.1.0"
        count:
          type: integer

    Deputat:
      type: object
      properties:
        id:
          type: string
          description: Hash stabil (canonical_id) — folosit pentru cross-link cu voturi
          example: "db10f9f10a669adb"
        name:
          type: string
          example: "Adomnicăi Mirela Elena"
        given_name:
          type: string
          example: "Mirela Elena"
        family_name:
          type: string
          example: "Adomnicăi"
        gender:
          type: string
          enum: [male, female]
          nullable: true
        birth_date:
          type: string
          format: date
          nullable: true
        image:
          type: string
          format: uri
          nullable: true
        cdep_idm:
          type: integer
          description: ID-ul intern cdep.ro (folosit în URL-ul `structura2015.mp?idm=N`)
          example: 1
        legislatura:
          type: integer
          example: 2024
        judet:
          type: string
          nullable: true
          example: "Suceava"
        circumscriptie:
          type: integer
          nullable: true
          example: 35
        profile_url:
          type: string
          format: uri
        data_validare:
          type: string
          format: date
          nullable: true
        hcd_validare:
          type: string
          nullable: true
          example: "HCD nr.109/2024"
        current_party:
          type: string
          nullable: true
          example: "Partidul Social Democrat"
        current_group:
          type: string
          nullable: true
        group_role:
          type: string
          nullable: true
          enum: [Lider, Vicelider, Secretar, Membru, null]
        comisii:
          type: array
          items:
            $ref: "#/components/schemas/ComisieMembership"
        delegatii:
          type: array
          items:
            type: string
        grupuri_prietenie:
          type: array
          items:
            type: string
        activitate_luari_cuvant:
          type: integer
        activitate_sedinte:
          type: integer
        activitate_declaratii_politice:
          type: integer
        activitate_propuneri_legislative:
          type: integer
        activitate_legi_promulgate:
          type: integer
        activitate_intrebari_interpelari:
          type: integer
        birou_parlamentar:
          type: string
          nullable: true

    ComisieMembership:
      type: object
      properties:
        comisia:
          type: string
          example: "Comisia pentru muncă şi protecţie socială"
        rol:
          type: string
          nullable: true
          enum: [Președinte, Vicepreședinte, Secretar, Membru, null]
        tip:
          type: string
          enum: [permanenta, speciala, comuna, speciala_comuna]

    DeputatiResponse:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Deputat"

    VoteCounts:
      type: object
      properties:
        prezenti:
          type: integer
        pentru:
          type: integer
        contra:
          type: integer
        abtineri:
          type: integer
        nu_au_votat:
          type: integer

    VoteEventSummary:
      type: object
      description: Înregistrare în `_index.json` (fără defalcare nominală)
      properties:
        id:
          type: string
        cdep_idv:
          type: integer
          example: 36892
        legislatura:
          type: integer
        cam:
          type: integer
          enum: [1, 2]
          description: 1=Senat, 2=Camera Deputaților
        timestamp:
          type: string
          format: date-time
        descriere:
          type: string
          example: "PL-x 218/2026 - Vot final adoptare"
        counts:
          $ref: "#/components/schemas/VoteCounts"
        detail_url:
          type: string
          description: URL relativ la fișierul JSON cu defalcare nominală

    VoteIndividual:
      type: object
      properties:
        voter_canonical_id:
          type: string
          description: Match cu `Deputat.id`
        voter_name:
          type: string
        party:
          type: string
          nullable: true
        option:
          type: string
          enum: [yes, "no", abstain, absent, not_voting]

    VoteEvent:
      type: object
      description: Vot complet (fișier per `idv`)
      allOf:
        - $ref: "#/components/schemas/VoteEventSummary"
        - type: object
          properties:
            votes:
              type: array
              items:
                $ref: "#/components/schemas/VoteIndividual"
            source_url:
              type: string
              format: uri

    VoturiIndexResponse:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: array
          items:
            $ref: "#/components/schemas/VoteEventSummary"

    Sanctiune:
      type: object
      properties:
        id:
          type: string
        legislatura:
          type: integer
        deputat_nume:
          type: string
        deputat_canonical_id:
          type: string
          nullable: true
        data:
          type: string
          format: date
          nullable: true
        tip:
          type: string
          enum: [DIMINUARE_INDEMNIZATIE, AVERTISMENT_SCRIS, CHEMARE_ORDINE, RETRAGERE_CUVANT, OTHER]
        procent:
          type: integer
          nullable: true
          description: Pentru DIMINUARE_INDEMNIZATIE
        durata_luni:
          type: integer
          nullable: true
        nr_decizie:
          type: string
          nullable: true
        descriere:
          type: string

    SanctiuniResponse:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Sanctiune"

    Interpelare:
      type: object
      properties:
        id:
          type: string
        cdep_idi:
          type: integer
        legislatura:
          type: integer
        nr_inregistrare:
          type: string
          example: "14149A"
        data_inregistrare:
          type: string
          format: date
          nullable: true
        data_prezentare:
          type: string
          format: date
          nullable: true
        data_comunicare:
          type: string
          format: date
          nullable: true
        termen_raspuns:
          type: string
          format: date
          nullable: true
        titlu:
          type: string
        mod_adresare:
          type: string
          nullable: true
        adresant_nume:
          type: string
        adresant_canonical_id:
          type: string
          nullable: true
          description: Match cu `Deputat.id`
        adresant_grup:
          type: string
          nullable: true
        destinatar:
          type: string
          example: "Ministerul Afacerilor Interne"
        text_pdf_url:
          type: string
          format: uri
          nullable: true
        raspuns_solicitat:
          type: string
          nullable: true
        raspuns_primit:
          type: boolean
        raspuns_nr_inregistrare:
          type: string
          nullable: true
        raspuns_data:
          type: string
          format: date
          nullable: true
        raspuns_sursa:
          type: string
          nullable: true
        raspuns_comunicat_de:
          type: string
          nullable: true
        raspuns_pdf_url:
          type: string
          format: uri
          nullable: true
        source_url:
          type: string
          format: uri

    InterpelariResponse:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Interpelare"

    ComisieMembru:
      type: object
      properties:
        deputat_canonical_id:
          type: string
          description: Match cu `Deputat.id`
        deputat_nume:
          type: string
        deputat_cdep_idm:
          type: integer
        partid:
          type: string
          nullable: true
        rol:
          type: string
          enum: [Președinte, Vicepreședinte, Secretar, Membru]

    Comisie:
      type: object
      properties:
        id:
          type: string
          description: Hash stabil pe (legislatură, nume, tip)
        nume:
          type: string
          example: "Comisia pentru tehnologia informaţiei şi comunicaţiilor"
        tip:
          type: string
          enum: [permanenta, speciala, comuna, speciala_comuna]
        legislatura:
          type: integer
        nr_membri:
          type: integer
        presedinte:
          type: string
          nullable: true
        vicepresedinti:
          type: array
          items:
            type: string
        secretari:
          type: array
          items:
            type: string
        membri:
          type: array
          items:
            $ref: "#/components/schemas/ComisieMembru"

    ComisiiResponse:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Comisie"

    TimelineEvent:
      type: object
      properties:
        data:
          type: string
          format: date
          nullable: true
        eveniment:
          type: string

    Proiect:
      type: object
      properties:
        id:
          type: string
        cdep_idp:
          type: integer
          example: 22201
        cam:
          type: integer
          enum: [0, 1, 2]
          description: 1=Senat, 2=Camera Deputaților, 0=ambele
        legislatura:
          type: integer
        nr_inregistrare:
          type: string
          nullable: true
          example: "1/01.02.2025"
        nr_camera_deputati:
          type: string
          nullable: true
        nr_senat:
          type: string
          nullable: true
        nr_guvern:
          type: string
          nullable: true
        nr_bpi:
          type: string
          nullable: true
        titlu:
          type: string
        tip:
          type: string
          enum: [proiect_lege, propunere_legislativa, ordonanta_urgenta, ordonanta_guvern, other]
        caracter:
          type: string
          enum: [ordinar, organic, other]
        procedura_urgenta:
          type: boolean
        initiator:
          type: string
          nullable: true
        camera_decizionala:
          type: string
          nullable: true
        stadiu:
          type: string
          nullable: true
          example: "Lege 9/2025"
        lege_nr:
          type: string
          nullable: true
        decret_nr:
          type: string
          nullable: true
        data_prezentare:
          type: string
          format: date
          nullable: true
        data_inregistrare_cd:
          type: string
          format: date
          nullable: true
        data_adoptare_cd:
          type: string
          format: date
          nullable: true
        data_adoptare_senat:
          type: string
          format: date
          nullable: true
        data_promulgare:
          type: string
          format: date
          nullable: true
        vot_pentru:
          type: integer
          nullable: true
        vot_contra:
          type: integer
          nullable: true
        vot_abtineri:
          type: integer
          nullable: true
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
        documente_pdf:
          type: array
          items:
            type: string
            format: uri
        source_url:
          type: string
          format: uri

    ProiecteResponse:
      type: object
      properties:
        meta:
          $ref: "#/components/schemas/Meta"
        data:
          type: array
          items:
            $ref: "#/components/schemas/Proiect"
