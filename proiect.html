<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proiect legislativ — Camera Deputaților</title>
<meta name="description" content="Proiect de lege cu timeline procedural, vot final, amendamente, link PDF raport comisie.">
<meta property="og:title" content="Proiect legislativ — cdep.api">
<meta property="og:type" content="article">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --purple:#553378;--purple-bg:#EDE7F4;
  --radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'SF Mono','Consolas',monospace;
}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;}}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--green)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
.container{max-width:1100px;margin:0 auto;padding:32px 24px}
.title-block h1{font-size:24px;font-weight:600;margin-bottom:10px;line-height:1.3}
.title-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.tag{font-size:12px;padding:4px 10px;border-radius:4px;font-weight:500}
.tag-ok{background:var(--green-bg);color:var(--green-text)}
.tag-info{background:var(--blue-bg);color:var(--blue-text)}
.tag-warn{background:var(--amber-bg);color:var(--amber-text)}
.tag-danger{background:var(--red-bg);color:var(--red-text)}
.tag-purple{background:var(--purple-bg);color:var(--purple)}
.grid{display:grid;grid-template-columns:1fr 320px;gap:32px;margin-bottom:32px}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
.section{margin-bottom:24px}
.section h2{font-size:16px;font-weight:600;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.timeline-item{display:flex;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)}
.timeline-item:last-child{border:none}
.timeline-date{flex-shrink:0;font-family:var(--mono);font-size:12px;color:var(--blue-text);background:var(--blue-bg);padding:4px 8px;border-radius:4px;height:fit-content;font-weight:500}
.timeline-event{font-size:13px;line-height:1.5}
.aside{background:var(--bg2);padding:18px;border-radius:var(--radius);height:fit-content}
.aside dt{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:14px;font-weight:600}
.aside dt:first-child{margin-top:0}
.aside dd{font-size:13px;color:var(--text);margin-bottom:0}
.aside dd a{font-family:var(--mono);font-size:12px;word-break:break-all}
.vote-row{display:flex;gap:6px;margin-bottom:8px;font-size:12px}
.vote-cell{flex:1;padding:6px 10px;border-radius:4px;text-align:center;font-weight:600}
.vfor{background:var(--green-bg);color:var(--green-text)}
.vagainst{background:var(--red-bg);color:var(--red-text)}
.vabs{background:var(--bg3);color:var(--text2)}
.pdfs-list{max-height:400px;overflow-y:auto}
.pdfs-list a{display:block;padding:8px 0;font-size:12px;border-bottom:1px solid var(--border);font-family:var(--mono);word-break:break-all}
.loading{padding:60px 0;text-align:center;color:var(--text3)}
.error{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius)}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">cdep<span>.api</span></a>
    <nav class="nav">
      <a href="avere.html">Averi</a>
      <a href="deputati-avere.html">Averi<sup>ALT</sup></a>
      <a href="deputati-activitate.html">Activitate</a>
      <a href="interpelari-stats.html">Interpelări</a>
      <a href="proiecte-stats.html">Proiecte</a>
      <a href="search.html" data-i18n="search">Caută</a>
      <span id="lang-toggle-slot" style="margin-left:4px;display:flex;align-items:center"></span>
    </nav>
  </div>
</header>
<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă proiectul...</div></div>
</div>
<footer class="footer">
  <a href="index.html" data-i18n="home">Pagina principală</a> · <a href="search.html" data-i18n="search">Caută</a> · <span data-i18n="data_from">Date din</span> <a href="https://cdep.ro" target="_blank">cdep.ro</a>, via CDEP API: <a href="https://github.com/Endimion2k/cdep-api-poc" target="_blank">Endimion2k/cdep-api-poc</a>
</footer>
<script>
function getParam(n) { return new URL(window.location).searchParams.get(n); }
function fmtDate(iso) { if (!iso) return ''; const m=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec']; const d=new Date(iso); return isNaN(d)?iso:`${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`; }

(async function() {
  const idp = parseInt(getParam('idp') || getParam('id') || '');
  const leg = getParam('leg') || '2024';
  if (!idp) {
    document.getElementById('content').innerHTML = '<div class="error">Parametru lipsă. Folosește URL: <code>proiect.html?idp=22201</code></div>';
    return;
  }
  let proiecte;
  try {
    proiecte = await fetch(`data/v1/proiecte/legislatura-${leg}.json`).then(r => r.json());
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error">Eroare la încărcare: ${e.message}</div>`;
    return;
  }
  const p = proiecte.data.find(x => x.cdep_idp === idp);
  if (!p) {
    document.getElementById('content').innerHTML = `<div class="error">Proiectul cu idp=${idp} nu a fost găsit în legislatura ${leg}.</div>`;
    return;
  }
  document.title = `${p.nr_inregistrare || idp} — ${p.titlu.slice(0, 60)}`;

  // Tags
  const tags = [];
  if (p.lege_nr) tags.push(`<span class="tag tag-ok">Lege ${p.lege_nr}</span>`);
  else if ((p.stadiu || '').toLowerCase().includes('respins')) tags.push('<span class="tag tag-danger">Respins</span>');
  else if ((p.stadiu || '').toLowerCase().includes('retras')) tags.push('<span class="tag tag-warn">Retras</span>');
  else tags.push('<span class="tag tag-info">În lucru</span>');
  if (p.procedura_urgenta) tags.push('<span class="tag tag-warn">Procedură urgență</span>');
  if (p.tip) tags.push(`<span class="tag tag-purple">${p.tip.replace(/_/g, ' ')}</span>`);
  if (p.caracter) tags.push(`<span class="tag" style="background:var(--bg3);color:var(--text2)">${p.caracter}</span>`);

  // Timeline
  const timelineHtml = (p.timeline || []).map(e =>
    `<div class="timeline-item"><span class="timeline-date">${fmtDate(e.data)}</span><div class="timeline-event">${e.eveniment || ''}</div></div>`
  ).join('') || '<p style="color:var(--text3)">Niciun eveniment timeline.</p>';

  // Vote final
  const voteHtml = (p.vot_pentru !== null && p.vot_pentru !== undefined)
    ? `<div class="vote-row">
        <div class="vote-cell vfor">${p.vot_pentru} pentru</div>
        <div class="vote-cell vagainst">${p.vot_contra || 0} contra</div>
        <div class="vote-cell vabs">${p.vot_abtineri || 0} abț.</div>
      </div>`
    : '<p style="color:var(--text3);font-size:13px">Nu s-a înregistrat încă vot final.</p>';

  // PDFs (limit 8 in side panel; full list expanded if more)
  const pdfsHtml = (p.documente_pdf || []).map(url => {
    const filename = url.split('/').pop();
    return `<a href="${url}" target="_blank">📄 ${filename}</a>`;
  }).join('') || '<p style="color:var(--text3);font-size:12px">Niciun PDF asociat.</p>';

  // Amendamente section
  const amendHtml = (p.amendamente_admise || p.amendamente_respinse)
    ? `<div class="section">
        <h2>Amendamente</h2>
        <div class="vote-row">
          ${p.amendamente_admise > 0 ? `<div class="vote-cell vfor">${p.amendamente_admise} admise</div>` : ''}
          ${p.amendamente_respinse > 0 ? `<div class="vote-cell vagainst">${p.amendamente_respinse} respinse</div>` : ''}
        </div>
        ${p.raport_comisie_pdf ? `<p style="margin-top:8px;font-size:13px"><a href="${p.raport_comisie_pdf}" target="_blank">📄 Lista completă în raportul comisiei (PDF)</a></p>` : ''}
        ${p.amendamente_termen_depunere ? `<p style="margin-top:6px;font-size:12px;color:var(--text3)">Termen depunere: ${fmtDate(p.amendamente_termen_depunere)}</p>` : ''}
      </div>`
    : '';

  document.getElementById('content').innerHTML = `
    <div class="title-block">
      <h1>${p.titlu}</h1>
      <div class="title-meta">${tags.join('')}</div>
    </div>
    <div class="grid">
      <div>
        <div class="section">
          <h2 data-i18n="vote_final">Vot final</h2>
          ${voteHtml}
          ${p.lege_nr ? `<p style="margin-top:8px;font-size:13px">Promulgat ca <strong>Lege ${p.lege_nr}</strong>${p.decret_nr ? ` prin Decret ${p.decret_nr}` : ''}${p.data_promulgare ? ` în ${fmtDate(p.data_promulgare)}` : ''}.</p>` : ''}
        </div>
        ${amendHtml}
        <div class="section">
          <h2 data-i18n="timeline">Timeline procedural</h2>
          ${timelineHtml}
        </div>
      </div>
      <aside class="aside">
        <dl>
          <dt>Nr. înregistrare</dt><dd>${p.nr_inregistrare || '—'}</dd>
          <dt>Camera Deputaților</dt><dd>${p.nr_camera_deputati || '—'}</dd>
          <dt>Senat</dt><dd>${p.nr_senat || '—'}</dd>
          <dt>Guvern</dt><dd>${p.nr_guvern || '—'}</dd>
          <dt data-i18n="initiator">Inițiator</dt><dd>${p.initiator || '—'}</dd>
          <dt data-i18n="decisional_chamber">Cameră decizională</dt><dd>${p.camera_decizionala || '—'}</dd>
          <dt data-i18n="stage">Stadiu</dt><dd>${p.stadiu || '—'}</dd>
          <dt data-i18n="source">Sursa</dt><dd><a href="${p.source_url}" target="_blank">cdep.ro ↗</a></dd>
        </dl>
        <div style="margin-top:18px">
          <h2 style="font-size:13px;margin-bottom:8px"><span data-i18n="pdf_documents">Documente PDF</span> (${(p.documente_pdf || []).length})</h2>
          <div class="pdfs-list">${pdfsHtml}</div>
        </div>
      </aside>
    </div>
  `;
  if (typeof applyI18n === 'function') applyI18n();
})();
</script>
<script src="i18n.js"></script>
</body>
</html>
