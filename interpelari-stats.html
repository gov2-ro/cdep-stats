<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interpelări — statistici · Camera Deputaților</title>
<meta name="description" content="Statistici interpelări adresate deputaților · Camera Deputaților 2024">
<meta property="og:type" content="website">
<meta property="og:title" content="Interpelări — statistici">
<meta property="og:description" content="Statistici interpelări adresate deputaților · Camera Deputaților 2024">
<meta property="og:url" content="https://endimion2k.github.io/cdep-api-poc/interpelari-stats.html">
<meta property="og:image" content="https://endimion2k.github.io/cdep-api-poc/data/assets/og/interpelari-stats.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.view-toggle{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;vertical-align:middle}
.view-btn{padding:4px 11px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:32px}
.card{background:var(--bg2);border-radius:var(--radius);padding:16px;text-align:center}
.card .num{font-size:22px;font-weight:600;margin-bottom:4px}
.card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.card .num.good{color:var(--green-text)}
.card .num.warn{color:var(--amber-text)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.section{margin-bottom:32px}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
td.num,th.num{text-align:right;font-family:var(--mono)}
.rank{color:var(--text3);width:22px;font-size:11px}
.pill{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--text2);white-space:nowrap}
.rate-bar{display:flex;align-items:center;gap:6px}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;min-width:40px}
.bar-fill{height:6px;border-radius:3px;background:var(--green)}

/* Monthly bar chart */
.month-chart{display:flex;align-items:flex-end;gap:2px;height:80px;padding:4px 0}
.month-bar{flex:1;background:var(--blue-bg);border-radius:2px 2px 0 0;position:relative;min-width:4px;cursor:default}
.month-bar:hover{background:var(--blue)}
.month-bar-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;pointer-events:none}
.month-bar:hover .month-bar-tip{display:block}
.month-labels{display:flex;gap:2px;margin-top:2px}
.month-label{flex:1;font-size:8px;color:var(--text3);text-align:center;overflow:hidden;white-space:nowrap}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">cdep<span>-api</span> <em>stats</em></a>
    <nav class="nav">
      <a href="avere.html">Averi</a>
      <a href="deputati-avere.html">Averi++</a>
      <a href="deputati-activitate.html">Activitate</a>
      <a href="interpelari-stats.html" class="active">Interpelări</a>
      <a href="proiecte-stats.html">Proiecte</a>
      <a href="partide.html">Partide</a>
      <a href="judete.html">Județe</a>
      <!-- <a href="search.html" data-i18n="search">Caută</a> -->
      <span id="lang-toggle-slot" style="margin-left:4px;display:flex;align-items:center"></span>
    </nav>
  </div>
</header>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<footer class="footer">
  <p><span data-i18n="data_from">Date din</span> <a href="https://cdep.ro" target="_blank">cdep.ro</a>, via CDEP API: <a href="https://github.com/Endimion2k/cdep-api-poc" target="_blank">Endimion2k/cdep-api-poc</a> ·
  <span data-i18n="source">Sursă JSON</span>: <a id="json-link" href="#">interpelari.json</a> ·
  <a href="index.html" data-i18n="page_main">Pagina principală</a></p>
</footer>

<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/stats/interpelari-${LEG}.json`;
document.getElementById('json-link').href = DATA_URL;
document.getElementById('json-link').textContent = `interpelari-${LEG}.json`;

const PARTY_COLORS = {
  'PSD':'#185FA5','PNL':'#993C1D','USR':'#3B6D11','AUR':'#854F0B',
  'UDMR':'#5F5E5A','SOSRO':'#A32D2D','POT':'#553378',
};
function partyColor(p){return PARTY_COLORS[p]||'#777';}

function legToggle(){
  return [2024,2020].map(l=>
    `<button class="view-btn${l===LEG?' active':''}" onclick="location.href='interpelari-stats.html?leg=${l}'">${l}</button>`
  ).join('');
}

function rateBar(rate){
  const color = rate>=90?'var(--green-text)':rate>=70?'var(--amber-text)':'var(--red-text)';
  return `<div class="rate-bar">
    <div class="bar-track"><div class="bar-fill" style="width:${rate}%;background:${rate>=80?'var(--green)':'var(--amber-text)'}"></div></div>
    <span style="color:${color};font-family:var(--mono);font-size:12px;min-width:38px;text-align:right">${rate}%</span>
  </div>`;
}

function monthChart(monthly){
  if(!monthly.length) return '';
  const max = Math.max(...monthly.map(m=>m.count),1);
  const bars = monthly.map(m=>{
    const h = Math.max(2, Math.round(m.count/max*76));
    return `<div class="month-bar" style="height:${h}px"><span class="month-bar-tip">${m.month}: ${m.count}</span></div>`;
  }).join('');
  const labels = monthly.map(m=>`<span class="month-label">${m.month.slice(2)}</span>`).join('');
  return `<div class="month-chart">${bars}</div><div class="month-labels">${labels}</div>`;
}

function topTable(rows, cols){
  const header = cols.map(c=>`<th${c.right?' class="num"':''}>${c.label}</th>`).join('');
  const body = rows.map((r,i)=>{
    const cells = cols.map(c=>`<td${c.right?' class="num"':''}>${c.render(r)}</td>`).join('');
    return`<tr><td class="rank">${i+1}</td>${cells}</tr>`;
  }).join('');
  return`<table><thead><tr><th></th>${header}</tr></thead><tbody>${body}</tbody></table>`;
}

async function load(){
  try{
    const res=await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    const c = d.cards;

    const rateClass = c.answer_rate>=90?'good':c.answer_rate>=70?'':'warn';

    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
        <h1 style="margin:0">Interpelări — legislatura ${LEG}</h1>
        <div class="view-toggle">${legToggle()}</div>
      </div>
      <p class="sub">${c.total.toLocaleString('ro-RO')} interpelări și întrebări scrise înregistrate · date din cdep.ro</p>

      <div class="cards">
        <div class="card"><div class="num">${c.total.toLocaleString('ro-RO')}</div><div class="lbl">Total</div></div>
        <div class="card"><div class="num ${rateClass}">${c.answer_rate}%</div><div class="lbl">Rată răspuns</div></div>
        <div class="card"><div class="num">${c.answered.toLocaleString('ro-RO')}</div><div class="lbl">Răspunse</div></div>
        <div class="card"><div class="num">${c.avg_response_days!=null?c.avg_response_days+'z':'–'}</div><div class="lbl">Zile medii răspuns</div></div>
        <div class="card"><div class="num">${c.median_response_days!=null?c.median_response_days+'z':'–'}</div><div class="lbl">Zile median răspuns</div></div>
      </div>

      <div class="section">
        <h2>Evoluție lunară</h2>
        ${monthChart(d.monthly)}
      </div>

      <div class="grid2">
        <div>
          <h2>Top ${d.top_askers.length} interpelatori</h2>
          ${topTable(d.top_askers, [
            {label:'Deputat', render: r=>`${r.name} <span class="pill" style="background:${partyColor(r.partid)}22;color:${partyColor(r.partid)}">${r.partid}</span>`},
            {label:'Total', right:true, render: r=>r.total.toLocaleString('ro-RO')},
          ])}
        </div>
        <div>
          <h2>Top ministere interpelate</h2>
          ${topTable(d.top_destinations, [
            {label:'Minister', render: r=>`<span title="${r.destinatar}">${r.destinatar.replace('Ministerul ','Min. ')}</span>`},
            {label:'Total', right:true, render: r=>r.total.toLocaleString('ro-RO')},
            {label:'Răspuns', render: r=>rateBar(r.rate)},
          ])}
        </div>
      </div>

      <div class="section">
        <h2>Pe partid</h2>
        ${topTable(d.per_partid, [
          {label:'Partid', render: r=>`<span class="pill" style="background:${partyColor(r.partid)}22;color:${partyColor(r.partid)}">${r.partid}</span>`},
          {label:'Interpelări', right:true, render: r=>r.total.toLocaleString('ro-RO')},
          {label:'Răspunse', right:true, render: r=>r.answered.toLocaleString('ro-RO')},
          {label:'Rata răspuns', render: r=>rateBar(r.rate)},
        ])}
      </div>
    `;
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Rulează <code>python scripts/build_interpelari_stats.py --leg ${LEG}</code>.</div>`;
  }
}
load();
</script>
<script src="i18n.js"></script>
</body>
</html>
