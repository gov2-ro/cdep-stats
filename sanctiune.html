<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sancțiune — Camera Deputaților</title>
<meta name="description" content="Sancțiuni disciplinare aplicate deputaților în plen.">
<meta property="og:title" content="Sancțiune parlamentară — cdep.api">
<meta property="og:type" content="article">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;--border:#e0deda;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red:#A32D2D;--red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'SF Mono','Consolas',monospace;
}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;}}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600}.logo span{color:var(--green)}
.back{margin-left:auto;font-size:13px;color:var(--text2);padding:6px 12px;border-radius:6px}.back:hover{background:var(--bg2);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:32px 24px}
.banner{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin-bottom:24px;border-left:4px solid var(--red)}
.banner h1{font-size:20px;font-weight:600;margin-bottom:8px}
.banner-meta{font-size:13px;opacity:0.85}
.section{margin-bottom:24px}
.section h2{font-size:16px;font-weight:600;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;background:var(--bg2);padding:18px;border-radius:var(--radius)}
.detail-cell dt{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:4px}
.detail-cell dd{font-size:14px;color:var(--text);font-weight:500}
.descriere{padding:18px;background:var(--bg2);border-radius:var(--radius);font-size:14px;line-height:1.7}
.list-section{margin-top:24px}
.list-row{padding:8px 14px;border-radius:6px;margin-bottom:4px;font-size:13px;background:var(--bg2);display:flex;align-items:center;gap:10px}
.list-row .date{font-family:var(--mono);color:var(--text3);font-size:11px;min-width:90px}
.list-row .name{font-weight:500;flex:1}
.list-row .tip{font-size:10px;padding:2px 8px;border-radius:3px;background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:0.4px;font-weight:600}
.loading{padding:60px 0;text-align:center;color:var(--text3)}
.error{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius)}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <span class="logo">cdep<span>.api</span></span>
    <a href="index.html" class="back">← Înapoi</a>
  </div>
</header>
<div class="container">
  <div id="content"><div class="loading">Se încarcă...</div></div>
</div>
<footer class="footer"><a href="index.html">Pagina principală</a> · <a href="search.html">Caută</a> · Date din <a href="https://cdep.ro" target="_blank">cdep.ro</a></footer>
<script>
function getParam(n) { return new URL(window.location).searchParams.get(n); }
function fmtDate(iso) { if (!iso) return '—'; const m=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec']; const d=new Date(iso); return isNaN(d)?iso:`${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`; }
const TIP_LABEL = {
  'diminuare_indemnizatie': 'Diminuare indemnizație',
  'avertisment_scris': 'Avertisment scris',
  'chemare_la_ordine': 'Chemare la ordine',
  'retragere_cuvant': 'Retragere cuvânt',
  'other': 'Altă sancțiune'
};

(async function() {
  const id = getParam('id');
  const leg = getParam('leg') || '2024';
  let raw;
  try { raw = await fetch(`data/v1/sanctiuni/legislatura-${leg}.json`).then(r => r.json()); }
  catch (e) { document.getElementById('content').innerHTML = `<div class="error">Eroare: ${e.message}</div>`; return; }
  const all = raw.data || [];

  // Dacă nu e id specific, afișează lista completă
  if (!id) {
    if (!all.length) {
      document.getElementById('content').innerHTML = '<div class="error">Niciuna sancțiune înregistrată în această legislatură.</div>';
      return;
    }
    document.title = `Sancțiuni disciplinare — legislatura ${leg}`;
    const sorted = [...all].sort((a,b) => (b.data || '').localeCompare(a.data || ''));
    const rows = sorted.map(s => `
      <a href="sanctiune.html?id=${s.id}&leg=${leg}" style="text-decoration:none;color:inherit">
        <div class="list-row">
          <span class="date">${s.data || '—'}</span>
          <span class="name">${s.deputat_nume || '—'}</span>
          <span class="tip">${TIP_LABEL[s.tip] || s.tip}</span>
        </div>
      </a>
    `).join('');
    document.getElementById('content').innerHTML = `
      <h1 style="font-size:22px;font-weight:600;margin-bottom:18px">Sancțiuni disciplinare — legislatura ${leg}</h1>
      <p style="color:var(--text2);margin-bottom:18px">${all.length} sancțiuni înregistrate. Click pe un rând pentru detalii.</p>
      <div class="list-section">${rows}</div>
    `;
    return;
  }

  // Sancțiune individuală
  const s = all.find(x => x.id === id);
  if (!s) {
    document.getElementById('content').innerHTML = `<div class="error">Sancțiunea cu id=${id} nu a fost găsită.</div>`;
    return;
  }
  document.title = `Sancțiune: ${s.deputat_nume}`;

  document.getElementById('content').innerHTML = `
    <div class="banner">
      <h1>Sancțiune: ${s.deputat_nume || '—'}</h1>
      <div class="banner-meta">${TIP_LABEL[s.tip] || s.tip} · ${fmtDate(s.data)}${s.nr_decizie ? ` · Decizia ${s.nr_decizie}` : ''}</div>
    </div>

    <div class="section">
      <h2>Detalii</h2>
      <div class="detail-grid">
        <div class="detail-cell"><dt>Deputat</dt><dd>${s.deputat_nume || '—'}</dd></div>
        <div class="detail-cell"><dt>Tip sancțiune</dt><dd>${TIP_LABEL[s.tip] || s.tip}</dd></div>
        <div class="detail-cell"><dt>Data</dt><dd>${fmtDate(s.data)}</dd></div>
        ${s.procent ? `<div class="detail-cell"><dt>Procent diminuare</dt><dd>${s.procent}% pe ${s.durata_luni || '?'} luni</dd></div>` : ''}
        ${s.nr_decizie ? `<div class="detail-cell"><dt>Decizia</dt><dd>${s.nr_decizie}</dd></div>` : ''}
        <div class="detail-cell"><dt>Legislatura</dt><dd>${s.legislatura}</dd></div>
      </div>
    </div>

    ${s.descriere ? `<div class="section">
      <h2>Descriere</h2>
      <div class="descriere">${s.descriere}</div>
    </div>` : ''}

    <p style="margin-top:24px;color:var(--text3);font-size:13px">
      <a href="sanctiune.html?leg=${leg}">← Vezi toate sancțiunile din legislatura ${leg}</a> ·
      <a href="search.html?q=${encodeURIComponent(s.deputat_nume)}">Caută alte mențiuni despre ${s.deputat_nume}</a>
    </p>
  `;
})();
</script>
</body>
</html>
