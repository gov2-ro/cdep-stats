<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voturi · Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Voturi Camera Deputaților 2024">
<meta property="og:type" content="website">
<meta property="og:title" content="Voturi">
<meta property="og:description" content="Voturi Camera Deputaților 2024">
<meta property="og:url" content="https://lab.gov2.ro/cdep/voturi.html">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-5.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.view-toggle{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;vertical-align:middle}
.view-btn{padding:4px 11px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}

table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:600;background:var(--bg2)}
td.num,th.num{text-align:right;font-family:var(--mono)}
.rank{color:var(--text3);width:22px;font-size:11px}
a.vote-link{color:var(--blue)}

.pagination{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.page-btn{padding:6px 10px;font-size:12px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);border-radius:var(--radius-sm);cursor:pointer}
.page-btn:hover:not(:disabled){background:var(--blue-bg);color:var(--blue-text)}
.page-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600;border-color:var(--blue-text)}
.page-btn:disabled{color:var(--text3);cursor:not-allowed}
.page-info{color:var(--text3);font-size:12px;min-width:140px;text-align:center}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script>
const PAGE_SIZE = 50;
let currentPage = 1;
let allVotes = [];

function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/voturi/${LEG}/_index.json`;

function legToggle(){
  return [2024,2020].map(l=>
    `<button class="view-btn${l===LEG?' active':''}" onclick="location.href='voturi.html?leg=${l}'">${l}</button>`
  ).join('');
}

function formatDate(isoDate){
  const d = new Date(isoDate);
  return d.toLocaleDateString('ro-RO',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function voteRow(v, idx){
  const total = v.counts.prezenti;
  const passed = v.counts.pentru > (total/2);
  const passClass = passed ? 'good' : '';
  return `<tr>
    <td class="num">${idx}</td>
    <td><a href="vot.html?leg=${LEG}&id=${v.cdep_idv}" class="vote-link">${v.descriere}</a></td>
    <td>${formatDate(v.timestamp)}</td>
    <td class="num"><strong class="${passClass}" style="color:var(--green-text)">${v.counts.pentru}</strong> / ${v.counts.prezenti}</td>
    <td class="num">${v.counts.contra}</td>
    <td class="num">${v.counts.abtineri}</td>
    <td class="num">${v.counts.nu_au_votat}</td>
  </tr>`;
}

function renderTable(votes){
  const header = `<thead><tr>
    <th class="num">#</th>
    <th>Descriere</th>
    <th>Data</th>
    <th class="num">Pentru/Prezenți</th>
    <th class="num">Contra</th>
    <th class="num">Abțineri</th>
    <th class="num">Nu au votat</th>
  </tr></thead>`;
  const body = votes.map((v,i)=>voteRow(v, (currentPage-1)*PAGE_SIZE + i + 1)).join('');
  return `<table>${header}<tbody>${body}</tbody></table>`;
}

function renderPagination(){
  const totalPages = Math.ceil(allVotes.length / PAGE_SIZE);
  if(totalPages <= 1) return '';

  let html = '<div class="pagination">';
  const maxVisiblePages = 7;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages/2));
  let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
  if(endPage - startPage < maxVisiblePages - 1) startPage = Math.max(1, endPage - maxVisiblePages + 1);

  if(currentPage > 1) html += `<button class="page-btn" onclick="goPage(1)">← Primă</button>`;
  for(let p = startPage; p <= endPage; p++){
    html += `<button class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  if(currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${totalPages})">Ultimă →</button>`;

  html += `<span class="page-info">Pagina ${currentPage} / ${totalPages}</span></div>`;
  return html;
}

function goPage(p){
  currentPage = Math.max(1, Math.min(p, Math.ceil(allVotes.length / PAGE_SIZE)));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const startIdx = (currentPage - 1) * PAGE_SIZE;
  const endIdx = startIdx + PAGE_SIZE;
  const pageVotes = allVotes.slice(startIdx, endIdx);

  document.getElementById('content').innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
      <h1 style="margin:0">Voturi — legislatura ${LEG}</h1>
      <div class="view-toggle">${legToggle()}</div>
    </div>
    <p class="sub">${allVotes.length.toLocaleString('ro-RO')} voturi · date din cdep.ro</p>
    ${renderTable(pageVotes)}
    ${renderPagination()}
  `;
}

async function load(){
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    allVotes = (d.data || []).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    currentPage = 1;
    render();
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Asigură-te că legea ${LEG} există în data/v1/voturi/.</div>`;
  }
}

load();
</script>
<script src="assets/nav.js"></script>
<script>
NAV.renderHeader();
const leg = Number(new URL(location).searchParams.get('leg') || 2024);
const jsonUrl = `data/v1/voturi/${leg}/_index.json`;
NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${jsonUrl}">${jsonUrl}</a>`);
</script>
<script src="i18n.js"></script>
</body>
</html>
