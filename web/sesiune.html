<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ședință plen — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Ordinea de zi a unei ședințe a plenului Camerei Deputaților.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){.header-inner{gap:12px;padding:0 16px}.nav a{font-size:12px;padding:4px 8px}.nav span:not(#lang-toggle-slot){display:none}}
@media(max-width:620px){.header-inner{flex-wrap:wrap;gap:8px}.logo{flex:0 0 auto}.nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}.nav a{font-size:11px;padding:3px 6px;flex-shrink:0}}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}

/* breadcrumb */
.breadcrumb{font-size:13px;color:var(--text3);margin-bottom:20px;display:flex;align-items:center;gap:6px}
.breadcrumb a{color:var(--text2)}
.breadcrumb-sep{color:var(--border2)}

/* session heading */
.sess-head{margin-bottom:20px}
.sess-head h1{font-size:22px;font-weight:600;line-height:1.3;margin-bottom:10px}
.sess-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13px;color:var(--text2)}
.sess-meta-item{display:flex;align-items:center;gap:4px}
.sess-meta-sep{color:var(--border2)}
.badge{font-size:11px;padding:2px 8px;border-radius:3px;background:var(--bg3);color:var(--text2);font-weight:500}
.ext-link{font-size:12px;padding:3px 9px;border-radius:3px;border:1px solid var(--border);color:var(--text2);white-space:nowrap}
.ext-link:hover{border-color:var(--blue);color:var(--blue);text-decoration:none}

/* items */
.items-section{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.items-section-head{padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text2)}
.items-body{padding:0 16px}
.item-row{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap}
.item-row:last-child{border-bottom:none}
.item-main{display:flex;align-items:flex-start;gap:8px;width:100%}
.item-pos{font-size:11px;color:var(--text3);min-width:28px;flex-shrink:0;padding-top:3px;font-family:var(--mono);text-align:right}
.item-body{flex:1;min-width:0}
.item-desc{line-height:1.5;color:var(--text)}
.item-desc b{font-weight:600}
.item-desc i{color:var(--text2);font-size:12px}
.item-nr{font-size:11px;color:var(--text3);margin-top:3px}
.item-nr a{color:var(--blue)}
.item-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;padding-top:2px}
.item-pdf{font-size:11px;white-space:nowrap}
.docs-toggle{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;white-space:nowrap;font-family:var(--font)}
.docs-toggle:hover{color:var(--blue)}
.docs-list{display:none;width:100%;padding:8px 0 4px 36px}
.docs-list.open{display:block}
.doc-row{display:flex;align-items:baseline;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px dotted var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-date{color:var(--text3);white-space:nowrap;min-width:86px;flex-shrink:0;font-family:var(--mono);font-size:11px}
.doc-title{flex:1;color:var(--text2)}
.doc-badge{font-size:10px;color:var(--text3);background:var(--bg3);padding:1px 5px;border-radius:3px;flex-shrink:0}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG  = Number(getParam('leg') || 2024);
const DATE = getParam('date') || '';
const DATA_URL = `data/v1/ordine-zi/legislatura-${LEG}.json`;

function toggleDocs(btn){
  const list = btn.closest('.item-row').querySelector('.docs-list');
  const open = list.classList.toggle('open');
  btn.textContent = open ? 'documente ▲' : `documente (${btn.dataset.count}) ▼`;
}

function renderDocs(docs, open=false){
  if(!docs||!docs.length) return '';
  const rows = docs.map(d=>{
    const pdf = d.pdf_url
      ? `<a href="${d.pdf_url}" target="_blank" rel="noopener" style="font-size:11px;flex-shrink:0">PDF ↗</a>`
      : '';
    const badge = d.sursa==='caseta' ? '<span class="doc-badge">caseta</span>' : '';
    return`<div class="doc-row">
      <span class="doc-date">${d.data||''}</span>
      <span class="doc-title">${d.titlu}</span>
      ${badge}${pdf}
    </div>`;
  }).join('');
  return`<div class="docs-list${open?' open':''}">${rows}</div>`;
}

function renderItems(items){
  if(!items||!items.length)
    return '<p style="color:var(--text3);font-size:13px;padding:12px 0">Niciun punct pe ordinea de zi.</p>';
  return items.map(it=>{
    const pos  = it.pozitie!=null ? String(it.pozitie) : '–';
    const pdf  = it.doc_pdf_url
      ? `<a class="item-pdf" href="${it.doc_pdf_url}" target="_blank" rel="noopener">PDF ↗</a>`
      : '';
    const nrLink = it.idp
      ? `<a href="proiect.html?idp=${it.idp}&leg=${LEG}">${it.nr_inregistrare}</a>`
      : (it.nr_inregistrare||'');
    const nr = it.nr_inregistrare ? `<div class="item-nr">${nrLink}</div>` : '';
    const hasDocs = it.docs&&it.docs.length;
    const docsToggle = hasDocs
      ? `<button class="docs-toggle" onclick="toggleDocs(this)" data-count="${it.docs.length}">documente (${it.docs.length}) ▼</button>`
      : '';
    return`<div class="item-row">
      <div class="item-main">
        <span class="item-pos">${pos}.</span>
        <div class="item-body">
          <div class="item-desc">${it.descriere||'—'}</div>
          ${nr}
        </div>
        <div class="item-actions">${docsToggle}${pdf}</div>
      </div>
      ${renderDocs(it.docs)}
    </div>`;
  }).join('');
}

async function load(){
  if(!DATE){
    document.getElementById('content').innerHTML =
      `<div class="error">Lipsește parametrul <code>date</code> din URL.</div>`;
    return;
  }
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    const s = d.data.find(x=>x.session_date===DATE);
    if(!s){
      document.getElementById('content').innerHTML =
        `<div class="error">Ședința din <strong>${DATE}</strong> nu a fost găsită în <code>${DATA_URL}</code>.</div>`;
      return;
    }

    document.title = `${s.session_date} — Ordinea de zi · Camera Deputaților`;

    const dateEnd = s.session_date_end && s.session_date_end!==s.session_date
      ? ` – ${s.session_date_end}` : '';
    const itemCount = (s.items||[]).length;
    const backUrl = `ordine-zi.html?leg=${LEG}&view=calendar`;
    const pdfBtn  = s.pdf_url
      ? `<a class="ext-link" href="${s.pdf_url}" target="_blank" rel="noopener">PDF ordine ↗</a>`
      : '';
    const srcBtn  = s.source_url
      ? `<a class="ext-link" href="${s.source_url}" target="_blank" rel="noopener">cdep.ro ↗</a>`
      : '';
    const approvedRow = s.data_aprobare
      ? `<span class="sess-meta-item">Aprobată: <strong>${s.data_aprobare}</strong></span><span class="sess-meta-sep">·</span>`
      : '';

    document.getElementById('content').innerHTML = `
      <div class="breadcrumb">
        <a href="${backUrl}">← Ordinea de zi</a>
        <span class="breadcrumb-sep">/</span>
        <span>${s.session_date||''}${dateEnd}</span>
      </div>
      <div class="sess-head">
        <h1>${s.titlu||'Ședință plen'}</h1>
        <div class="sess-meta">
          ${approvedRow}
          <span class="badge">${itemCount} puncte</span>
          ${pdfBtn}${srcBtn}
        </div>
      </div>
      <div class="items-section">
        <div class="items-section-head">Puncte pe ordinea de zi</div>
        <div class="items-body">${renderItems(s.items)}</div>
      </div>
    `;
  }catch(e){
    document.getElementById('content').innerHTML =
      `<div class="error">Nu pot încărca datele: ${e.message}</div>`;
  }
}
load();
</script>
<script>
NAV.renderHeader();
NAV.renderFooter(`<span>Sursă JSON</span>: <a href="${DATA_URL}">${DATA_URL}</a>`);
</script>
<script src="i18n.js"></script>
</body>
</html>
