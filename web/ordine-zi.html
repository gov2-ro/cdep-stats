<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordinea de zi — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Ordinea de zi a ședințelor Camerei Deputaților.">
<meta property="og:type" content="website">
<meta property="og:title" content="Ordinea de zi — Camera Deputaților">
<meta property="og:description" content="Ordinea de zi a ședințelor Camerei Deputaților.">
<meta property="og:url" content="https://lab.gov2.ro/cdep/ordine-zi.html">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-5.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){.header-inner{gap:12px;padding:0 14px}.nav a{font-size:12px;padding:4px 8px}.nav span:not(#lang-toggle-slot){display:none}}
@media(max-width:620px){.header-inner{flex-wrap:wrap;gap:8px}.logo{flex:0 0 auto}.nav{flex:0 1 auto;margin-left:0;overflow-x:auto;min-width:0}.nav a{font-size:11px;padding:3px 6px;flex-shrink:0}}
.container{max-width:1100px;margin:0 auto;padding:18px 20px}
h1{font-size:20px;font-weight:600;margin-bottom:3px}
.sub{color:var(--text3);font-size:12px;margin-bottom:16px}

/* view toggle */
.view-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius-sm);padding:2px;flex-shrink:0}
.view-tab{padding:3px 12px;border-radius:4px;font-size:12px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--font)}
.view-tab.active{background:var(--bg);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* list view */
.session-list{display:flex;flex-direction:column;gap:5px}
.session-card{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.session-header{display:flex;align-items:center;gap:8px;padding:7px 11px;cursor:pointer;user-select:none;background:var(--bg2)}
.session-header:hover{background:var(--bg3)}
.session-date{font-size:12px;font-weight:600;min-width:118px;flex-shrink:0;font-family:var(--mono)}
.session-title-text{flex:1;font-size:12px;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-meta{display:flex;gap:6px;align-items:center;flex-shrink:0}
.pill{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--bg3);color:var(--text2);white-space:nowrap;font-weight:500}
.chevron{font-size:10px;color:var(--text3);transition:transform .15s;flex-shrink:0}
.session-card.open .chevron{transform:rotate(90deg)}
.session-body{display:none;padding:8px 11px;border-top:1px solid var(--border)}
.session-card.open .session-body{display:block}

/* items */
.item-row{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap}
.item-row:last-child{border-bottom:none}
.item-main{display:flex;align-items:flex-start;gap:6px;width:100%}
.item-pos{font-size:10px;color:var(--text3);min-width:20px;flex-shrink:0;padding-top:2px;font-family:var(--mono)}
.item-desc{flex:1;line-height:1.4;color:var(--text)}
.item-pdf{font-size:11px;flex-shrink:0;white-space:nowrap;padding-top:1px}
.item-desc b{font-weight:600}
.item-desc i{color:var(--text2);font-size:11px}
.src-link{font-size:10px;color:var(--text3);padding:1px 5px;border-radius:3px;border:1px solid var(--border);white-space:nowrap}
.src-link:hover{color:var(--text2);text-decoration:none!important;border-color:var(--border2)}
.docs-toggle{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 0 0;white-space:nowrap;font-family:var(--font)}
.docs-toggle:hover{color:var(--blue)}
.docs-list{display:none;width:100%;padding:4px 0 2px 26px}
.docs-list.open{display:block}
.doc-row{display:flex;align-items:baseline;gap:6px;padding:2px 0;font-size:11px;border-bottom:1px dotted var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-date{color:var(--text3);white-space:nowrap;min-width:76px;flex-shrink:0;font-family:var(--mono);font-size:10px}
.doc-title{flex:1;color:var(--text2)}
.doc-src{font-size:9px;color:var(--text3);flex-shrink:0}

/* full calendar */
.cal-full{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:6px 14px}
.cal-year-sep{grid-column:1/-1;font-size:13px;font-weight:700;color:var(--text);padding:10px 0 4px;border-bottom:1px solid var(--border);margin-bottom:2px}
.cal-year-sep:first-child{padding-top:0}
.cal-month-block{}
.cal-month-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:3px;padding:0 1px}
.cdg{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cdg-hdr>div{font-size:9px;font-weight:600;color:var(--text3);text-align:center;padding:1px 0 3px;letter-spacing:.02em}
.cd{font-size:11px;text-align:center;padding:3px 1px;border-radius:3px;color:var(--text3);line-height:1.3;display:block;text-decoration:none!important}
.cd-s{background:var(--blue-bg);color:var(--blue)!important;font-weight:600}
.cd-s:hover{background:var(--blue);color:#fff!important}
.cd-cont{background:var(--bg3);color:var(--text3)!important}
.cd-cont:hover{background:var(--blue-bg);color:var(--blue)!important}
.cd-today{outline:2px solid var(--blue);outline-offset:-1px;border-radius:3px}

.loading{text-align:center;padding:50px 0;color:var(--text3)}
.error{padding:14px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius-sm);margin:16px 0}
.footer{border-top:1px solid var(--border);padding:16px 20px;margin-top:40px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:6px 20px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/ordine-zi/legislatura-${LEG}.json`;

const MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
                   'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const DAYS_RO = ['L','M','M','J','V','S','D'];
let allSessions = [], sessMap = {};
const TODAY = new Date().toISOString().slice(0,10);
const pad = n => String(n).padStart(2,'0');

/* ── item / docs rendering ── */

function toggleCard(h){ h.closest('.session-card').classList.toggle('open'); }

function toggleDocs(btn){
  const list = btn.closest('.item-row').querySelector('.docs-list');
  const open = list.classList.toggle('open');
  btn.textContent = open ? 'documente ▲' : `documente (${btn.dataset.count}) ▼`;
}

function renderDocs(docs){
  if(!docs||!docs.length) return '';
  return`<div class="docs-list">${docs.map(d=>{
    const pdf = d.pdf_url ? `<a href="${d.pdf_url}" target="_blank" rel="noopener" style="font-size:10px;flex-shrink:0">PDF ↗</a>` : '';
    const src = d.sursa==='caseta' ? '<span class="doc-src">caseta</span>' : '';
    return`<div class="doc-row"><span class="doc-date">${d.data||''}</span><span class="doc-title">${d.titlu}</span>${src}${pdf}</div>`;
  }).join('')}</div>`;
}

function renderItems(items){
  if(!items||!items.length) return '<p style="color:var(--text3);font-size:12px;padding:4px 0">Niciun punct.</p>';
  return items.map(it=>{
    const pos = it.pozitie!=null ? String(it.pozitie) : '–';
    const pdf = it.doc_pdf_url ? `<a class="item-pdf" href="${it.doc_pdf_url}" target="_blank" rel="noopener">PDF ↗</a>` : '';
    const nr = it.nr_inregistrare ? `<div style="color:var(--text3);font-size:10px;margin-top:1px">${it.nr_inregistrare}</div>` : '';
    const hasDocs = it.docs&&it.docs.length;
    const tog = hasDocs ? `<button class="docs-toggle" onclick="toggleDocs(this)" data-count="${it.docs.length}">documente (${it.docs.length}) ▼</button>` : '';
    return`<div class="item-row"><div class="item-main">
      <span class="item-pos">${pos}.</span>
      <span class="item-desc">${it.descriere||'—'}${nr}</span>
      ${tog}${pdf}
    </div>${renderDocs(it.docs)}</div>`;
  }).join('');
}

function renderSession(s){
  const dateEnd = s.session_date_end&&s.session_date_end!==s.session_date?` – ${s.session_date_end}`:'';
  const n = (s.items||[]).length;
  const pdf = s.pdf_url ? `<a href="${s.pdf_url}" target="_blank" rel="noopener" class="src-link">PDF ↗</a>` : '';
  const src = s.source_url ? `<a class="src-link" href="${s.source_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">cdep.ro ↗</a>` : '';
  const det = `<a class="src-link" href="sesiune.html?leg=${LEG}&date=${s.session_date}" onclick="event.stopPropagation()">detalii ↗</a>`;
  return`<div class="session-card" id="s-${s.id}">
    <div class="session-header" onclick="toggleCard(this)">
      <div class="session-date">${s.session_date||''}${dateEnd}</div>
      <div class="session-title-text">${s.titlu||''}</div>
      <div class="session-meta"><span class="pill">${n} pct.</span>${pdf}${src}${det}<span class="chevron">▶</span></div>
    </div>
    <div class="session-body">${renderItems(s.items)}</div>
  </div>`;
}

/* ── full calendar ── */

function renderMonth(y, m){
  const first = new Date(y, m-1, 1).getDay();
  const dim   = new Date(y, m, 0).getDate();
  const off   = (first+6)%7;
  let cells = '<div></div>'.repeat(off);
  for(let d=1; d<=dim; d++){
    const ds = `${y}-${pad(m)}-${pad(d)}`;
    const s  = sessMap[ds];
    const tc = ds===TODAY ? ' cd-today' : '';
    if(s){
      const isEnd = s.session_date!==ds;
      const tip   = isEnd ? 'continuare' : `${(s.items||[]).length} puncte`;
      cells += `<a class="cd${isEnd?' cd-cont':' cd-s'}${tc}" href="sesiune.html?leg=${LEG}&date=${s.session_date}" title="${tip}">${d}</a>`;
    } else {
      cells += `<div class="cd${tc}">${d}</div>`;
    }
  }
  return`<div class="cal-month-block">
    <div class="cal-month-title">${MONTHS_RO[m-1]}</div>
    <div class="cdg cdg-hdr">${DAYS_RO.map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cdg">${cells}</div>
  </div>`;
}

function renderFullCalendar(){
  const dates = Object.keys(sessMap).sort();
  if(!dates.length) return '<p style="color:var(--text3)">Nicio ședință.</p>';
  const [sy,sm] = dates[0].split('-').map(Number);
  const [ey,em] = dates[dates.length-1].split('-').map(Number);
  let html='<div class="cal-full">', y=sy, m=sm, curY=-1;
  while(y<ey||(y===ey&&m<=em)){
    if(y!==curY){
      html+=`<div class="cal-year-sep">${y}</div>`;
      curY=y;
    }
    html+=renderMonth(y,m);
    if(++m>12){m=1;y++;}
  }
  return html+'</div>';
}

/* ── view toggle ── */

function setView(v, push=true){
  if(push) history.replaceState({},'',(v==='list'?`?leg=${LEG}`:`?leg=${LEG}&view=calendar`));
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  const el = document.getElementById('sessions');
  if(v==='calendar'){
    el.innerHTML = renderFullCalendar();
  } else {
    el.innerHTML = `<div class="session-list">${allSessions.map(renderSession).join('')}</div>`;
    el.querySelector('.session-card')?.classList.add('open');
  }
}

/* ── load ── */

async function load(){
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    allSessions = d.data;
    allSessions.sort((a,b)=>(b.session_date||'').localeCompare(a.session_date||''));
    sessMap = {};
    allSessions.forEach(s=>{
      sessMap[s.session_date] = s;
      if(s.session_date_end&&s.session_date_end!==s.session_date&&!sessMap[s.session_date_end])
        sessMap[s.session_date_end] = s;
    });
    const total = allSessions.reduce((s,x)=>s+(x.items||[]).length,0);
    const view = getParam('view')==='calendar' ? 'calendar' : 'list';
    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-wrap:wrap">
        <h1 style="margin:0">Ordinea de zi — legislatura ${LEG}</h1>
        <div class="view-tabs">
          <button class="view-tab" data-view="list" onclick="setView('list')">Listă</button>
          <button class="view-tab" data-view="calendar" onclick="setView('calendar')">Calendar</button>
        </div>
        <div class="view-toggle">${NAV.renderLegToggle(LEG,'ordine-zi.html',[2024])}</div>
      </div>
      <p class="sub">${allSessions.length} ședințe · ${total} puncte · Camera Deputaților</p>
      <div id="sessions"></div>`;
    setView(view, false);
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL}: ${e.message}</div>`;
  }
}
load();
</script>
<script>
NAV.renderHeader();
NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${DATA_URL}">${DATA_URL}</a>`);
</script>
<script src="i18n.js"></script>
</body>
</html>
