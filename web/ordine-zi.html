<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordinea de zi — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Ordinea de zi a ședințelor Camerei Deputaților.">
<meta property="og:type" content="website">
<meta property="og:title" content="Ordinea de zi — Camera Deputaților">
<meta property="og:description" content="Ordinea de zi a ședințelor Camerei Deputaților.">
<meta property="og:url" content="https://lab.gov2.ro/cdep/ordine-zi.html">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-5.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}

/* view toggle */
.view-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius-sm);padding:2px;flex-shrink:0}
.view-tab{padding:4px 14px;border-radius:4px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--text2);font-family:var(--font)}
.view-tab.active{background:var(--bg);color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* list view */
.session-list{display:flex;flex-direction:column;gap:10px}
.session-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.session-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;background:var(--bg2)}
.session-header:hover{background:var(--bg3)}
.session-date{font-size:14px;font-weight:600;min-width:130px;flex-shrink:0}
.session-title-text{flex:1;font-size:13px;color:var(--text2);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
.pill{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg3);color:var(--text2);white-space:nowrap;font-weight:500}
.chevron{font-size:11px;color:var(--text3);transition:transform 0.15s;flex-shrink:0}
.session-card.open .chevron{transform:rotate(90deg)}
.session-body{display:none;padding:16px;border-top:1px solid var(--border)}
.session-card.open .session-body{display:block}

/* items */
.item-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap}
.item-row:last-child{border-bottom:none}
.item-main{display:flex;align-items:flex-start;gap:8px;width:100%}
.item-pos{font-size:11px;color:var(--text3);min-width:24px;flex-shrink:0;padding-top:2px;font-family:var(--mono)}
.item-desc{flex:1;line-height:1.45;color:var(--text)}
.item-pdf{font-size:11px;flex-shrink:0;white-space:nowrap;padding-top:2px}
.item-desc b{font-weight:600}
.item-desc i{color:var(--text2);font-size:12px}
.src-link{font-size:11px;color:var(--text3);padding:2px 6px;border-radius:3px;border:1px solid var(--border);white-space:nowrap}
.src-link:hover{color:var(--text2);text-decoration:none!important;border-color:var(--border2)}
.docs-toggle{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;padding:3px 0 0;white-space:nowrap;font-family:var(--font)}
.docs-toggle:hover{color:var(--blue)}
.docs-list{display:none;width:100%;padding:6px 0 2px 32px}
.docs-list.open{display:block}
.doc-row{display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:12px;border-bottom:1px dotted var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-date{color:var(--text3);white-space:nowrap;min-width:80px;flex-shrink:0;font-family:var(--mono);font-size:11px}
.doc-title{flex:1;color:var(--text2)}
.doc-src{font-size:10px;color:var(--text3);flex-shrink:0}

/* calendar view */
.cal-wrap{max-width:680px}
.cal-nav{display:flex;align-items:center;gap:0;margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.cal-btn{background:var(--bg2);border:none;border-right:1px solid var(--border);cursor:pointer;padding:8px 18px;font-size:20px;color:var(--text2);line-height:1;flex-shrink:0}
.cal-btn:last-child{border-right:none;border-left:1px solid var(--border)}
.cal-btn:hover{background:var(--bg3);color:var(--text)}
.cal-title{flex:1;text-align:center;font-size:16px;font-weight:600;padding:8px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{margin-bottom:4px}
.cal-hdr > div{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase}
.cal-day{border-radius:var(--radius-sm);min-height:58px;padding:6px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none!important}
.cal-dn{font-size:13px;color:var(--text2);line-height:1;font-variant-numeric:tabular-nums}
.cal-si{font-size:10px;color:var(--text3);text-align:center;line-height:1.3}
.cal-sess{background:var(--blue-bg);cursor:pointer}
.cal-sess:hover{background:var(--blue)}
.cal-sess:hover .cal-dn,.cal-sess:hover .cal-si{color:#fff}
.cal-sess .cal-dn{color:var(--text);font-weight:600}
.cal-sess .cal-si{color:var(--blue-text)}
.cal-cont{background:var(--bg2);border:1px dashed var(--border2)}
.cal-cont .cal-dn{color:var(--text2)}
.cal-cont .cal-si{color:var(--text3)}
.cal-cont:hover{background:var(--blue-bg)}
.cal-today .cal-dn{color:var(--blue);font-weight:700}
@media(max-width:500px){.cal-day{min-height:44px;padding:4px 2px}.cal-si{display:none}}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/ordine-zi/legislatura-${LEG}.json`;

const MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
                   'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const DAYS_RO = ['Lu','Ma','Mi','Jo','Vi','Sâ','Du'];
let allSessions = [], sessMap = {}, calYear = 0, calMonth = 0;
const TODAY = new Date().toISOString().slice(0,10);

/* ── shared item/docs rendering ── */

function toggleCard(header){
  header.closest('.session-card').classList.toggle('open');
}

function toggleDocs(btn){
  const list = btn.closest('.item-row').querySelector('.docs-list');
  const open = list.classList.toggle('open');
  btn.textContent = open ? 'documente ▲' : `documente (${btn.dataset.count}) ▼`;
}

function renderDocs(docs){
  if(!docs||!docs.length) return '';
  const rows = docs.map(d=>{
    const pdf = d.pdf_url ? `<a href="${d.pdf_url}" target="_blank" rel="noopener" style="font-size:11px;flex-shrink:0">PDF ↗</a>` : '';
    const src = d.sursa==='caseta' ? '<span class="doc-src">caseta</span>' : '';
    return`<div class="doc-row"><span class="doc-date">${d.data||''}</span><span class="doc-title">${d.titlu}</span>${src}${pdf}</div>`;
  }).join('');
  return`<div class="docs-list">${rows}</div>`;
}

function renderItems(items){
  if(!items||!items.length) return '<p style="color:var(--text3);font-size:13px">Niciun punct pe ordinea de zi.</p>';
  return items.map(it=>{
    const pos = it.pozitie!=null ? String(it.pozitie) : '–';
    const pdf = it.doc_pdf_url ? `<a class="item-pdf" href="${it.doc_pdf_url}" target="_blank" rel="noopener">PDF ↗</a>` : '';
    const nr = it.nr_inregistrare ? `<div style="color:var(--text3);font-size:11px;margin-top:2px">${it.nr_inregistrare}</div>` : '';
    const docsHtml = renderDocs(it.docs);
    const docsToggle = (it.docs&&it.docs.length)
      ? `<button class="docs-toggle" onclick="toggleDocs(this)" data-count="${it.docs.length}">documente (${it.docs.length}) ▼</button>`
      : '';
    return`<div class="item-row">
      <div class="item-main">
        <span class="item-pos">${pos}.</span>
        <span class="item-desc">${it.descriere||'—'}${nr}</span>
        ${docsToggle}${pdf}
      </div>
      ${docsHtml}
    </div>`;
  }).join('');
}

function renderSession(s){
  const dateEnd = s.session_date_end && s.session_date_end!==s.session_date ? ` – ${s.session_date_end}` : '';
  const itemCount = (s.items||[]).length;
  const pdf = s.pdf_url ? `<a href="${s.pdf_url}" target="_blank" rel="noopener" style="font-size:12px">PDF ↗</a>` : '';
  const src = s.source_url ? `<a class="src-link" href="${s.source_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">cdep.ro ↗</a>` : '';
  const sesLink = `<a class="src-link" href="sesiune.html?leg=${LEG}&date=${s.session_date}" onclick="event.stopPropagation()">detalii ↗</a>`;
  return`<div class="session-card" id="s-${s.id}">
    <div class="session-header" onclick="toggleCard(this)">
      <div class="session-date">${s.session_date||''}${dateEnd}</div>
      <div class="session-title-text">${s.titlu||''}</div>
      <div class="session-meta">
        <span class="pill">${itemCount} puncte</span>
        ${pdf}${src}${sesLink}
        <span class="chevron">▶</span>
      </div>
    </div>
    <div class="session-body">${renderItems(s.items)}</div>
  </div>`;
}

/* ── calendar view ── */

function renderCalendarView(){
  const first = new Date(calYear, calMonth-1, 1).getDay();
  const dim = new Date(calYear, calMonth, 0).getDate();
  const offset = (first+6)%7;
  let cells = `<div class="cal-day" style="min-height:0"></div>`.repeat(offset);
  for(let d=1; d<=dim; d++){
    const ds = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const s = sessMap[ds];
    const isToday = ds===TODAY;
    if(s){
      const isEnd = s.session_date!==ds;
      const n = (s.items||[]).length;
      const cls = `cal-day cal-sess${isEnd?' cal-cont':''}${isToday?' cal-today':''}`;
      cells += `<a class="${cls}" href="sesiune.html?leg=${LEG}&date=${s.session_date}">
        <span class="cal-dn">${d}</span>
        <span class="cal-si">${isEnd?'cont.':n+' pct.'}</span>
      </a>`;
    } else {
      cells += `<div class="cal-day${isToday?' cal-today':''}"><span class="cal-dn">${d}</span></div>`;
    }
  }
  return `<div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-btn" onclick="calAdj(-1)">‹</button>
      <span class="cal-title">${MONTHS_RO[calMonth-1]} ${calYear}</span>
      <button class="cal-btn" onclick="calAdj(1)">›</button>
    </div>
    <div class="cal-grid cal-hdr">${DAYS_RO.map(d=>`<div>${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}

function calAdj(dir){
  calMonth += dir;
  if(calMonth<1){calMonth=12;calYear--;}
  if(calMonth>12){calMonth=1;calYear++;}
  document.getElementById('sessions').innerHTML = renderCalendarView();
}

/* ── view toggle ── */

function setView(v, push=true){
  if(push) history.replaceState({},'',(v==='list'?`?leg=${LEG}`:`?leg=${LEG}&view=calendar`));
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  const el = document.getElementById('sessions');
  if(v==='calendar'){
    el.innerHTML = renderCalendarView();
  } else {
    el.innerHTML = `<div class="session-list">${allSessions.map(renderSession).join('')}</div>`;
    el.querySelector('.session-card')?.classList.add('open');
  }
}

/* ── load ── */

async function load(){
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    allSessions = d.data;
    allSessions.sort((a,b)=>(b.session_date||'').localeCompare(a.session_date||''));

    sessMap = {};
    allSessions.forEach(s=>{
      sessMap[s.session_date] = s;
      if(s.session_date_end && s.session_date_end!==s.session_date && !sessMap[s.session_date_end])
        sessMap[s.session_date_end] = s;
    });

    // Default calendar to most recent session's month
    if(allSessions.length){
      const d0 = new Date(allSessions[0].session_date+'T00:00:00');
      calYear = d0.getFullYear(); calMonth = d0.getMonth()+1;
    } else {
      const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth()+1;
    }

    const totalItems = allSessions.reduce((s,sess)=>s+(sess.items||[]).length,0);
    const view = getParam('view')==='calendar' ? 'calendar' : 'list';

    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
        <h1 style="margin:0">Ordinea de zi — legislatura ${LEG}</h1>
        <div class="view-tabs">
          <button class="view-tab" data-view="list" onclick="setView('list')">Listă</button>
          <button class="view-tab" data-view="calendar" onclick="setView('calendar')">Calendar</button>
        </div>
        <div class="view-toggle">${NAV.renderLegToggle(LEG,'ordine-zi.html',[2024])}</div>
      </div>
      <p class="sub">${allSessions.length} ședințe · ${totalItems} puncte totale · Camera Deputaților</p>
      <div id="sessions"></div>
    `;
    setView(view, false);
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Asigură-te că <code>data/v1/ordine-zi/legislatura-${LEG}.json</code> există.</div>`;
  }
}
load();
</script>
<script>
NAV.renderHeader();
NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${DATA_URL}">${DATA_URL}</a>`);
</script>
<script src="i18n.js"></script>
</body>
</html>
