<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detaliu vot · Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Detaliu vot Camera Deputaților">
<meta property="og:type" content="website">
<meta property="og:title" content="Vot">
<meta property="og:description" content="Detaliu vot Camera Deputaților">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-5.png">
<meta name="twitter:card" content="summary">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-text:#3B6D11;
  --red-text:#A32D2D;--red-bg:#FCEBEB;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:28px}
.meta-card{padding:12px;background:var(--bg2);border-radius:var(--radius);border-left:3px solid var(--blue)}
.meta-card .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.meta-card .value{font-size:16px;font-weight:600;color:var(--text)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat-card{padding:16px;background:var(--bg2);border-radius:var(--radius);text-align:center}
.stat-num{font-size:24px;font-weight:600;margin-bottom:4px;color:var(--text)}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:20px}
th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:600;background:var(--bg2)}
td.num,th.num{text-align:right;font-family:var(--mono)}
.vote-option{padding:2px 6px;border-radius:3px;font-size:11px;font-weight:600;white-space:nowrap}
.vote-yes{background:#d4edda;color:var(--green-text)}
.vote-no{background:var(--red-bg);color:var(--red-text)}
.vote-abstain{background:var(--amber-bg);color:var(--amber-text)}
.vote-absent{background:var(--bg3);color:var(--text3)}
.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.back-link{display:inline-block;margin-bottom:20px;color:var(--blue)}
.back-link:hover{text-decoration:underline}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <a class="back-link" href="voturi.html" id="back-link">← Înapoi la voturi</a>
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const ID = Number(getParam('id'));

if(!ID){
  document.getElementById('content').innerHTML = '<div class="error">ID vot lipsă. Accesați din voturi.html.</div>';
  document.getElementById('back-link').href = 'voturi.html';
}

const DATA_URL = `data/v1/voturi/${LEG}/${ID}.json`;

function formatDate(isoDate){
  const d = new Date(isoDate);
  return d.toLocaleDateString('ro-RO',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
}

function getVoteLabel(opt){
  return opt==='yes'?'Pentru':opt==='no'?'Împotrivă':opt==='abstain'?'Abținere':'Absent';
}

function getVoteClass(opt){
  return opt==='yes'?'vote-yes':opt==='no'?'vote-no':opt==='abstain'?'vote-abstain':'vote-absent';
}

async function load(){
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    const v = d.data;

    document.getElementById('back-link').href = `voturi.html?leg=${LEG}`;

    const passed = v.counts.pentru > (v.counts.prezenti / 2);
    const outcome = passed ? 'ADOPTAT' : 'RESPINS';
    const outcomeColor = passed ? 'var(--green-text)' : 'var(--red-text)';

    // Group votes by party
    const byParty = {};
    (v.votes || []).forEach(vot=>{
      if(!byParty[vot.party]) byParty[vot.party]={yes:0,no:0,abstain:0,absent:0,list:[]};
      byParty[vot.party].list.push(vot);
      const optMap = {yes:'yes',no:'no',abstain:'abstain',absent:'absent'};
      const opt = optMap[vot.option] || 'absent';
      byParty[vot.party][opt]++;
    });

    // Calculate party discipline (% voting same as majority per party)
    const partyDiscipline = Object.entries(byParty).map(([p,data])=>{
      const total = data.yes + data.no + data.abstain;
      const majority = Math.max(data.yes, data.no, data.abstain);
      const rate = total > 0 ? Math.round((majority / total) * 100) : 0;
      return {party:p, rate, yes:data.yes, no:data.no, abstain:data.abstain, total:data.list.length};
    }).sort((a,b)=>b.rate-a.rate);

    const partyRows = partyDiscipline.map((pd,i)=>
      `<tr>
        <td>${i+1}</td>
        <td><strong>${pd.party}</strong></td>
        <td class="num">${pd.yes}</td>
        <td class="num">${pd.no}</td>
        <td class="num">${pd.abstain}</td>
        <td class="num">${pd.total}</td>
        <td class="num"><strong>${pd.rate}%</strong></td>
      </tr>`
    ).join('');

    const deputyRows = (v.votes || []).map((vot,i)=>
      `<tr>
        <td class="num">${i+1}</td>
        <td>${vot.voter_name}</td>
        <td>${vot.party}</td>
        <td><span class="vote-option ${getVoteClass(vot.option)}">${getVoteLabel(vot.option)}</span></td>
      </tr>`
    ).join('');

    document.getElementById('content').innerHTML = `
      <h1>${v.descriere}</h1>
      <p class="sub">${formatDate(v.timestamp)}</p>

      <div class="meta">
        <div class="meta-card">
          <div class="label">Rezultat</div>
          <div class="value" style="color:${outcomeColor}">${outcome}</div>
        </div>
        <div class="meta-card">
          <div class="label">Pentru / Prezenți</div>
          <div class="value">${v.counts.pentru} / ${v.counts.prezenti}</div>
        </div>
        <div class="meta-card">
          <div class="label">ID vot</div>
          <div class="value" style="font-family:var(--mono);font-size:14px">${v.cdep_idv}</div>
        </div>
      </div>

      <h2>Rezumat vot</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" style="color:var(--green-text)">${v.counts.pentru}</div>
          <div class="stat-label">Pentru</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--red-text)">${v.counts.contra}</div>
          <div class="stat-label">Împotrivă</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--amber-text)">${v.counts.abtineri}</div>
          <div class="stat-label">Abțineri</div>
        </div>
        <div class="stat-card">
          <div class="stat-num">${v.counts.nu_au_votat}</div>
          <div class="stat-label">Nu au votat</div>
        </div>
      </div>

      <h2>Disciplina de partid</h2>
      <table>
        <thead><tr>
          <th class="num">#</th>
          <th>Partid</th>
          <th class="num">Pentru</th>
          <th class="num">Împotrivă</th>
          <th class="num">Abțineri</th>
          <th class="num">Total</th>
          <th class="num">Coeziune</th>
        </tr></thead>
        <tbody>${partyRows}</tbody>
      </table>

      <h2>Voturile deputaților</h2>
      <table>
        <thead><tr>
          <th class="num">#</th>
          <th>Deputat</th>
          <th>Partid</th>
          <th>Vot</th>
        </tr></thead>
        <tbody>${deputyRows}</tbody>
      </table>
    `;
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL}<br>Eroare: ${e.message}</div>`;
  }
}

if(ID) load();
</script>
<script src="assets/nav.js"></script>
<script>
NAV.renderHeader();
const leg = Number(new URL(location).searchParams.get('leg') || 2024);
const id = Number(new URL(location).searchParams.get('id'));
const jsonUrl = `data/v1/voturi/${leg}/${id}.json`;
NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${jsonUrl}">${jsonUrl}</a>`);
</script>
<script src="i18n.js"></script>
</body>
</html>
