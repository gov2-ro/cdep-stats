<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Fiecare deputat ca un cerc: prezență, propuneri legislative, interpelări · Camera Deputaților 2024">
<meta property="og:type" content="website">
<meta property="og:title" content="Activitate parlamentară — vizualizare">
<meta property="og:description" content="Fiecare deputat ca un cerc: prezență, propuneri legislative, interpelări · Camera Deputaților 2024">
<meta property="og:url" content="https://lab.gov2.ro/cdep/deputati-activitate.html">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}

.toolbar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 0}
.toolbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.view-btn{padding:5px 12px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}
.view-btn:disabled{opacity:0.4;cursor:not-allowed}
.count-badge{font-size:12px;color:var(--text3);white-space:nowrap;margin-left:auto}

.main{max-width:1200px;margin:0 auto;padding:20px 24px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:20px}

.circle-grid{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:8px 0}
.dep-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;text-decoration:none;color:inherit}
.dep-item:hover .dep-circle{opacity:0.82}
.dep-circle{border-radius:50%;overflow:visible;position:relative;flex-shrink:0;transition:width .25s,height .25s}
.dep-circle-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;position:relative}
.dep-circle-inner img{width:100%;height:100%;object-fit:cover;display:block}
.dep-initials{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;border-radius:50%;font-size:inherit}
.dep-badge{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:3px;font-size:9px;color:#fff;font-weight:700;white-space:nowrap;pointer-events:none;line-height:1.4}
.dep-badge img{width:10px;height:10px;object-fit:contain;flex-shrink:0}
.dep-name{font-size:9px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;line-height:1.3}
.dep-value{font-size:8px;color:var(--text3);text-align:center;line-height:1.3}
.dep-item.zero-val .dep-circle-inner{opacity:0.4}

.tooltip{position:fixed;z-index:100;background:rgba(0,0,0,.82);color:#fff;font-size:12px;padding:7px 10px;border-radius:6px;pointer-events:none;max-width:240px;line-height:1.5;display:none}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.dep-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dep-table{width:100%;border-collapse:collapse;font-size:12px;min-width:680px}
.dep-table thead th{padding:9px 10px;background:var(--bg2);border-bottom:2px solid var(--border);font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;user-select:none;text-align:left}
.dep-table thead th.sort-active{color:var(--blue);border-bottom-color:var(--blue)}
.dep-table thead th.sort-name{cursor:default;min-width:160px;position:sticky;left:0;z-index:1;background:var(--bg2)}
.dep-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
.dep-table tbody tr:hover{background:var(--bg2)}
.dep-table tbody td{padding:6px 10px;vertical-align:middle}
.dep-table td.td-name{position:sticky;left:0;background:var(--bg);white-space:nowrap;z-index:1}
.dep-table tbody tr:hover td.td-name{background:var(--bg2)}
.bar-cell-val{font-size:11px;margin-bottom:3px;font-variant-numeric:tabular-nums}
.bar-cell-track{height:3px;background:var(--bg3);border-radius:2px;width:80px}
.bar-cell-fill{height:100%;border-radius:2px;opacity:0.75}
.dep-table .null-val{color:var(--text3);font-style:italic;font-size:11px}

/* Metric buttons */
.metric-btns{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.metric-btn{padding:5px 10px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;border-right:1px solid var(--border2)}
.metric-btn:last-child{border-right:none}
.metric-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}

/* Party dropdown */
.party-dd{position:relative;flex-shrink:0}
.party-dd-btn{padding:5px 10px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);cursor:pointer}
.party-dd-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:50;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);min-width:200px;box-shadow:0 8px 24px rgba(0,0,0,.15)}
.party-dd-pop.open{display:block}
.party-dd-hdr{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text3)}
.party-dd-hdr a{cursor:pointer;color:var(--blue)}
.party-dd-hdr a:last-child{color:var(--text3)}
.party-dd-row{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px}
.party-dd-row:last-child{border-bottom:none}
.party-dd-row input[type=checkbox]{flex-shrink:0;accent-color:var(--blue);cursor:pointer}
.party-dd-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.party-dd-count-label{margin-left:auto;font-size:10px;color:var(--text3)}

@media(max-width:600px){
  .metric-btns{flex-wrap:wrap;gap:4px;border:none}
  .metric-btn{border-radius:var(--radius-sm);border:1px solid var(--border2)}
}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="view-toggle">
      <button class="view-btn" id="btn-circles">⬤ Cercuri</button>
      <button class="view-btn active" id="btn-table">≡ Tabel</button>
    </div>
    <div class="metric-btns" id="metric-btns" style="display:none">
      <button class="metric-btn active" data-metric="activitate_sedinte">Ședințe</button>
      <button class="metric-btn" data-metric="activitate_luari_cuvant">Cuvânt</button>
      <button class="metric-btn" data-metric="activitate_propuneri_legislative">Propuneri</button>
      <button class="metric-btn" data-metric="activitate_legi_promulgate">Legi</button>
      <button class="metric-btn" data-metric="activitate_declaratii_politice">Declarații</button>
      <button class="metric-btn" data-metric="activitate_intrebari_interpelari">Întrebări</button>
    </div>
    <div class="party-dd" id="party-dd">
      <button class="party-dd-btn" id="party-dd-btn">Partide <span id="party-dd-count"></span> ▾</button>
      <div class="party-dd-pop" id="party-dd-pop">
        <div class="party-dd-hdr">
          <span id="party-dd-total"></span>
          <a onclick="selectAllParties()">Toate</a>
          <a onclick="selectNoParties()">Niciuna</a>
        </div>
      </div>
    </div>
    <span class="count-badge" id="count-badge"></span>
    <div class="view-toggle" id="leg-toggle"></div>
  </div>
</div>

<div class="main">
  <h1>Activitate parlamentară</h1>
  <p class="sub" id="page-sub">Fiecare cerc = un deputat · mărimea = metrica selectată</p>
  <div id="circle-grid" class="circle-grid">
    <div class="loading" data-i18n="loading">Se încarcă…</div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div id="site-footer"></div>

<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/stats/activitate-deputies-${LEG}.json`;

// Leg toggle
(function(){
  document.getElementById('leg-toggle').innerHTML = [2024,2020].map(l =>
    `<button class="view-btn${l===LEG?' active':''}" onclick="location.href='deputati-activitate.html?leg=${l}'">${l}</button>`
  ).join('');
})();

const METRIC_LABELS = {
  activitate_sedinte: 'Ședințe',
  activitate_luari_cuvant: 'Luări de cuvânt',
  activitate_propuneri_legislative: 'Propuneri legislative',
  activitate_legi_promulgate: 'Legi promulgate',
  activitate_declaratii_politice: 'Declarații politice',
  activitate_intrebari_interpelari: 'Întrebări/interpelări',
};

const PARTY_COLORS = {
  'PSD':'#185FA5','PNL':'#993C1D','USR':'#3B6D11','AUR':'#854F0B',
  'UDMR':'#5F5E5A','SOSRO':'#A32D2D','POT':'#553378','PMP':'#6D5A9E',
  'S.O.S.':'#A32D2D','Neafiliat':'#777',
};
function partyColor(p){return PARTY_COLORS[p]||'#777';}

function normRo(s) {
  return (s || '')
    .replace(/[ăâ]/gi, 'a').replace(/î/gi, 'i')
    .replace(/[țţ]/gi, 't').replace(/[șş]/gi, 's')
    .toLowerCase();
}

function partyBadgesHtml(d) {
  const hist = d.partid_history || [{short: d.partid, current: true}];
  if (!hist.length) return '';
  return hist.map(h => {
    const color = partyColor(h.short);
    const strike = !h.current ? 'text-decoration:line-through;opacity:0.5;' : '';
    return `<span style="font-size:10px;padding:1px 5px;border-radius:3px;background:${color}22;color:${color};${strike}">${h.short}</span>`;
  }).join(' ');
}

function fmtVal(v){
  if(v==null||v===0)return '0';
  return v.toLocaleString('ro-RO');
}

function circleSize(v,maxV){
  if(!v||maxV<=0)return 12;
  return Math.round(Math.max(12,Math.min(68,12+56*Math.sqrt(v/maxV))));
}

function initials(name){
  const parts=name.split(/[\s,]+/).filter(Boolean);
  if(parts.length>=2)return(parts[0][0]+parts[1][0]).toUpperCase();
  return name.slice(0,2).toUpperCase();
}

let ALL=[],PARTIES={},activeParties=new Set(),metric='activitate_sedinte';
let viewMode='table', sortKey=null, sortDir='desc';

const COLUMNS=[
  {key:'activitate_sedinte',               label:'Ședințe',    fmt:v=>fmtVal(v)},
  {key:'activitate_luari_cuvant',          label:'Cuvânt',     fmt:v=>fmtVal(v)},
  {key:'activitate_propuneri_legislative', label:'Propuneri',  fmt:v=>fmtVal(v)},
  {key:'activitate_legi_promulgate',       label:'Legi',       fmt:v=>fmtVal(v)},
  {key:'activitate_declaratii_politice',   label:'Declarații', fmt:v=>fmtVal(v)},
  {key:'activitate_intrebari_interpelari', label:'Întrebări',  fmt:v=>fmtVal(v)},
];

function filtered(){
  return ALL.filter(d=>activeParties.has(d.partid));
}
function sorted(deps){
  return[...deps].sort((a,b)=>(b[metric]||0)-(a[metric]||0));
}

function renderTable(){
  const deps=filtered();
  if(!deps.length)return'<p style="color:var(--text3);padding:40px 0">Niciun deputat.</p>';

  const sk=sortKey||COLUMNS[0].key;
  const rows=[...deps].sort((a,b)=>{
    const av=a[sk]??null,bv=b[sk]??null;
    if(av===null&&bv===null)return 0;
    if(av===null)return 1;
    if(bv===null)return-1;
    return sortDir==='asc'?av-bv:bv-av;
  });

  const maxes=Object.fromEntries(COLUMNS.map(c=>[c.key,Math.max(0,...deps.map(d=>Math.abs(d[c.key]??0)))]));

  const headers=COLUMNS.map(c=>{
    const active=c.key===sk;
    const arrow=active?(sortDir==='desc'?' ↓':' ↑'):'';
    return`<th class="dep-table-th${active?' sort-active':''}" data-sort="${c.key}" style="min-width:90px">${c.label}${arrow}</th>`;
  }).join('');

  const bodyRows=rows.map(d=>{
    const url=`deputat.html?id=${d.cdep_idm}&leg=${LEG}`;
    const hist = d.partid_history || [{short: d.partid, current: true}];
    const currentParty = hist.length ? hist[hist.length - 1].short : d.partid;
    const color=partyColor(currentParty);
    const ini=initials(d.name);
    const shortName=d.name.split(',')[0].trim();
    const photoHtml=d.image
      ?`<img src="${d.image}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='flex'" style="width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0"><div style="display:none;width:28px;height:28px;border-radius:50%;background:${color};align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${ini}</div>`
      :`<div style="width:28px;height:28px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0">${ini}</div>`;
    const badgesHtml=partyBadgesHtml(d);

    const cells=COLUMNS.map(c=>{
      const v=d[c.key];
      const active=c.key===sk;
      if(v==null)return`<td class="dep-table-td"><span class="null-val">—</span></td>`;
      const mx=maxes[c.key];
      const barW=mx>0?Math.min(100,Math.abs(v)/mx*100).toFixed(1):0;
      const valColor=active?'var(--blue)':'var(--text2)';
      const fillColor=active?'var(--blue)':'var(--border2)';
      return`<td class="dep-table-td">
        <div class="bar-cell-val" style="color:${valColor}">${c.fmt(v)}</div>
        <div class="bar-cell-track"><div class="bar-cell-fill" style="width:${barW}%;background:${fillColor}"></div></div>
      </td>`;
    }).join('');

    return`<tr class="dep-table-row" onclick="location.href='${url}'">
      <td class="dep-table-td td-name">
        <div style="display:flex;align-items:center;gap:8px">
          ${photoHtml}
          <div>
            <div style="font-size:12px;color:var(--text);font-weight:500">${shortName}</div>
            <div style="display:flex;gap:4px;flex-wrap:wrap">${badgesHtml}</div>
          </div>
        </div>
      </td>${cells}
    </tr>`;
  }).join('');

  return`<div class="dep-table-wrap">
    <table class="dep-table">
      <thead><tr>
        <th class="dep-table-th sort-name">Deputat</th>${headers}
      </tr></thead>
      <tbody>${bodyRows}</tbody>
    </table>
  </div>`;
}

function pushState(){
  const params=new URLSearchParams();
  const leg=getParam('leg');
  if(leg&&leg!=='2024')params.set('leg',leg);
  if(metric!==COLUMNS[0].key)params.set('metric',metric);
  const allKeys=[...activeParties].sort().join(',');
  const fullKeys=[...new Set(ALL.map(d=>d.partid))].sort().join(',');
  if(allKeys!==fullKeys)params.set('parties',allKeys);
  if(viewMode!=='table')params.set('view',viewMode);
  const qs=params.toString();
  history.replaceState(null,'',qs?'?'+qs:location.pathname);
}

function applyURLState(){
  const params=new URLSearchParams(location.search);
  if(params.has('metric')){
    const m=params.get('metric');
    if(COLUMNS.some(c=>c.key===m)){
      metric=m;
      document.querySelectorAll('.metric-btn').forEach(b=>
        b.classList.toggle('active',b.dataset.metric===metric));
    }
  }
  if(params.has('parties')){
    const requested=new Set(params.get('parties').split(',').filter(Boolean));
    activeParties=new Set([...requested].filter(p=>ALL.some(d=>d.partid===p)));
    document.querySelectorAll('.party-dd-row input[type=checkbox]').forEach(cb=>{
      cb.checked=activeParties.has(cb.dataset.partid);
    });
    updatePartyDropdownBtn();
  }
  if(params.get('view')==='circles'){
    viewMode='circles';
    document.getElementById('btn-circles').classList.add('active');
    document.getElementById('btn-table').classList.remove('active');
    document.getElementById('metric-btns').style.display='';
    if(!sortKey)sortKey=metric;
  }
}

function render(){
  const unfiltered=filtered();
  document.getElementById('count-badge').textContent=unfiltered.length+' deputați';
  const grid=document.getElementById('circle-grid');

  if(viewMode==='table'){
    document.getElementById('page-sub').textContent='';
    grid.innerHTML=renderTable();
    return;
  }

  document.getElementById('page-sub').textContent=
    `Fiecare cerc = un deputat · ${METRIC_LABELS[metric]||metric} · legislatura ${LEG}`;
  const deps=sorted(unfiltered);
  const vals=deps.map(d=>d[metric]||0).filter(v=>v>0);
  const maxV=vals.length?Math.max(...vals):1;

  if(!deps.length){grid.innerHTML='<p style="color:var(--text3);padding:40px 0">Niciun deputat.</p>';return;}

  grid.innerHTML=deps.map(d=>{
    const v=d[metric]||0;
    const sz=circleSize(v,maxV);
    const color=partyColor(d.partid);
    const logo=PARTIES[d.partid];
    const showBadge=sz>=14;
    const profileUrl=`deputat.html?id=${d.cdep_idm}&leg=${LEG}`;
    const fontSize=Math.max(8,Math.round(sz*0.3));

    const badgeHtml=showBadge?(logo
      ?`<span class="dep-badge" style="background:${color}"><img src="data/assets/imagini/partide/${logo}" onerror="this.style.display='none'" alt="">${d.partid}</span>`
      :`<span class="dep-badge" style="background:${color}">${d.partid}</span>`):'';

    const circleInner=d.image
      ?`<img src="${d.image}" alt="${d.name.replace(/"/g,'&quot;')}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="dep-initials" style="font-size:${fontSize}px;background:${color};display:none">${initials(d.name)}</div>`
      :`<div class="dep-initials" style="font-size:${fontSize}px;background:${color}">${initials(d.name)}</div>`;

    return`<a class="dep-item${v===0?' zero-val':''}"
              href="${profileUrl}"
              data-name="${d.name.replace(/"/g,'&quot;')}"
              data-value="${v}" data-partid="${d.partid}">
      <div class="dep-circle" style="width:${sz}px;height:${sz}px">
        <div class="dep-circle-inner" style="width:${sz}px;height:${sz}px">${circleInner}</div>
        ${badgeHtml}
      </div>
      <div class="dep-name" style="max-width:${sz+8}px">${d.name.split(',')[0].trim()}</div>
      <div class="dep-value">${fmtVal(v)}</div>
    </a>`;
  }).join('');
}

function buildPartyDropdown(partids){
  document.getElementById('party-dd-total').textContent=partids.length+' partide';
  const pop=document.getElementById('party-dd-pop');
  pop.querySelectorAll('.party-dd-row').forEach(r=>r.remove());
  partids.forEach(p=>{
    const color=partyColor(p);
    const logo=PARTIES[p];
    const count=ALL.filter(d=>d.partid===p).length;
    const row=document.createElement('div');
    row.className='party-dd-row';
    row.innerHTML=`<input type="checkbox" data-partid="${p}"${activeParties.has(p)?' checked':''}>`
      +(logo?`<img src="data/assets/imagini/partide/${logo}" onerror="this.style.display='none'" style="width:14px;height:14px;object-fit:contain;flex-shrink:0">`:'')
      +`<span class="party-dd-dot" style="background:${color}"></span>`
      +`<span>${p}</span><span class="party-dd-count-label">${count} dep.</span>`;
    row.querySelector('input').addEventListener('change',()=>toggleParty(p));
    row.addEventListener('click',e=>{
      if(e.target.tagName!=='INPUT'){row.querySelector('input').click();}
    });
    pop.appendChild(row);
  });
  updatePartyDropdownBtn();
}

function updatePartyDropdownBtn(){
  const total=parseInt(document.getElementById('party-dd-total').textContent)||0;
  const sel=activeParties.size;
  document.getElementById('party-dd-count').textContent=sel<total?`(${sel}/${total})`:'';
}

function toggleParty(p){
  if(activeParties.has(p))activeParties.delete(p);
  else activeParties.add(p);
  const cb=document.querySelector(`.party-dd-row input[data-partid="${p}"]`);
  if(cb)cb.checked=activeParties.has(p);
  updatePartyDropdownBtn();
  render();
  pushState();
}

function selectAllParties(){
  activeParties=new Set(ALL.map(d=>d.partid));
  document.querySelectorAll('.party-dd-row input[type=checkbox]').forEach(cb=>{
    cb.checked=activeParties.has(cb.dataset.partid);
  });
  updatePartyDropdownBtn();
  render();
  pushState();
}

function selectNoParties(){
  activeParties=new Set();
  document.querySelectorAll('.party-dd-row input[type=checkbox]').forEach(cb=>{cb.checked=false;});
  updatePartyDropdownBtn();
  render();
  pushState();
}

const tooltip=document.getElementById('tooltip');
document.addEventListener('mouseover',e=>{
  const item=e.target.closest('.dep-item');
  if(!item){tooltip.style.display='none';return;}
  tooltip.textContent=`${item.dataset.name} · ${item.dataset.partid} · ${METRIC_LABELS[metric]||metric}: ${Number(item.dataset.value).toLocaleString('ro-RO')}`;
  tooltip.style.display='block';
});
document.addEventListener('mousemove',e=>{tooltip.style.left=(e.clientX+14)+'px';tooltip.style.top=(e.clientY-32)+'px';});
document.addEventListener('mouseout',e=>{if(!e.target.closest('.dep-item'))tooltip.style.display='none';});

async function load(){
  try{
    const res=await fetch(DATA_URL);
    if(!res.ok)throw new Error(res.statusText);
    const data=await res.json();
    ALL=data.deputies; PARTIES=data.parties||{};
    const counts={};
    ALL.forEach(d=>counts[d.partid]=(counts[d.partid]||0)+1);
    const partids=Object.keys(counts).sort((a,b)=>counts[b]-counts[a]);
    activeParties=new Set(partids);
    buildPartyDropdown(partids);
    applyURLState();
    render();
  }catch(e){
    document.getElementById('circle-grid').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Rulează <code>python scripts/build_activitate_deputies.py --leg ${LEG}</code>.</div>`;
  }
}

document.getElementById('metric-btns').addEventListener('click',e=>{
  const btn=e.target.closest('.metric-btn');
  if(!btn)return;
  metric=btn.dataset.metric;
  document.querySelectorAll('.metric-btn').forEach(b=>b.classList.toggle('active',b===btn));
  render();
  pushState();
});

document.getElementById('btn-circles').addEventListener('click',()=>{
  if(viewMode==='circles')return;
  viewMode='circles';
  document.getElementById('btn-circles').classList.add('active');
  document.getElementById('btn-table').classList.remove('active');
  document.getElementById('metric-btns').style.display='';
  const metricKeys=COLUMNS.map(c=>c.key);
  if(sortKey&&metricKeys.includes(sortKey)){
    metric=sortKey;
    document.querySelectorAll('.metric-btn').forEach(b=>
      b.classList.toggle('active',b.dataset.metric===metric));
  }
  render();
  pushState();
});

document.getElementById('btn-table').addEventListener('click',()=>{
  if(viewMode==='table')return;
  viewMode='table';
  document.getElementById('btn-table').classList.add('active');
  document.getElementById('btn-circles').classList.remove('active');
  document.getElementById('metric-btns').style.display='none';
  if(!sortKey)sortKey=metric;
  render();
  pushState();
});

document.getElementById('circle-grid').addEventListener('click',e=>{
  const th=e.target.closest('[data-sort]');
  if(!th)return;
  const key=th.dataset.sort;
  if(sortKey===key){
    if(sortDir==='desc')sortDir='asc';
    else{sortKey=null;sortDir='desc';}
  }else{sortKey=key;sortDir='desc';}
  render();
});

document.getElementById('party-dd-btn').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('party-dd-pop').classList.toggle('open');
});
document.addEventListener('click',e=>{
  if(!document.getElementById('party-dd').contains(e.target)){
    document.getElementById('party-dd-pop').classList.remove('open');
  }
});

load();
</script>

</script>
