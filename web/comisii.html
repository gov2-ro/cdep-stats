<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comisii parlamentare — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Comisiile parlamentare ale Camerei Deputaților — componență, distribuție pe partide.">
<meta property="og:type" content="website">
<meta property="og:title" content="Comisii parlamentare — Camera Deputaților">
<meta property="og:description" content="Comisiile parlamentare ale Camerei Deputaților — componență, distribuție pe partide.">
<meta property="og:url" content="https://lab.gov2.ro/cdep/comisii.html">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-5.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:16px;font-weight:600;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.view-toggle{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;vertical-align:middle}
.view-btn{padding:4px 11px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}

.committee-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px}
.committee-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.committee-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;background:var(--bg2)}
.committee-header:hover{background:var(--bg3)}
.committee-title{flex:1;font-size:14px;font-weight:500;min-width:0}
.committee-meta{display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.pill{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg3);color:var(--text2);white-space:nowrap;font-weight:500}
.tip-badge{font-size:10px;padding:2px 7px;border-radius:3px;white-space:nowrap;font-weight:500}
.tip-permanenta{background:var(--blue-bg);color:var(--blue-text)}
.tip-speciala{background:var(--amber-bg);color:var(--amber-text)}
.tip-speciala_comuna{background:var(--amber-bg);color:var(--amber-text)}
.chevron{font-size:11px;color:var(--text3);transition:transform 0.15s;flex-shrink:0}
.committee-card.open .chevron{transform:rotate(90deg)}
.committee-body{display:none;padding:16px;border-top:1px solid var(--border)}
.committee-card.open .committee-body{display:block}

.party-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;margin-bottom:14px;gap:1px}
.party-bar-seg{height:100%}

.members-table{width:100%;border-collapse:collapse;font-size:13px}
.members-table th{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);padding:5px 8px;border-bottom:1px solid var(--border);text-align:left}
.members-table td{padding:6px 8px;border-bottom:1px solid var(--border)}
.members-table tr:last-child td{border-bottom:none}
.role-badge{font-size:10px;padding:1px 6px;border-radius:3px;margin-left:6px;font-weight:500}
.role-presedinte{background:var(--green-bg);color:var(--green-text)}
.role-vicepresedinte{background:var(--blue-bg);color:var(--blue-text)}
.role-secretar{background:var(--bg3);color:var(--text2)}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/comisii/legislatura-${LEG}.json`;

const PARTY_COLORS = {
  'PSD':'#185FA5','PNL':'#993C1D','USR':'#3B6D11','AUR':'#854F0B',
  'UDMR':'#5F5E5A','SOS RO':'#A32D2D','POT':'#553378','Minoritati':'#666',
};

function normRo(s){
  return (s||'').replace(/[ăâ]/gi,'a').replace(/î/gi,'i')
    .replace(/[țţ]/gi,'t').replace(/[șş]/gi,'s').toLowerCase();
}

function partyShort(name){
  if(!name) return '?';
  const n = normRo(name);
  if(n.includes('social democrat')) return 'PSD';
  if(n.includes('national liberal')) return 'PNL';
  if(n.includes('salvati romania')) return 'USR';
  if(n.includes('unirea romanilor')) return 'AUR';
  if(n.includes('democrata maghiara')) return 'UDMR';
  if(n.includes('s.o.s') || n.includes('sos romania')) return 'SOS RO';
  if(n.includes('oamenilor tineri')) return 'POT';
  if(n.includes('minoritat')) return 'Minoritati';
  const m = name.match(/\b([A-Z]{2,6})\b/);
  return m ? m[1] : name.slice(0,8);
}

function partyColor(p){return PARTY_COLORS[p]||'#777';}

function tipLabel(tip){
  if(tip==='permanenta') return 'Permanentă';
  if(tip==='speciala') return 'Specială';
  if(tip==='speciala_comuna') return 'Specială comună';
  return tip;
}
function tipClass(tip){
  if(tip==='permanenta') return 'tip-permanenta';
  return 'tip-speciala';
}

function buildPartyBar(members){
  const counts = {};
  for(const m of members){
    const p = partyShort(m.partid);
    counts[p] = (counts[p]||0) + 1;
  }
  const total = members.length || 1;
  return Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .map(([p,n])=>`<div class="party-bar-seg" style="width:${(n/total*100).toFixed(1)}%;background:${partyColor(p)}" title="${p}: ${n}"></div>`)
    .join('');
}

function renderMembers(members){
  const sorted = [...members].sort((a,b)=>{
    const order = {Președinte:0,Vicepreședinte:1,Secretar:2,Membru:3};
    return (order[a.rol]??4)-(order[b.rol]??4);
  });
  const rows = sorted.map(m=>{
    const p = partyShort(m.partid);
    const rolClass = m.rol==='Președinte'?'role-presedinte':m.rol==='Vicepreședinte'?'role-vicepresedinte':m.rol==='Secretar'?'role-secretar':'';
    const rolBadge = m.rol && m.rol!=='Membru'
      ?`<span class="role-badge ${rolClass}">${m.rol}</span>`:'';
    const link = `deputat.html?id=${m.deputat_cdep_idm}&leg=${LEG}`;
    return`<tr>
      <td><a href="${link}">${m.deputat_nume}</a>${rolBadge}</td>
      <td><span class="pill" style="background:${partyColor(p)}22;color:${partyColor(p)}">${p}</span></td>
    </tr>`;
  }).join('');
  return`<table class="members-table"><thead><tr><th>Deputat</th><th>Partid</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderCommittee(c){
  const partyBar = buildPartyBar(c.membri||[]);
  const membersHtml = renderMembers(c.membri||[]);
  const presedinte = c.presedinte ? `<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Președinte: <strong style="color:var(--text)">${c.presedinte}</strong></div>` : '';
  return`<div class="committee-card" id="c-${c.id}">
    <div class="committee-header" onclick="toggleCard(this)">
      <div class="committee-title">${c.nume}</div>
      <div class="committee-meta">
        <span class="pill">${c.nr_membri} membri</span>
        <span class="tip-badge ${tipClass(c.tip)}">${tipLabel(c.tip)}</span>
        <span class="chevron">▶</span>
      </div>
    </div>
    <div class="committee-body">
      ${presedinte}
      <div class="party-bar" title="Distribuție pe partide">${partyBar}</div>
      ${membersHtml}
    </div>
  </div>`;
}

function toggleCard(header){
  const card = header.closest('.committee-card');
  card.classList.toggle('open');
}

async function load(){
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    const items = d.data;

    const permanente = items.filter(c=>c.tip==='permanenta');
    const speciale = items.filter(c=>c.tip==='speciala');
    const specComune = items.filter(c=>c.tip==='speciala_comuna');

    function section(title, list){
      if(!list.length) return '';
      return`<h2>${title} (${list.length})</h2>
        <div class="committee-list">${list.map(renderCommittee).join('')}</div>`;
    }

    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
        <h1 style="margin:0">Comisii parlamentare — legislatura ${LEG}</h1>
        <div class="view-toggle">${NAV.renderLegToggle(LEG,'comisii.html',[2024,2020,2016])}</div>
      </div>
      <p class="sub">${items.length} comisii · Camera Deputaților · date din cdep.ro</p>
      ${section('Comisii permanente', permanente)}
      ${section('Comisii speciale', speciale)}
      ${section('Comisii speciale comune', specComune)}
    `;
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Asigură-te că <code>data/v1/comisii/legislatura-${LEG}.json</code> există.</div>`;
  }
}
load();
</script>
<script>
NAV.renderHeader();
NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${DATA_URL}">${DATA_URL}</a>`);
</script>
<script src="i18n.js"></script>
</body>
</html>
