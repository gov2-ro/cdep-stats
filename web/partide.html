<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partide — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Comparație partide — activitate parlamentară și avere declarată · Camera Deputaților 2024">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.toolbar{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 0}
.toolbar-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.view-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.view-btn{padding:5px 12px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}
.metric-btns{display:flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;flex-shrink:0}
.metric-btn{padding:5px 10px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer;white-space:nowrap;border-right:1px solid var(--border2)}
.metric-btn:last-child{border-right:none}
.metric-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}
.count-badge{font-size:12px;color:var(--text3);white-space:nowrap;margin-left:auto}
@media(max-width:600px){
  .metric-btns{flex-wrap:wrap;gap:4px;border:none}
  .metric-btn{border-radius:var(--radius-sm);border:1px solid var(--border2)}
}
.main{max-width:1200px;margin:0 auto;padding:20px 24px}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:20px}
.circle-grid{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;padding:8px 0}
.jud-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;text-decoration:none;color:inherit}
.jud-item:hover .jud-circle{opacity:0.82}
.jud-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;transition:width .2s,height .2s;overflow:hidden}
.jud-name{font-size:9px;color:var(--text2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;line-height:1.3}
.jud-value{font-size:8px;color:var(--text3);text-align:center;line-height:1.3}
.dep-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.dep-table{width:100%;border-collapse:collapse;font-size:13px}
.dep-table thead th{padding:9px 10px;background:var(--bg2);border-bottom:2px solid var(--border);font-weight:500;color:var(--text3);cursor:pointer;white-space:nowrap;user-select:none;text-align:left}
.dep-table thead th.sort-active{color:var(--blue);border-bottom-color:var(--blue)}
.dep-table tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
.dep-table tbody tr:hover{background:var(--bg2)}
.dep-table tbody td{padding:9px 10px;vertical-align:middle}
.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:24px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>
<div class="toolbar">
  <div class="toolbar-inner">
    <div class="view-toggle">
      <button class="view-btn" id="btn-circles">⬤ Cercuri</button>
      <button class="view-btn active" id="btn-table">≡ Tabel</button>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-abs">Absolut</button>
      <button class="view-btn" id="btn-avg">Mediu</button>
    </div>
    <div class="metric-btns" id="metric-btns" style="display:none">
      <button class="metric-btn active" data-metric="n">N dep.</button>
      <button class="metric-btn" data-metric="sum_sedinte">Ședințe</button>
      <button class="metric-btn" data-metric="sum_propuneri">Propuneri</button>
      <button class="metric-btn" data-metric="median_venituri">Venituri</button>
      <button class="metric-btn" data-metric="median_conturi">Conturi</button>
    </div>
    <span class="count-badge" id="count-badge"></span>
    <div class="view-toggle" id="leg-toggle"></div>
  </div>
</div>

<div class="main">
  <h1>Partide — Camera Deputaților</h1>
  <p class="sub" id="page-sub"></p>
  <div id="circle-grid" class="circle-grid">
    <div class="loading" data-i18n="loading">Se încarcă...</div>
  </div>
</div>

<div id="site-footer"></div>
<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG=Number(getParam('leg')||2024);

(function(){
  const toggleEl = document.getElementById('leg-toggle');
  if(toggleEl) toggleEl.innerHTML = NAV.renderLegToggle(LEG, 'partide.html');
})();

const PARTY_COLORS={
  'PSD':'#185FA5','PNL':'#993C1D','USR':'#3B6D11','AUR':'#854F0B',
  'UDMR':'#5F5E5A','SOS RO':'#A32D2D','UPR':'#553378','PMP':'#6D5A9E',
  'Minoritati':'#5F5E5A','Neafiliat':'#777',
};
function partyColor(p){return PARTY_COLORS[p]||'#777';}

const METRICS=[
  {key:'n',              label:'N dep.',   fmt:v=>v+' dep.'},
  {key:'sum_sedinte',    label:'Ședințe',  fmt:v=>Number(v).toLocaleString('ro-RO')},
  {key:'sum_propuneri',  label:'Propuneri',fmt:v=>Number(v).toLocaleString('ro-RO')},
  {key:'median_venituri',label:'Venituri', fmt:v=>fmtRON(v)},
  {key:'median_conturi', label:'Conturi',  fmt:v=>fmtRON(v)},
];

function fmtRON(v){
  if(!v)return'0 RON';
  if(v>=1e6)return(v/1e6).toFixed(1).replace(/\.0$/,'')+'M RON';
  if(v>=1e4)return Math.round(v/1e3)+'K RON';
  return Math.round(v).toLocaleString('ro-RO')+' RON';
}

let ALL_PARTIES=[];
let metric='n';
let viewMode='table';
let normMode='abs';
let sortKey='n'; let sortDir='desc';
let PARTIES_LOGOS={};
const AVG_KEYS=new Set(['sum_sedinte','sum_propuneri','sum_legi','sum_cuvant','sum_intrebari','sum_declaratii']);

function metricVal(p,key){
  const v=p[key]||0;
  return normMode==='avg'&&AVG_KEYS.has(key)?v/p.n:v;
}
function fmtAvg(v){return(Math.round(v*10)/10).toLocaleString('ro-RO');}

function circleSize(v,maxV){
  if(!v||maxV<=0)return 28;
  return Math.round(Math.max(28,Math.min(100,28+72*Math.sqrt(v/maxV))));
}

function metricFmt(key,v){
  return(METRICS.find(m=>m.key===key)||METRICS[0]).fmt(v||0);
}

function render(){
  document.getElementById('count-badge').textContent=ALL_PARTIES.length+' partide';
  const mDef=METRICS.find(m=>m.key===metric);
  document.getElementById('page-sub').textContent=viewMode==='table'
    ?'':`Fiecare cerc = un partid · ${mDef.label} · legislatura ${LEG}`;
  const grid=document.getElementById('circle-grid');
  if(viewMode==='table'){renderTable(grid);return;}

  const maxV=Math.max(1,...ALL_PARTIES.map(p=>metricVal(p,metric)));
  grid.innerHTML=ALL_PARTIES
    .slice().sort((a,b)=>metricVal(b,metric)-metricVal(a,metric))
    .map(p=>{
      const mv=metricVal(p,metric);
      const sz=circleSize(mv,maxV);
      const color=partyColor(p.partid);
      const fontSize=Math.max(9,Math.round(sz*0.22));
      const logo=PARTIES_LOGOS[p.partid];
      const inner=logo&&sz>=40
        ?`<img src="data/assets/imagini/partide/${logo}" alt="" onerror="this.style.display='none';this.nextSibling.style.display='block'" style="width:${Math.round(sz*0.55)}px;height:${Math.round(sz*0.55)}px;object-fit:contain"><span style="display:none;font-size:${fontSize}px;font-weight:700">${p.partid}</span>`
        :`<span style="font-size:${fontSize}px;font-weight:700">${p.partid}</span>`;
      const valLabel=normMode==='avg'&&AVG_KEYS.has(metric)?fmtAvg(mv):metricFmt(metric,mv);
      return`<div class="jud-item" onclick="location.href='partid.html?id=${encodeURIComponent(p.partid)}&leg=${LEG}'">
        <div class="jud-circle" style="width:${sz}px;height:${sz}px;background:${color}">${inner}</div>
        <div class="jud-name" style="max-width:${sz+12}px">${p.partid}</div>
        <div class="jud-value">${valLabel}</div>
      </div>`;
    }).join('');
}

function renderTable(grid){
  const COLS=[
    {key:'partid',         label:'Partid',    fmt:(p)=>{
      const logo=PARTIES_LOGOS[p.partid];
      const color=partyColor(p.partid);
      // colored-dot fallback: shown when no logo, or revealed if the logo file 404s
      const dot=`<span style="display:${logo?'none':'inline-block'};width:10px;height:10px;border-radius:50%;background:${color};margin-right:7px;vertical-align:middle"></span>`;
      const img=logo
        ?`<img src="data/assets/imagini/partide/${logo}" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-block'" style="width:18px;height:18px;object-fit:contain;margin-right:7px;vertical-align:middle">`
        :'';
      return`<a href="partid.html?id=${encodeURIComponent(p.partid)}&leg=${LEG}" style="display:flex;align-items:center;font-weight:600;color:inherit;text-decoration:none">${img}${dot}${p.partid}</a>`;
    }},
    {key:'n',              label:'Dep.',       fmt:(p)=>p.n},
    {key:'sum_sedinte',    label:normMode==='avg'?'Șed./dep.':'Ședințe',    fmt:(p)=>normMode==='avg'?fmtAvg(p.sum_sedinte/p.n):p.sum_sedinte.toLocaleString('ro-RO')},
    {key:'sum_propuneri',  label:normMode==='avg'?'Prop./dep.':'Propuneri',  fmt:(p)=>normMode==='avg'?fmtAvg(p.sum_propuneri/p.n):p.sum_propuneri.toLocaleString('ro-RO')},
    {key:'sum_legi',       label:normMode==='avg'?'Legi/dep.':'Legi',       fmt:(p)=>normMode==='avg'?fmtAvg(p.sum_legi/p.n):p.sum_legi.toLocaleString('ro-RO')},
    {key:'median_venituri',label:'Venituri ↗', fmt:(p)=>fmtRON(p.median_venituri)},
    {key:'median_conturi', label:'Conturi ↗',  fmt:(p)=>fmtRON(p.median_conturi)},
    {key:'median_datorii', label:'Datorii ↗',  fmt:(p)=>`<span style="color:${p.median_datorii>0?'var(--red-text)':'var(--text2)'}">${fmtRON(p.median_datorii)}</span>`},
  ];
  const sorted=[...ALL_PARTIES].sort((a,b)=>{
    const av=sortKey==='partid'?a.partid:(normMode==='avg'&&AVG_KEYS.has(sortKey)?(a[sortKey]||0)/a.n:(a[sortKey]||0));
    const bv=sortKey==='partid'?b.partid:(normMode==='avg'&&AVG_KEYS.has(sortKey)?(b[sortKey]||0)/b.n:(b[sortKey]||0));
    if(typeof av==='string')return sortDir==='asc'?av.localeCompare(bv):bv.localeCompare(av);
    return sortDir==='asc'?av-bv:bv-av;
  });
  const headers=COLS.map(c=>{
    const active=c.key===sortKey;
    const arrow=active?(sortDir==='desc'?' ↓':' ↑'):'';
    return`<th class="${active?'sort-active':''}" data-sort="${c.key}">${c.label}${arrow}</th>`;
  }).join('');
  const rows=sorted.map(p=>`<tr onclick="location.href='partid.html?id=${encodeURIComponent(p.partid)}&leg=${LEG}'">
    ${COLS.map(c=>`<td>${c.fmt(p)}</td>`).join('')}
  </tr>`).join('');
  grid.innerHTML=`<div class="dep-table-wrap"><table class="dep-table">
    <thead><tr>${headers}</tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function pushState(){
  const params=new URLSearchParams();
  if(LEG!==2024)params.set('leg',LEG);
  if(metric!=='n')params.set('metric',metric);
  if(viewMode!=='table')params.set('view',viewMode);
  if(normMode!=='abs')params.set('norm','avg');
  const qs=params.toString();
  history.replaceState(null,'',qs?'?'+qs:location.pathname);
}

function applyURLState(){
  const params=new URLSearchParams(location.search);
  if(params.has('metric')){
    const m=params.get('metric');
    if(METRICS.some(x=>x.key===m)){
      metric=m;
      document.querySelectorAll('.metric-btn').forEach(b=>b.classList.toggle('active',b.dataset.metric===m));
    }
  }
  if(params.get('view')==='circles'){
    viewMode='circles';
    document.getElementById('btn-circles').classList.add('active');
    document.getElementById('btn-table').classList.remove('active');
    document.getElementById('metric-btns').style.display='';
  }
  if(params.get('norm')==='avg'){
    normMode='avg';
    document.getElementById('btn-avg').classList.add('active');
    document.getElementById('btn-abs').classList.remove('active');
  }
}

async function load(){
  let avereData,activData,avereAgg;
  try{
    [avereData,activData,avereAgg]=await Promise.all([
      fetch(`data/v1/stats/avere-deputies-${LEG}.json`).then(r=>r.json()),
      fetch(`data/v1/stats/activitate-deputies-${LEG}.json`).then(r=>r.json()),
      fetch(`data/v1/stats/avere-${LEG}.json`).then(r=>r.json()).catch(()=>null),
    ]);
  }catch(e){
    document.getElementById('circle-grid').innerHTML=`<div class="error">Nu pot încărca datele (${e.message}).</div>`;
    return;
  }

  PARTIES_LOGOS={};
  for(const k in (avereData.parties||{})){const v=avereData.parties[k];if(v&&v!=='lipsa.jpg')PARTIES_LOGOS[k]=v;}

  const partyMap={};
  for(const d of activData.deputies){
    const p=d.partid;
    if(!partyMap[p])partyMap[p]={partid:p,n:0,
      sum_sedinte:0,sum_propuneri:0,sum_legi:0,
      sum_cuvant:0,sum_intrebari:0,sum_declaratii:0,
      median_venituri:0,median_conturi:0,median_datorii:0,total_imobile:0};
    partyMap[p].n++;
    partyMap[p].sum_sedinte+=d.activitate_sedinte||0;
    partyMap[p].sum_propuneri+=d.activitate_propuneri_legislative||0;
    partyMap[p].sum_legi+=d.activitate_legi_promulgate||0;
    partyMap[p].sum_cuvant+=d.activitate_luari_cuvant||0;
    partyMap[p].sum_intrebari+=d.activitate_intrebari_interpelari||0;
    partyMap[p].sum_declaratii+=d.activitate_declaratii_politice||0;
  }

  if(avereAgg?.per_partid){
    for(const pp of avereAgg.per_partid){
      if(partyMap[pp.partid]){
        partyMap[pp.partid].median_venituri=pp.median_venituri||0;
        partyMap[pp.partid].median_conturi=pp.median_conturi||0;
        partyMap[pp.partid].median_datorii=pp.median_datorii||0;
        partyMap[pp.partid].total_imobile=pp.total_imobile||0;
      }
    }
  }

  ALL_PARTIES=Object.values(partyMap).sort((a,b)=>b.n-a.n);
  applyURLState();
  render();
}

document.getElementById('metric-btns').addEventListener('click',e=>{
  const btn=e.target.closest('.metric-btn');
  if(!btn)return;
  metric=btn.dataset.metric;
  document.querySelectorAll('.metric-btn').forEach(b=>b.classList.toggle('active',b===btn));
  render();pushState();
});

document.getElementById('btn-circles').addEventListener('click',()=>{
  if(viewMode==='circles')return;
  viewMode='circles';
  document.getElementById('btn-circles').classList.add('active');
  document.getElementById('btn-table').classList.remove('active');
  document.getElementById('metric-btns').style.display='';
  render();pushState();
});

document.getElementById('btn-table').addEventListener('click',()=>{
  if(viewMode==='table')return;
  viewMode='table';
  document.getElementById('btn-table').classList.add('active');
  document.getElementById('btn-circles').classList.remove('active');
  document.getElementById('metric-btns').style.display='none';
  render();pushState();
});

document.getElementById('circle-grid').addEventListener('click',e=>{
  const th=e.target.closest('[data-sort]');
  if(!th||!th.dataset.sort)return;
  const key=th.dataset.sort;
  if(sortKey===key){sortDir=sortDir==='desc'?'asc':'desc';}
  else{sortKey=key;sortDir='desc';}
  render();
});

document.getElementById('btn-abs').addEventListener('click',()=>{
  if(normMode==='abs')return;
  normMode='abs';
  document.getElementById('btn-abs').classList.add('active');
  document.getElementById('btn-avg').classList.remove('active');
  render();pushState();
});

document.getElementById('btn-avg').addEventListener('click',()=>{
  if(normMode==='avg')return;
  normMode='avg';
  document.getElementById('btn-avg').classList.add('active');
  document.getElementById('btn-abs').classList.remove('active');
  render();pushState();
});

load();
</script>
<script>NAV.renderHeader(); NAV.renderFooter();</script><script src="i18n.js"></script>
</body>
</html>
