<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){:root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;font-size:14px;margin:0}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0;background:#42133c;border-bottom-color:transparent}
.header-inner{max-width:none;padding:0 20px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:#fff;text-decoration:none}
.logo span{color:#88dfc4}
.logo em{font-style:normal;color:rgba(255,255,255,.72)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:rgba(255,255,255,.72);text-decoration:none}
.nav a:hover{background:rgba(255,255,255,.11);color:#fff}
.nav a.active{color:#fff;background:rgba(255,255,255,.08)}
@media(max-width:820px){.header-inner{gap:12px;padding:0 14px}.nav a{font-size:12px;padding:4px 8px}.nav span:not(#lang-toggle-slot){display:none}}
@media(max-width:620px){.header-inner{flex-wrap:wrap;gap:8px}.logo{flex:0 0 auto}.nav{flex:0 1 auto;margin-left:0;overflow-x:auto;min-width:0}.nav a{font-size:11px;padding:3px 6px;flex-shrink:0}}

/* ── page layout: sidebar + main ── */
.page-wrapper{display:flex;gap:20px;padding:16px 20px;min-height:calc(100vh - 64px)}
.sidebar{flex:0 0 260px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;overflow-y:auto;max-height:calc(100vh - 64px - 32px);position:sticky;top:16px}
.main{flex:1;min-width:0}

h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.page-nav{display:flex;gap:8px;align-items:center;margin-left:auto}
.page-nav a{font-size:12px;color:var(--text2);padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);text-decoration:none}
.page-nav a:hover{background:var(--bg2);color:var(--text)}
.sub{color:var(--text3);font-size:12px;margin-bottom:6px}

/* ── filter sections ── */
.filter-section{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.filter-section:last-child{border-bottom:none}
.filter-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.search-input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 8px;font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font);margin-bottom:8px}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{outline:none;border-color:var(--blue);background:var(--bg)}
.filter-chips{display:flex;flex-wrap:wrap;gap:2px;max-height:120px;overflow-y:auto}
.chip-btn{font-size:9px;padding:3px 7px;border-radius:3px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font);white-space:nowrap;display:flex;align-items:center;gap:2px}
.chip-btn:hover{background:var(--bg3)}
.chip-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-count{font-size:8px;color:currentColor;opacity:.7}
.chip-check{display:inline-flex;align-items:center;gap:3px;padding:3px 6px;border:1px solid var(--border);border-radius:3px;font-size:9px;cursor:pointer;color:var(--text2);user-select:none;white-space:nowrap;width:100%}
.chip-check:hover{background:var(--bg3)}
.chip-check.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-check input{margin:0;width:13px;height:13px;flex-shrink:0;cursor:pointer;accent-color:var(--blue)}
.chip-label{flex:1}
.chip-count-badge{font-size:8px;opacity:.7;color:currentColor}
.reset-btn{font-size:10px;padding:4px 8px;border-radius:3px;border:1px solid var(--border);background:var(--red-bg);color:var(--red-text);cursor:pointer;font-family:var(--font);font-weight:600;width:100%;margin-top:8px}
.reset-btn:hover{opacity:.8}

/* ── results ── */
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.results-count{font-size:12px;color:var(--text2)}
.year-chips{display:flex;gap:2px;flex-wrap:wrap}
.year-btn{font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font)}
.year-btn:hover{background:var(--bg2)}
.year-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

#results-list{margin-top:6px}
.list-item-row{display:flex;align-items:flex-start;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap}
.list-item-row:last-child{border-bottom:none}
.sess-pill{font-family:var(--mono);font-size:10px;color:var(--blue);background:var(--blue-bg);padding:2px 6px;border-radius:3px;white-space:nowrap;text-decoration:none;flex-shrink:0}
.sess-pill:hover{background:var(--blue);color:#fff}
.list-item-main{display:flex;align-items:flex-start;gap:6px;width:100%}
.item-pos{font-size:10px;color:var(--text3);min-width:20px;flex-shrink:0;padding-top:2px;font-family:var(--mono)}
.item-desc{flex:1;line-height:1.4;color:var(--text)}
.item-desc b{font-weight:600}
.item-desc i{color:var(--text2);font-size:11px}
.item-pdf{font-size:10px;flex-shrink:0;white-space:nowrap;padding-top:1px}
.docs-toggle{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 0 0;white-space:nowrap;font-family:var(--font)}
.docs-toggle:hover{color:var(--blue)}
.docs-list{display:none;width:100%;padding:4px 0 2px 26px}
.docs-list.open{display:block}
.doc-row{display:flex;align-items:baseline;gap:6px;padding:2px 0;font-size:11px;border-bottom:1px dotted var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-date{color:var(--text3);white-space:nowrap;min-width:76px;flex-shrink:0;font-family:var(--mono);font-size:10px}
.doc-title{flex:1;color:var(--text2)}
.doc-src{font-size:9px;color:var(--text3);flex-shrink:0}

.item-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;width:100%;padding:2px 0 2px 26px}
.bge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.bge-org{background:#ede9fe;color:#6d28d9}
.bge-ord{background:#dbeafe;color:#1d4ed8}
.bge-urg{background:#fee2e2;color:#b91c1c}
.bge-cam{background:#e0f2fe;color:#0369a1}
.bge-pri{background:#dcfce7;color:#166534}
.bge-rez{background:#fef3c7;color:#92400e}
.item-subject{font-size:10px;color:var(--text2);padding:2px 0 1px 26px;font-style:italic;line-height:1.4}
.item-comm{font-size:9px;color:var(--text3);display:flex;flex-wrap:wrap;gap:1px;align-items:center}
.item-comm-name{white-space:nowrap}
.item-comm-sep{color:var(--border2);margin:0 1px}

.loading{text-align:center;padding:50px 0;color:var(--text3)}
.error{padding:12px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius-sm);margin:12px 0}

.footer{border-top:1px solid var(--border);padding:14px 20px;margin-top:36px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}

/* ── mobile layout ── */
@media(max-width:768px){
  .page-wrapper{flex-direction:column;gap:12px;padding:12px}
  .sidebar{flex:0 0 auto;max-height:none;position:static}
  .filter-chips{max-height:none}
  .search-input{font-size:14px}
}
</style>

<div class="page-wrapper">

  <!-- Main Content -->

      <a href="ordine-zi.html?leg=2024" class="page-nav" style="border:none;padding:0;margin-left:auto">← Calendar</a>

<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/ordine-zi/legislatura-${LEG}.json`;

// ── state ──
let allItems = [];
let allYears = [];
let listQ = '';
let listItemType = 'all';
let listLawCat = '';
let listFlags = new Set();
let listAction = '';
let listActTypes = new Set();
let listCommSlugs = new Set();
let listInstits = new Set();
let listYear = 0;
let searchTimer = null;

// ── filter definitions ──
const FILTER_SETS = {
  bills:      new Set(['proiect_lege','propunere_legislativa','reexaminare']),
  hotarari:   new Set(['proiect_hotarare']),
  motions:    new Set(['motiune_simpla','motiune_cenzura','angajare_raspundere']),
  procedural: new Set(['informare','informare_casete','prezentare','alocutiuni','alocutiune',
                      'interventie','moment_reculegere','mesaj','declaratie','dezbateri_politice',
                      'dezbateri','alegere','numire','constituire','vacantare','solicitare',
                      'sedinta_solemna','vot','raport']),
};

const ITEM_TYPE_LABELS = {all:'Toate',bills:'Proiecte lege',hotarari:'Hotărâri',motions:'Moțiuni',procedural:'Procedural'};
const FLAG_LABELS = {procedura_urgenta:'urgență',prioritate_legislativa:'prioritate',camera_decizionala:'cam. dec.',rezerva_raport:'rezervă raport',sesizare_neconstitutionalitate:'sesizare CCR',cerere_reexaminare:'reexaminare',complexitate_deosebita:'complexitate'};
const ACT_TYPE_LABELS = {OUG:'OUG',OG:'OG',Lege:'Lege',CCR:'CCR',HotarareParlament:'Hot. Parl.',HotarareCamDepuati:'Hot. CD'};

// ── helper: get distinct values ──
function getDistinctValues(){
  const acts=new Set(),actions=new Set(),comms=new Set(),instits=new Set();
  allItems.forEach(({it})=>{
    if(it.entities){
      it.entities.referenced_acts?.forEach(a=>acts.add(a.act_type));
      if(it.entities.action)actions.add(it.entities.action);
      it.entities.commission_slugs?.forEach(c=>comms.add(c));
      it.entities.institutions?.forEach(i=>instits.add(i));
    }
  });
  return {acts,actions,comms,instits};
}

// ── helper: count items matching all current filters + this option ──
function countForFilter(dimension,value){
  let count=0;
  for(const {s,it} of allItems){
    // apply all current filters
    if(listItemType!=='all'){const types=FILTER_SETS[listItemType];if(!types?.has(it.entities?.item_type))continue;}
    if(listQ){const q=listQ.toLowerCase(),desc=(it.descriere||'').toLowerCase(),subj=(it.entities?.subject||'').toLowerCase(),regNr=(it.nr_inregistrare||'').toLowerCase();if(!desc.includes(q)&&!subj.includes(q)&&!regNr.includes(q))continue;}
    if(listLawCat){if(it.entities?.law_category!==listLawCat)continue;}
    if(listAction){if(it.entities?.action!==listAction)continue;}
    if(listFlags.size>0){const itemFlags=new Set(it.entities?.flags||[]);let allMatch=true;for(const f of listFlags){if(!itemFlags.has(f)){allMatch=false;break;}}if(!allMatch)continue;}
    if(listActTypes.size>0){const itemActs=new Set(it.entities?.referenced_acts?.map(a=>a.act_type)||[]);let hasAny=false;for(const t of listActTypes){if(itemActs.has(t)){hasAny=true;break;}}if(!hasAny)continue;}
    if(listCommSlugs.size>0){const itemComms=new Set(it.entities?.commission_slugs||[]);let hasAny=false;for(const c of listCommSlugs){if(itemComms.has(c)){hasAny=true;break;}}if(!hasAny)continue;}
    if(listInstits.size>0){const itemInstits=new Set(it.entities?.institutions||[]);let hasAny=false;for(const i of listInstits){if(itemInstits.has(i)){hasAny=true;break;}}if(!hasAny)continue;}
    if(listYear>0){if(+s.session_date.slice(0,4)!==listYear)continue;}
    // now check if this item has the specific option for the dimension
    let match=false;
    if(dimension==='item_type'){const types=FILTER_SETS[value];match=types?.has(it.entities?.item_type);}
    else if(dimension==='law_cat'){match=it.entities?.law_category===value;}
    else if(dimension==='action'){match=it.entities?.action===value;}
    else if(dimension==='flag'){match=it.entities?.flags?.includes(value);}
    else if(dimension==='act_type'){match=it.entities?.referenced_acts?.some(a=>a.act_type===value);}
    else if(dimension==='commission'){match=it.entities?.commission_slugs?.includes(value);}
    else if(dimension==='institution'){match=it.entities?.institutions?.includes(value);}
    if(match)count++;
  }
  return count;
}

// ── render filter UI ──
function renderFilterUI(){
  const {acts,actions,comms,instits}=getDistinctValues();

  // item type
  document.getElementById('item-type-chips').innerHTML=Object.entries(ITEM_TYPE_LABELS)
    .map(([k,v])=>{
      const cnt=k==='all'?allItems.length:countForFilter('item_type',k);
      return `<button class="chip-btn${listItemType===k?' active':''}" data-type="${k}" onclick="setItemType('${k}')">${v} <span class="chip-count">${cnt}</span></button>`;
    }).join('');

  // law category
  document.getElementById('law-cat-chips').innerHTML=`
    <button class="chip-btn${listLawCat===''?' active':''}" onclick="setLawCat('')">Toate <span class="chip-count">${allItems.length}</span></button>
    <button class="chip-btn${listLawCat==='lege_organica'?' active':''}" onclick="setLawCat('lege_organica')">Organică <span class="chip-count">${countForFilter('law_cat','lege_organica')}</span></button>
    <button class="chip-btn${listLawCat==='lege_ordinara'?' active':''}" onclick="setLawCat('lege_ordinara')">Ordinară <span class="chip-count">${countForFilter('law_cat','lege_ordinara')}</span></button>
  `;

  // action (now badges instead of select)
  document.getElementById('action-chips').innerHTML=[''].concat(Array.from(actions).sort())
    .map(a=>{
      const label=a?a.replace(/_/g,' '):'Toate';
      const cnt=a?countForFilter('action',a):allItems.length;
      return `<button class="chip-btn${listAction===a?' active':''}" onclick="setAction('${a}')">${label} <span class="chip-count">${cnt}</span></button>`;
    }).join('');

  // flags
  document.getElementById('flags-chips').innerHTML=Object.entries(FLAG_LABELS)
    .map(([k,v])=>{
      const cnt=countForFilter('flag',k);
      return `<label class="chip-check${listFlags.has(k)?' active':''}" onclick="event.stopPropagation(); toggleFlag('${k}'); return false;">
        <input type="checkbox"${listFlags.has(k)?' checked':''} onchange="return false;">
        <span class="chip-label">${v} <span class="chip-count-badge">${cnt}</span></span>
      </label>`;
    }).join('');

  // act types
  document.getElementById('act-types-chips').innerHTML=Array.from(acts).sort()
    .map(a=>{
      const cnt=countForFilter('act_type',a);
      return `<label class="chip-check${listActTypes.has(a)?' active':''}" onclick="event.stopPropagation(); toggleActType('${a}'); return false;">
        <input type="checkbox"${listActTypes.has(a)?' checked':''} onchange="return false;">
        <span class="chip-label">${ACT_TYPE_LABELS[a]||a} <span class="chip-count-badge">${cnt}</span></span>
      </label>`;
    }).join('');

  // commissions
  const commOrder=['juridica','buget_finante','munca','sanatate','agricultura','mediu','transporturi','aparare','politica_externa','administratie_publica','drepturile_omului','egalitate','invatamant','economica','industrii','constitutionalitate','cultura','it_comunicatii','stiinta','tineret','speciala_comuna'];
  const commSorted=commOrder.filter(c=>comms.has(c)).concat(Array.from(comms).filter(c=>!commOrder.includes(c)));
  document.getElementById('comm-chips').innerHTML=commSorted
    .map(c=>{
      const cnt=countForFilter('commission',c);
      return `<label class="chip-check${listCommSlugs.has(c)?' active':''}" onclick="event.stopPropagation(); toggleCommSlug('${c}'); return false;">
        <input type="checkbox"${listCommSlugs.has(c)?' checked':''} onchange="return false;">
        <span class="chip-label">${c.replace(/_/g,' ')} <span class="chip-count-badge">${cnt}</span></span>
      </label>`;
    }).join('');

  // institutions
  document.getElementById('instit-chips').innerHTML=Array.from(instits).sort()
    .map(i=>{
      const cnt=countForFilter('institution',i);
      return `<label class="chip-check${listInstits.has(i)?' active':''}" onclick="event.stopPropagation(); toggleInstit('${i}'); return false;">
        <input type="checkbox"${listInstits.has(i)?' checked':''} onchange="return false;">
        <span class="chip-label">${i} <span class="chip-count-badge">${cnt}</span></span>
      </label>`;
    }).join('');

  // year chips
  document.getElementById('year-chips').innerHTML=['0'].concat(allYears).map(y=>{
    const label=y==='0'?'Toți ani':y;
    return `<button class="year-btn${listYear===+y?' active':''}" onclick="setYear(${y})">${label}</button>`;
  }).join('');
}

// ── filter setters ──
function setItemType(f){listItemType=f;renderFilterUI();renderList();pushQueryParams();}
function setLawCat(c){listLawCat=c;renderFilterUI();renderList();pushQueryParams();}
function setAction(a){listAction=a;renderFilterUI();renderList();pushQueryParams();}
function setYear(y){listYear=y;renderFilterUI();renderList();pushQueryParams();}
function toggleFlag(s){if(listFlags.has(s))listFlags.delete(s);else listFlags.add(s);renderFilterUI();renderList();pushQueryParams();}
function toggleActType(t){if(listActTypes.has(t))listActTypes.delete(t);else listActTypes.add(t);renderFilterUI();renderList();pushQueryParams();}
function toggleCommSlug(s){if(listCommSlugs.has(s))listCommSlugs.delete(s);else listCommSlugs.add(s);renderFilterUI();renderList();pushQueryParams();}
function toggleInstit(i){if(listInstits.has(i))listInstits.delete(i);else listInstits.add(i);renderFilterUI();renderList();pushQueryParams();}

function clearFilters(){
  listQ='';document.getElementById('search-input').value='';
  listItemType='all';listLawCat='';listAction='';listFlags.clear();listActTypes.clear();listCommSlugs.clear();listInstits.clear();listYear=0;
  renderFilterUI();renderList();pushQueryParams();
}

// ── apply filters ──
function applyFilters(){
  return allItems.filter(({s,it})=>{
    if(listItemType!=='all'){const types=FILTER_SETS[listItemType];if(!types?.has(it.entities?.item_type))return false;}
    if(listQ){const q=listQ.toLowerCase(),desc=(it.descriere||'').toLowerCase(),subj=(it.entities?.subject||'').toLowerCase(),regNr=(it.nr_inregistrare||'').toLowerCase();if(!desc.includes(q)&&!subj.includes(q)&&!regNr.includes(q))return false;}
    if(listLawCat){if(it.entities?.law_category!==listLawCat)return false;}
    if(listAction){if(it.entities?.action!==listAction)return false;}
    if(listFlags.size>0){const itemFlags=new Set(it.entities?.flags||[]);for(const f of listFlags){if(!itemFlags.has(f))return false;}}
    if(listActTypes.size>0){const itemActs=new Set(it.entities?.referenced_acts?.map(a=>a.act_type)||[]);let hasAny=false;for(const t of listActTypes){if(itemActs.has(t)){hasAny=true;break;}}if(!hasAny)return false;}
    if(listCommSlugs.size>0){const itemComms=new Set(it.entities?.commission_slugs||[]);let hasAny=false;for(const c of listCommSlugs){if(itemComms.has(c)){hasAny=true;break;}}if(!hasAny)return false;}
    if(listInstits.size>0){const itemInstits=new Set(it.entities?.institutions||[]);let hasAny=false;for(const i of listInstits){if(itemInstits.has(i)){hasAny=true;break;}}if(!hasAny)return false;}
    if(listYear>0){if(+s.session_date.slice(0,4)!==listYear)return false;}
    return true;
  });
}

// ── render entity metadata ──
function renderEntityMeta(it){
  const ent=it.entities;
  if(!ent)return'';
  const parts=[];
  if(ent.law_category==='lege_organica')parts.push('<span class="bge bge-org">lege organică</span>');
  else if(ent.law_category==='lege_ordinara')parts.push('<span class="bge bge-ord">lege ordinară</span>');
  if(ent.flags?.includes('procedura_urgenta'))parts.push('<span class="bge bge-urg">urgență</span>');
  if(ent.flags?.includes('prioritate_legislativa'))parts.push('<span class="bge bge-pri">prioritate</span>');
  if(ent.flags?.includes('camera_decizionala'))parts.push('<span class="bge bge-cam">cam. dec.</span>');
  if(ent.flags?.includes('rezerva_raport'))parts.push('<span class="bge bge-rez">rezervă raport</span>');
  if(ent.institutions?.length){const inst=ent.institutions.map(i=>`<span class="item-comm-name">${i}</span>`).join('<span class="item-comm-sep"> · </span>');parts.push(`<span class="item-comm" style="color:var(--blue)">${inst}</span>`);}
  if(ent.commissions?.length){const comms=ent.commissions.map(c=>`<span class="item-comm-name">${c}</span>`).join('<span class="item-comm-sep"> · </span>');parts.push(`<span class="item-comm">${comms}</span>`);}
  if(it.idp)parts.push(`<a class="ext-btn" href="proiect.html?id=${it.idp}&leg=${LEG}" style="font-size:9px" title="Detalii proiect">proiect →</a>`);
  const metaRow=parts.length?`<div class="item-meta">${parts.join('')}</div>`:'';
  const subj=ent.subject?`<div class="item-subject">${ent.subject}</div>`:'';
  return metaRow+subj;
}

// ── render docs ──
function toggleDocs(btn){const list=btn.closest('.list-item-row').querySelector('.docs-list');const open=list.classList.toggle('open');btn.textContent=open?'documente ▲':`documente (${btn.dataset.count}) ▼`;}
function renderDocs(docs){if(!docs||!docs.length)return'';return`<div class="docs-list">${docs.map(d=>{const pdf=d.pdf_url?`<a href="${d.pdf_url}" target="_blank" rel="noopener" style="font-size:10px;flex-shrink:0">PDF ↗</a>`:'';const src=d.sursa==='caseta'?'<span class="doc-src">caseta</span>':'';return`<div class="doc-row"><span class="doc-date">${d.data||''}</span><span class="doc-title">${d.titlu}</span>${src}${pdf}</div>`;}).join('')}</div>`;}

// ── render list ──
function renderListItem({s,it}){
  const pos=it.pozitie!=null?String(it.pozitie):'–';const pdf=it.doc_pdf_url?`<a class="item-pdf" href="${it.doc_pdf_url}" target="_blank" rel="noopener">PDF ↗</a>`:'';const nr=it.nr_inregistrare?`<div style="color:var(--text3);font-size:10px;margin-top:1px">${it.nr_inregistrare}</div>`:'';const hasDocs=it.docs?.length;const tog=hasDocs?`<button class="docs-toggle" onclick="toggleDocs(this)" data-count="${it.docs.length}">documente (${it.docs.length}) ▼</button>`:'';
  return`<div class="list-item-row"><a class="sess-pill" href="ordine-zi.html?leg=${LEG}&date=${s.session_date}" title="Mergi la calendar">${s.session_date} ↗</a><div class="list-item-main"><span class="item-pos">${pos}.</span><span class="item-desc">${it.descriere||'—'}${nr}</span>${tog}${pdf}</div>${renderEntityMeta(it)}${renderDocs(it.docs)}</div>`;
}

function renderList(){
  const filtered=applyFilters();const count=filtered.length;
  document.getElementById('results-count').textContent=`${count} puncte`;
  if(!count){document.getElementById('results-list').innerHTML='<p style="color:var(--text3);font-size:11px;padding:4px 0">Niciun punct pentru filtrele selectate.</p>';return;}
  document.getElementById('results-list').innerHTML=filtered.map(renderListItem).join('');
}

// ── URL persistence ──
function getQueryParams(){const p=new URL(location).searchParams;return{q:p.get('q')||'',type:p.get('type')||'all',lawcat:p.get('lawcat')||'',action:p.get('action')||'',flags:p.getAll('flags')||[],acts:p.getAll('acts')||[],comms:p.getAll('comms')||[],instits:p.getAll('instits')||[],year:p.get('year')?+p.get('year'):0};}
function pushQueryParams(){const u=new URL(location);u.searchParams.set('q',listQ);u.searchParams.set('type',listItemType);u.searchParams.set('lawcat',listLawCat);u.searchParams.set('action',listAction);u.searchParams.set('year',listYear);Array.from(u.searchParams.keys()).forEach(k=>{if(['flags','acts','comms','instits'].includes(k))u.searchParams.delete(k);});Array.from(listFlags).forEach(f=>u.searchParams.append('flags',f));Array.from(listActTypes).forEach(a=>u.searchParams.append('acts',a));Array.from(listCommSlugs).forEach(c=>u.searchParams.append('comms',c));Array.from(listInstits).forEach(i=>u.searchParams.append('instits',i));history.replaceState({},'',(u.toString()));}

// ── search handler (debounced) ──
document.addEventListener('DOMContentLoaded',()=>{const searchInput=document.getElementById('search-input');searchInput.addEventListener('input',e=>{listQ=e.target.value;clearTimeout(searchTimer);searchTimer=setTimeout(()=>{renderList();pushQueryParams();},250);});});

// ── load data ──
async function load(){
  try{const res=await fetch(DATA_URL);if(!res.ok)throw new Error(res.statusText);const d=await res.json();allItems=[];const yearsSet=new Set();d.data.forEach(s=>{yearsSet.add(+s.session_date.slice(0,4));(s.items||[]).forEach(it=>{allItems.push({s,it});});});allYears=Array.from(yearsSet).sort((a,b)=>a-b);document.getElementById('leg-year').textContent=LEG;document.getElementById('leg-toggle').innerHTML=NAV.renderLegToggle(LEG,'ordine-zi-lista.html',[2024]);const total=allItems.length;document.getElementById('subtitle').innerHTML=`${total} puncte · Camera Deputaților`;const params=getQueryParams();listQ=params.q;listItemType=params.type;listLawCat=params.lawcat;listAction=params.action;listFlags=new Set(params.flags);listActTypes=new Set(params.acts);listCommSlugs=new Set(params.comms);listInstits=new Set(params.instits);listYear=params.year;document.getElementById('search-input').value=listQ;renderFilterUI();renderList();}catch(e){document.getElementById('results-list').innerHTML=`<div class="error">Nu pot încărca ${DATA_URL}: ${e.message}</div>`;}}
load();
</script>
<script>NAV.renderHeader();NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${DATA_URL}">${DATA_URL}</a>`);</script>
<script src="i18n.js"></script>
