<html lang="ro">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){:root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;.bge-org{background:#4c1d9533;color:#c4b5fd}.bge-ord{background:#1e3a8a33;color:#93c5fd}.bge-urg{background:#7f1d1d33;color:#fca5a5}.bge-cam{background:#0c4a6e33;color:#7dd3fc}.bge-pri{background:#14532d33;color:#86efac}.bge-rez{background:#78350f33;color:#fde68a}}}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){.header-inner{gap:12px;padding:0 14px}.nav a{font-size:12px;padding:4px 8px}.nav span:not(#lang-toggle-slot){display:none}}
@media(max-width:620px){.header-inner{flex-wrap:wrap;gap:8px}.logo{flex:0 0 auto}.nav{flex:0 1 auto;margin-left:0;overflow-x:auto;min-width:0}.nav a{font-size:11px;padding:3px 6px;flex-shrink:0}}
.container{max-width:1100px;margin:0 auto;padding:16px 20px}
h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.page-nav{display:flex;gap:8px;align-items:center;margin-left:auto}
.page-nav a{font-size:12px;color:var(--text2);padding:3px 8px;border-radius:var(--radius-sm);border:1px solid var(--border);text-decoration:none}
.page-nav a:hover{background:var(--bg2);color:var(--text)}
.sub{color:var(--text3);font-size:12px;margin-bottom:14px}

/* ── filter panel ── */
.filter-panel{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;background:var(--bg2)}
.filter-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-size:10px;color:var(--text3);padding-top:4px;white-space:nowrap;flex-shrink:0}
.filter-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip-btn{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text2);font-family:var(--font)}
.chip-btn:hover{background:var(--bg3)}
.chip-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-check{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border:1px solid var(--border);border-radius:3px;font-size:9px;cursor:pointer;color:var(--text2);user-select:none}
.chip-check:hover{background:var(--bg3)}
.chip-check.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip-check input{display:none}
.search-input{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;background:var(--bg);color:var(--text);width:260px;font-family:var(--font)}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{outline:none;border-color:var(--blue);background:var(--bg)}
.reset-btn{font-size:10px;padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--red-bg);color:var(--red-text);cursor:pointer;font-family:var(--font);font-weight:600}
.reset-btn:hover{opacity:.8}

/* ── results bar ── */
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px;font-size:12px;color:var(--text2)}
.results-count{flex:0 0 auto}
.year-chips{display:flex;gap:2px}

/* ── item list ── */
#results-list{margin-top:6px}
.list-item-row{display:flex;align-items:flex-start;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap}
.list-item-row:last-child{border-bottom:none}
.sess-pill{font-family:var(--mono);font-size:10px;color:var(--blue);background:var(--blue-bg);padding:2px 6px;border-radius:3px;white-space:nowrap;text-decoration:none;flex-shrink:0}
.sess-pill:hover{background:var(--blue);color:#fff}
.list-item-main{display:flex;align-items:flex-start;gap:6px;width:100%}
.item-pos{font-size:10px;color:var(--text3);min-width:20px;flex-shrink:0;padding-top:2px;font-family:var(--mono)}
.item-desc{flex:1;line-height:1.4;color:var(--text)}
.item-desc b{font-weight:600}
.item-desc i{color:var(--text2);font-size:11px}
.item-pdf{font-size:10px;flex-shrink:0;white-space:nowrap;padding-top:1px}
.docs-toggle{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 0 0;white-space:nowrap;font-family:var(--font)}
.docs-toggle:hover{color:var(--blue)}
.docs-list{display:none;width:100%;padding:4px 0 2px 26px}
.docs-list.open{display:block}
.doc-row{display:flex;align-items:baseline;gap:6px;padding:2px 0;font-size:11px;border-bottom:1px dotted var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-date{color:var(--text3);white-space:nowrap;min-width:76px;flex-shrink:0;font-family:var(--mono);font-size:10px}
.doc-title{flex:1;color:var(--text2)}
.doc-src{font-size:9px;color:var(--text3);flex-shrink:0}

/* ── entity metadata ── */
.item-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;width:100%;padding:2px 0 2px 26px}
.bge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.2px;white-space:nowrap}
.bge-org{background:#ede9fe;color:#6d28d9}
.bge-ord{background:#dbeafe;color:#1d4ed8}
.bge-urg{background:#fee2e2;color:#b91c1c}
.bge-cam{background:#e0f2fe;color:#0369a1}
.bge-pri{background:#dcfce7;color:#166534}
.bge-rez{background:#fef3c7;color:#92400e}
.item-subject{font-size:10px;color:var(--text2);padding:2px 0 1px 26px;font-style:italic;line-height:1.4}
.item-comm{font-size:9px;color:var(--text3);display:flex;flex-wrap:wrap;gap:1px;align-items:center}
.item-comm-name{white-space:nowrap}
.item-comm-sep{color:var(--border2);margin:0 1px}

.loading{text-align:center;padding:50px 0;color:var(--text3)}
.error{padding:12px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius-sm);margin:12px 0}

.footer{border-top:1px solid var(--border);padding:14px 20px;margin-top:36px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:6px 20px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <h1>
    <span>Lista / Filtrare — legislatura <span id="leg-year">2024</span></span>
    <div class="page-nav" id="leg-toggle"></div>
    <a href="ordine-zi.html?leg=2024" class="page-nav" style="border:none;padding:0;margin-left:auto">← Calendar</a>
  </h1>
  <p class="sub" id="subtitle"></p>

  <div class="filter-panel">
    <!-- Row 1: search + item type -->
    <div class="filter-row">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 căutare (descriere, subiect)">
      <span class="filter-label">Tipul:</span>
      <div class="filter-chips" id="item-type-chips"></div>
    </div>

    <!-- Row 2: law category + action -->
    <div class="filter-row">
      <span class="filter-label">Lege:</span>
      <div class="filter-chips" id="law-cat-chips"></div>
      <span class="filter-label">Acțiune:</span>
      <select id="action-select" style="font-size:10px;padding:2px 6px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--text);font-family:var(--font)">
        <option value="">Toate</option>
      </select>
    </div>

    <!-- Row 3: flags (checkboxes) -->
    <div class="filter-row">
      <span class="filter-label">Indicatori:</span>
      <div class="filter-chips" id="flags-chips"></div>
    </div>

    <!-- Row 4: referenced acts -->
    <div class="filter-row">
      <span class="filter-label">Acte ref.:</span>
      <div class="filter-chips" id="act-types-chips"></div>
    </div>

    <!-- Row 5: commissions -->
    <div class="filter-row">
      <span class="filter-label">Comisii:</span>
      <div class="filter-chips" id="comm-chips"></div>
    </div>

    <!-- Row 6: institutions -->
    <div class="filter-row">
      <span class="filter-label">Instituții:</span>
      <div class="filter-chips" id="instit-chips"></div>
    </div>

    <!-- Reset -->
    <div class="filter-row">
      <button class="reset-btn" onclick="clearFilters()">Resetează filtrele</button>
    </div>
  </div>

  <div class="results-bar">
    <span class="results-count" id="results-count"></span>
    <div class="year-chips" id="year-chips"></div>
  </div>

  <div id="results-list"><div class="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/ordine-zi/legislatura-${LEG}.json`;

// ── state ──
let allItems = [];
let allYears = [];
let listQ = '';
let listItemType = 'all';
let listLawCat = '';
let listFlags = new Set();
let listAction = '';
let listActTypes = new Set();
let listCommSlugs = new Set();
let listInstits = new Set();
let listYear = 0;
let searchTimer = null;

// ── URL persistence ──
function getQueryParams() {
  const p = new URL(location).searchParams;
  return {
    q: p.get('q') || '',
    type: p.get('type') || 'all',
    lawcat: p.get('lawcat') || '',
    action: p.get('action') || '',
    flags: p.getAll('flags') || [],
    acts: p.getAll('acts') || [],
    comms: p.getAll('comms') || [],
    instits: p.getAll('instits') || [],
    year: p.get('year') ? +p.get('year') : 0,
  };
}

function pushQueryParams() {
  const u = new URL(location);
  u.searchParams.set('q', listQ);
  u.searchParams.set('type', listItemType);
  u.searchParams.set('lawcat', listLawCat);
  u.searchParams.set('action', listAction);
  u.searchParams.set('year', listYear);

  // remove old params
  Array.from(u.searchParams.keys()).forEach(k => {
    if(['flags','acts','comms','instits'].includes(k)) u.searchParams.delete(k);
  });

  // add multi-value params
  Array.from(listFlags).forEach(f => u.searchParams.append('flags', f));
  Array.from(listActTypes).forEach(a => u.searchParams.append('acts', a));
  Array.from(listCommSlugs).forEach(c => u.searchParams.append('comms', c));
  Array.from(listInstits).forEach(i => u.searchParams.append('instits', i));

  history.replaceState({}, '', u.toString());
}

// ── filter definitions ──
const FILTER_SETS = {
  bills:      new Set(['proiect_lege','propunere_legislativa','reexaminare']),
  hotarari:   new Set(['proiect_hotarare']),
  motions:    new Set(['motiune_simpla','motiune_cenzura','angajare_raspundere']),
  procedural: new Set(['informare','informare_casete','prezentare','alocutiuni','alocutiune',
                      'interventie','moment_reculegere','mesaj','declaratie','dezbateri_politice',
                      'dezbateri','alegere','numire','constituire','vacantare','solicitare',
                      'sedinta_solemna','vot','raport']),
};

const ITEM_TYPE_LABELS = {
  all: 'Toate',
  bills: 'Proiecte lege',
  hotarari: 'Hotărâri',
  motions: 'Moțiuni',
  procedural: 'Procedural',
};

const FLAG_LABELS = {
  procedura_urgenta: 'urgență',
  prioritate_legislativa: 'prioritate',
  camera_decizionala: 'cam. dec.',
  rezerva_raport: 'rezervă raport',
  sesizare_neconstitutionalitate: 'sesizare CCR',
  cerere_reexaminare: 'reexaminare',
  complexitate_deosebita: 'complexitate',
};

const ACT_TYPE_LABELS = {
  OUG: 'OUG',
  OG: 'OG',
  Lege: 'Lege',
  CCR: 'CCR',
  HotarareParlament: 'Hot. Parl.',
  HotarareCamDepuati: 'Hot. CD',
};

// ── helper: get all distinct values from data ──
function getDistinctValues() {
  const acts = new Set();
  const actions = new Set();
  const comms = new Set();
  const instits = new Set();

  allItems.forEach(({it}) => {
    if(it.entities) {
      it.entities.referenced_acts?.forEach(a => acts.add(a.act_type));
      if(it.entities.action) actions.add(it.entities.action);
      it.entities.commission_slugs?.forEach(c => comms.add(c));
      it.entities.institutions?.forEach(i => instits.add(i));
    }
  });

  return {acts, actions, comms, instits};
}

// ── render filter UI ──
function renderFilterUI() {
  const {acts, actions, comms, instits} = getDistinctValues();

  // item type
  document.getElementById('item-type-chips').innerHTML = Object.entries(ITEM_TYPE_LABELS)
    .map(([k,v]) => `<button class="chip-btn${listItemType===k?' active':''}" data-type="${k}" onclick="setItemType('${k}')">${v}</button>`)
    .join('');

  // law category
  document.getElementById('law-cat-chips').innerHTML = `
    <button class="chip-btn${listLawCat===''?' active':''}" onclick="setLawCat('')">Toate</button>
    <button class="chip-btn${listLawCat==='lege_organica'?' active':''}" onclick="setLawCat('lege_organica')">Organică</button>
    <button class="chip-btn${listLawCat==='lege_ordinara'?' active':''}" onclick="setLawCat('lege_ordinara')">Ordinară</button>
  `;

  // action (select)
  const actSelect = document.getElementById('action-select');
  const actOpts = [''].concat(Array.from(actions).sort());
  actSelect.innerHTML = actOpts.map(a => {
    const label = a ? a.replace(/_/g, ' ') : 'Toate';
    return `<option value="${a}"${listAction===a?' selected':''}>${label}</option>`;
  }).join('');

  // flags
  document.getElementById('flags-chips').innerHTML = Object.entries(FLAG_LABELS)
    .map(([k,v]) => `<label class="chip-check${listFlags.has(k)?' active':''}" onclick="toggleFlag('${k}')">
      <input type="checkbox"${listFlags.has(k)?' checked':''}>
      <span>${v}</span>
    </label>`)
    .join('');

  // act types
  document.getElementById('act-types-chips').innerHTML = Array.from(acts).sort()
    .map(a => `<label class="chip-check${listActTypes.has(a)?' active':''}" onclick="toggleActType('${a}')">
      <input type="checkbox"${listActTypes.has(a)?' checked':''}>
      <span>${ACT_TYPE_LABELS[a]||a}</span>
    </label>`)
    .join('');

  // commissions
  const commOrder = ['juridica','buget_finante','munca','sanatate','agricultura','mediu','transporturi',
                     'aparare','politica_externa','administratie_publica','drepturile_omului','egalitate',
                     'invatamant','economica','industrii','constitutionalitate','cultura','it_comunicatii',
                     'stiinta','tineret','speciala_comuna'];
  const commSorted = commOrder.filter(c => comms.has(c)).concat(Array.from(comms).filter(c => !commOrder.includes(c)));
  document.getElementById('comm-chips').innerHTML = commSorted
    .map(c => `<label class="chip-check${listCommSlugs.has(c)?' active':''}" onclick="toggleCommSlug('${c}')">
      <input type="checkbox"${listCommSlugs.has(c)?' checked':''}>
      <span>${c.replace(/_/g, ' ')}</span>
    </label>`)
    .join('');

  // institutions
  document.getElementById('instit-chips').innerHTML = Array.from(instits).sort()
    .map(i => `<label class="chip-check${listInstits.has(i)?' active':''}" onclick="toggleInstit('${i}')">
      <input type="checkbox"${listInstits.has(i)?' checked':''}>
      <span>${i}</span>
    </label>`)
    .join('');

  // year chips
  document.getElementById('year-chips').innerHTML = ['0'].concat(allYears).map(y => {
    const label = y==='0' ? 'Toți ani' : y;
    return `<button class="chip-btn${listYear===+y?' active':''}" onclick="setYear(${y})">${label}</button>`;
  }).join('');
}

// ── filter setters ──
function setItemType(f) { listItemType=f; renderFilterUI(); renderList(); pushQueryParams(); }
function setLawCat(c) { listLawCat=c; renderFilterUI(); renderList(); pushQueryParams(); }
function setAction(a) { listAction=a; renderFilterUI(); renderList(); pushQueryParams(); }
function setYear(y) { listYear=y; renderFilterUI(); renderList(); pushQueryParams(); }
function toggleFlag(s) { if(listFlags.has(s)) listFlags.delete(s); else listFlags.add(s); renderFilterUI(); renderList(); pushQueryParams(); }
function toggleActType(t) { if(listActTypes.has(t)) listActTypes.delete(t); else listActTypes.add(t); renderFilterUI(); renderList(); pushQueryParams(); }
function toggleCommSlug(s) { if(listCommSlugs.has(s)) listCommSlugs.delete(s); else listCommSlugs.add(s); renderFilterUI(); renderList(); pushQueryParams(); }
function toggleInstit(i) { if(listInstits.has(i)) listInstits.delete(i); else listInstits.add(i); renderFilterUI(); renderList(); pushQueryParams(); }

function clearFilters() {
  listQ = ''; document.getElementById('search-input').value = '';
  listItemType = 'all'; listLawCat = ''; listAction = ''; listFlags.clear(); listActTypes.clear(); listCommSlugs.clear(); listInstits.clear(); listYear = 0;
  renderFilterUI();
  renderList();
  pushQueryParams();
}

// ── apply filters ──
function applyFilters() {
  let list = allItems;

  // item type filter
  if(listItemType !== 'all') {
    const types = FILTER_SETS[listItemType];
    list = list.filter(({it}) => types?.has(it.entities?.item_type));
  }

  // text search (debounced in input handler)
  if(listQ) {
    const q = listQ.toLowerCase();
    list = list.filter(({it}) => {
      const desc = (it.descriere||'').toLowerCase();
      const subj = (it.entities?.subject||'').toLowerCase();
      const regNr = (it.nr_inregistrare||'').toLowerCase();
      return desc.includes(q) || subj.includes(q) || regNr.includes(q);
    });
  }

  // law category
  if(listLawCat) {
    list = list.filter(({it}) => it.entities?.law_category === listLawCat);
  }

  // action
  if(listAction) {
    list = list.filter(({it}) => it.entities?.action === listAction);
  }

  // flags (AND: all selected must match)
  if(listFlags.size > 0) {
    list = list.filter(({it}) => {
      const flags = new Set(it.entities?.flags||[]);
      return Array.from(listFlags).every(f => flags.has(f));
    });
  }

  // act types (OR: at least one selected)
  if(listActTypes.size > 0) {
    list = list.filter(({it}) => {
      const acts = new Set(it.entities?.referenced_acts?.map(a => a.act_type)||[]);
      return Array.from(listActTypes).some(t => acts.has(t));
    });
  }

  // commission slugs (OR: at least one selected)
  if(listCommSlugs.size > 0) {
    list = list.filter(({it}) => {
      const comms = new Set(it.entities?.commission_slugs||[]);
      return Array.from(listCommSlugs).some(c => comms.has(c));
    });
  }

  // institutions (OR: at least one selected)
  if(listInstits.size > 0) {
    list = list.filter(({it}) => {
      const instits = new Set(it.entities?.institutions||[]);
      return Array.from(listInstits).some(i => instits.has(i));
    });
  }

  // year
  if(listYear > 0) {
    list = list.filter(({s}) => +s.session_date.slice(0,4) === listYear);
  }

  return list;
}

// ── render entity metadata (reuse from ordine-zi.html) ──
function renderEntityMeta(it) {
  const ent=it.entities;
  if(!ent) return '';
  const parts=[];
  if(ent.law_category==='lege_organica') parts.push('<span class="bge bge-org">lege organică</span>');
  else if(ent.law_category==='lege_ordinara') parts.push('<span class="bge bge-ord">lege ordinară</span>');
  if(ent.flags?.includes('procedura_urgenta'))     parts.push('<span class="bge bge-urg">urgență</span>');
  if(ent.flags?.includes('prioritate_legislativa')) parts.push('<span class="bge bge-pri">prioritate</span>');
  if(ent.flags?.includes('camera_decizionala'))     parts.push('<span class="bge bge-cam">cam. dec.</span>');
  if(ent.flags?.includes('rezerva_raport'))         parts.push('<span class="bge bge-rez">rezervă raport</span>');
  if(ent.institutions?.length){
    const inst=ent.institutions
      .map(i=>`<span class="item-comm-name">${i}</span>`)
      .join('<span class="item-comm-sep"> · </span>');
    parts.push(`<span class="item-comm" style="color:var(--blue)">${inst}</span>`);
  }
  if(ent.commissions?.length){
    const comms=ent.commissions
      .map(c=>`<span class="item-comm-name">${c}</span>`)
      .join('<span class="item-comm-sep"> · </span>');
    parts.push(`<span class="item-comm">${comms}</span>`);
  }
  if(it.idp) parts.push(
    `<a class="ext-btn" href="proiect.html?id=${it.idp}&leg=${LEG}" `+
    `style="font-size:9px" title="Detalii proiect">proiect →</a>`);
  const metaRow=parts.length?`<div class="item-meta">${parts.join('')}</div>`:'';
  const subj=ent.subject
    ?`<div class="item-subject">${ent.subject}</div>`
    :'';
  return metaRow+subj;
}

// ── render docs ──
function toggleDocs(btn){
  const list=btn.closest('.list-item-row').querySelector('.docs-list');
  const open=list.classList.toggle('open');
  btn.textContent=open?'documente ▲':`documente (${btn.dataset.count}) ▼`;
}

function renderDocs(docs){
  if(!docs||!docs.length) return '';
  return`<div class="docs-list">${docs.map(d=>{
    const pdf=d.pdf_url?`<a href="${d.pdf_url}" target="_blank" rel="noopener" style="font-size:10px;flex-shrink:0">PDF ↗</a>`:'';
    const src=d.sursa==='caseta'?'<span class="doc-src">caseta</span>':'';
    return`<div class="doc-row"><span class="doc-date">${d.data||''}</span><span class="doc-title">${d.titlu}</span>${src}${pdf}</div>`;
  }).join('')}</div>`;
}

// ── render single item ──
function renderListItem({s, it}) {
  const pos=it.pozitie!=null?String(it.pozitie):'–';
  const pdf=it.doc_pdf_url?`<a class="item-pdf" href="${it.doc_pdf_url}" target="_blank" rel="noopener">PDF ↗</a>`:'';
  const nr=it.nr_inregistrare?`<div style="color:var(--text3);font-size:10px;margin-top:1px">${it.nr_inregistrare}</div>`:'';
  const hasDocs=it.docs?.length;
  const tog=hasDocs?`<button class="docs-toggle" onclick="toggleDocs(this)" data-count="${it.docs.length}">documente (${it.docs.length}) ▼</button>`:'';
  return`<div class="list-item-row">
    <a class="sess-pill" href="ordine-zi.html?leg=${LEG}&date=${s.session_date}" title="Mergi la calendar">${s.session_date} ↗</a>
    <div class="list-item-main">
      <span class="item-pos">${pos}.</span>
      <span class="item-desc">${it.descriere||'—'}${nr}</span>
      ${tog}${pdf}
    </div>${renderEntityMeta(it)}${renderDocs(it.docs)}</div>`;
}

// ── render list ──
function renderList() {
  const filtered = applyFilters();
  const count = filtered.length;
  document.getElementById('results-count').textContent = `${count} puncte`;

  if(!count) {
    document.getElementById('results-list').innerHTML = '<p style="color:var(--text3);font-size:11px;padding:4px 0">Niciun punct pentru filtrele selectate.</p>';
    return;
  }

  document.getElementById('results-list').innerHTML = filtered.map(renderListItem).join('');
}

// ── search handler (debounced) ──
document.addEventListener('DOMContentLoaded', () => {
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', (e) => {
    listQ = e.target.value;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      renderList();
      pushQueryParams();
    }, 250);
  });

  const actionSelect = document.getElementById('action-select');
  actionSelect.addEventListener('change', (e) => {
    setAction(e.target.value);
  });
});

// ── load data ──
async function load() {
  try {
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();

    // flatten sessions → items
    allItems = [];
    const yearsSet = new Set();
    d.data.forEach(s => {
      yearsSet.add(+s.session_date.slice(0,4));
      (s.items||[]).forEach(it => {
        allItems.push({s, it});
      });
    });

    allYears = Array.from(yearsSet).sort((a,b) => a-b);

    document.getElementById('leg-year').textContent = LEG;
    document.getElementById('leg-toggle').innerHTML = NAV.renderLegToggle(LEG, 'ordine-zi-lista.html', [2024]);

    const total = allItems.length;
    document.getElementById('subtitle').innerHTML = `${total} puncte · Camera Deputaților`;

    // restore state from URL
    const params = getQueryParams();
    listQ = params.q;
    listItemType = params.type;
    listLawCat = params.lawcat;
    listAction = params.action;
    listFlags = new Set(params.flags);
    listActTypes = new Set(params.acts);
    listCommSlugs = new Set(params.comms);
    listInstits = new Set(params.instits);
    listYear = params.year;

    // update search input
    document.getElementById('search-input').value = listQ;
    document.getElementById('action-select').value = listAction;

    renderFilterUI();
    renderList();

  } catch(e) {
    document.getElementById('results-list').innerHTML = `<div class="error">Nu pot încărca ${DATA_URL}: ${e.message}</div>`;
  }
}

load();
</script>
<script>
NAV.renderHeader();
NAV.renderFooter(`<span data-i18n="source">Sursă JSON</span>: <a href="${DATA_URL}">${DATA_URL}</a>`);
</script>
<script src="i18n.js"></script>
