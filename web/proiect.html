<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proiecte legislative — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Browser proiecte legislative — Camera Deputaților.">
<meta property="og:type" content="website">
<meta property="og:title" content="Proiecte legislative — Camera Deputaților">
<meta property="og:description" content="Proiecte de lege și propuneri legislative — Camera Deputaților.">
<meta property="og:url" content="https://lab.gov2.ro/cdep/proiect.html">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-4.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.view-toggle{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;vertical-align:middle}
.view-btn{padding:4px 11px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}

/* Bill detail */
.bill-header{margin-bottom:28px}
.bill-header h1{font-size:20px;line-height:1.4;margin-bottom:12px}
.bill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag{font-size:12px;padding:4px 10px;border-radius:4px;font-weight:500}
.tag-tip{background:var(--bg3);color:var(--text2)}
.tag-stadiu-promulgat{background:var(--green-bg);color:var(--green-text)}
.tag-stadiu-adoptat{background:var(--blue-bg);color:var(--blue-text)}
.tag-stadiu-respins{background:var(--red-bg);color:var(--red-text)}
.tag-stadiu-lucru{background:var(--bg3);color:var(--text2)}
.meta-row{font-size:14px;color:var(--text2);margin-bottom:6px}
.meta-row strong{color:var(--text);font-weight:500}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-num{font-size:22px;font-weight:600;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}

.timeline{display:flex;flex-direction:column;gap:0;margin-bottom:28px}
.tl-row{display:flex;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.tl-row:last-child{border-bottom:none}
.tl-date{min-width:100px;color:var(--text3);flex-shrink:0;font-family:var(--mono);font-size:12px;padding-top:1px}
.tl-event{color:var(--text)}

/* List browser */
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:7px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);outline:none}
.search-input:focus{border-color:var(--blue)}
.filter-sel{padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:13px;background:var(--bg);color:var(--text);cursor:pointer;outline:none}

.bill-list{display:flex;flex-direction:column;gap:0}
.bill-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);text-decoration:none;color:inherit}
.bill-row:last-child{border-bottom:none}
.bill-row:hover{background:var(--bg2);margin:0 -8px;padding-left:8px;padding-right:8px;border-radius:var(--radius-sm)}
.bill-title{flex:1;font-size:13px;line-height:1.4;min-width:0}
.bill-meta{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-top:3px}
.pill{font-size:10px;padding:2px 7px;border-radius:3px;background:var(--bg3);color:var(--text2);white-space:nowrap;font-weight:500}
.pill-green{background:var(--green-bg);color:var(--green-text)}
.pill-blue{background:var(--blue-bg);color:var(--blue-text)}
.pill-red{background:var(--red-bg);color:var(--red-text)}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const IDP = getParam('idp');

// Year files are included in deploy; necunoscut.json is excluded (too large).
const YEAR_FILES_2024 = ['2024','2025','2026'];
const YEAR_FILES_2020 = ['2020','2021','2022','2023','2024'];
const yearFiles = LEG===2024 ? YEAR_FILES_2024 : YEAR_FILES_2020;

const STADIU_LABELS = {
  promulgat:'Promulgat', adoptat:'Adoptat', respins:'Respins',
  in_lucru:'În lucru', retras:'Retras',
};
function stadiuLabel(s){return STADIU_LABELS[s]||s||'?';}
function stadiuClass(s){
  if(s==='promulgat') return 'pill-green';
  if(s==='adoptat') return 'pill-blue';
  if(s==='respins') return 'pill-red';
  return '';
}
function tipShort(t){
  if(t==='propunere_legislativa') return 'PL';
  if(t==='proiect_lege') return 'PLG';
  return t||'?';
}

// --- Vote cross-link helpers ---
function extractBillKey(nr){
  const m = (nr||'').match(/(\d+\/\d{4})/);
  return m ? m[1] : null;
}

function findMatchingVote(bill, votIdx){
  if(!votIdx?.length) return null;
  const key = extractBillKey(bill.nr_inregistrare) || extractBillKey(bill.nr_camera_deputati);
  if(!key) return null;
  return votIdx.find(v=>{
    const d = v.descriere||'';
    return d.includes(key) && (d.includes('final') || d.toLowerCase().includes('vot'));
  }) || null;
}

function renderVoteLink(voteItem, leg){
  if(!voteItem) return '';
  const adopted = (voteItem.counts?.pentru||0) > (voteItem.counts?.contra||0);
  const badge = adopted
    ? `<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:var(--green-bg);color:var(--green-text);font-weight:600">Adoptat</span>`
    : `<span style="font-size:10px;padding:2px 7px;border-radius:3px;background:var(--red-bg);color:var(--red-text);font-weight:600">Respins</span>`;
  const c = voteItem.counts||{};
  return `<div style="margin-bottom:20px;padding:12px 14px;background:var(--bg2);border-radius:var(--radius);display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Vot final în plen</div>
      <a href="vot.html?id=${voteItem.cdep_idv}&leg=${leg}" style="font-size:13px;font-weight:500">${voteItem.descriere||'Vot final'} ↗</a>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
      ${badge}
      <span style="font-size:12px;color:var(--green-text)">✓ ${c.pentru||0}</span>
      <span style="font-size:12px;color:var(--red-text)">✗ ${c.contra||0}</span>
      ${c.abtineri?`<span style="font-size:12px;color:var(--text3)">~ ${c.abtineri}</span>`:''}
    </div>
  </div>`;
}

// --- Detail view ---
function renderTimeline(events){
  if(!events||!events.length) return '';
  const rows = events.map(e=>`<div class="tl-row">
    <span class="tl-date">${e.data||''}</span>
    <span class="tl-event">${e.eveniment||''}</span>
  </div>`).join('');
  return`<div class="section"><h2>Calendar</h2><div class="timeline">${rows}</div></div>`;
}

function renderBillDetail(p, voteItem=null){
  const stadiu = p.stadiu||'';
  const stadiuTagClass = stadiu==='promulgat'?'tag-stadiu-promulgat':stadiu==='adoptat'?'tag-stadiu-adoptat':stadiu==='respins'?'tag-stadiu-respins':'tag-stadiu-lucru';
  const tipTag = p.tip?`<span class="tag tag-tip">${tipShort(p.tip)}</span>`:'';
  const stadiuTag = stadiu?`<span class="tag ${stadiuTagClass}">${stadiuLabel(stadiu)}</span>`:'';
  const urgentaTag = p.procedura_urgenta?`<span class="tag" style="background:var(--amber-bg);color:var(--amber-text)">Urgență</span>`:'';
  const lege = p.lege_nr?`<span class="tag tag-tip">Lege nr. ${p.lege_nr}</span>`:'';

  const votHtml = (p.vot_pentru!=null)
    ?`<div class="stats-row">
        <div class="stat-card"><div class="stat-num" style="color:var(--green-text)">${p.vot_pentru}</div><div class="stat-lbl">Pentru</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--red-text)">${p.vot_contra}</div><div class="stat-lbl">Contra</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--text3)">${p.vot_abtineri||0}</div><div class="stat-lbl">Abțineri</div></div>
        ${(p.amendamente_admise||0)+(p.amendamente_respinse||0)>0
          ?`<div class="stat-card"><div class="stat-num">${p.amendamente_admise||0}</div><div class="stat-lbl">Amendamente admise</div></div>
            <div class="stat-card"><div class="stat-num">${p.amendamente_respinse||0}</div><div class="stat-lbl">Respinse</div></div>`
          :''}
      </div>`
    :'';

  const docLinks = (p.documente_pdf||[]).concat(p.raport_comisie_pdf?[{label:'Raport comisie',url:p.raport_comisie_pdf}]:[]);
  const docsHtml = docLinks.length
    ?`<div class="section"><h2>Documente</h2><div style="display:flex;flex-wrap:wrap;gap:8px">${docLinks.map(d=>`<a class="pill" href="${d.url}" target="_blank" rel="noopener">${d.label||'Document'} ↗</a>`).join('')}</div></div>`
    :'';

  const cdepLink = p.source_url?`<div class="meta-row"><a href="${p.source_url}" target="_blank" rel="noopener">Fișă completă pe cdep.ro ↗</a></div>`:'';

  NAV.setPageMeta((p.titlu||'Proiect').slice(0,70), `${p.nr_inregistrare||''} · ${p.initiator||''} · stadiu: ${stadiuLabel(p.stadiu||'')} · Camera Deputaților`);

  return`
    <div class="bill-header">
      <div style="font-size:13px;color:var(--text3);margin-bottom:8px"><a href="proiecte-stats.html?leg=${LEG}">← Statistici proiecte</a></div>
      <h1>${p.titlu||'Proiect fără titlu'}</h1>
      <div class="bill-tags">${tipTag}${stadiuTag}${urgentaTag}${lege}</div>
      ${p.nr_inregistrare?`<div class="meta-row"><strong>Nr. înregistrare:</strong> ${p.nr_inregistrare}</div>`:''}
      ${p.initiator?`<div class="meta-row"><strong>Inițiator:</strong> ${p.initiator}</div>`:''}
      ${p.data_inregistrare_cd?`<div class="meta-row"><strong>Data înregistrare CD:</strong> ${p.data_inregistrare_cd}</div>`:''}
      ${p.data_promulgare?`<div class="meta-row"><strong>Data promulgare:</strong> ${p.data_promulgare}</div>`:''}
      ${cdepLink}
    </div>
    ${votHtml}
    ${renderVoteLink(voteItem, LEG)}
    ${renderTimeline(p.timeline)}
    ${docsHtml}
  `;
}

// --- List / browser view ---
let ALL_BILLS = [];
let searchQuery = '';
let filterStadiu = '';

function filteredBills(){
  return ALL_BILLS.filter(p=>{
    if(filterStadiu && p.stadiu!==filterStadiu) return false;
    if(searchQuery){
      const q = searchQuery.toLowerCase();
      if(!(p.titlu||'').toLowerCase().includes(q) &&
         !(p.initiator||'').toLowerCase().includes(q) &&
         !(p.nr_inregistrare||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderList(){
  const data = filteredBills();
  const cnt = document.getElementById('result-count');
  if(cnt) cnt.textContent = `${data.length} din ${ALL_BILLS.length} proiecte`;
  const wrap = document.getElementById('bill-list');
  if(!wrap) return;
  if(!data.length){wrap.innerHTML='<p style="color:var(--text3);padding:16px 0">Niciun proiect găsit.</p>';return;}
  wrap.innerHTML = data.map(p=>{
    const stadiuPill = `<span class="pill ${stadiuClass(p.stadiu)}">${stadiuLabel(p.stadiu)}</span>`;
    const tipPill = `<span class="pill">${tipShort(p.tip)}</span>`;
    const datePill = p.data_inregistrare_cd?`<span style="font-size:11px;color:var(--text3)">${p.data_inregistrare_cd}</span>`:'';
    const initPill = p.initiator?`<span style="font-size:11px;color:var(--text3)">${p.initiator.slice(0,40)}${p.initiator.length>40?'…':''}</span>`:'';
    return`<a class="bill-row" href="proiect.html?idp=${p.cdep_idp}&leg=${LEG}">
      <div class="bill-title">
        ${p.titlu||'(fără titlu)'}
        <div class="bill-meta">${tipPill}${stadiuPill}${datePill}${initPill}</div>
      </div>
    </a>`;
  }).join('');
}

async function loadList(){
  try{
    const responses = await Promise.all(
      yearFiles.map(y=>fetch(`data/v1/proiecte/legislatura-${LEG}/${y}.json`).then(r=>r.ok?r.json():null).catch(()=>null))
    );
    for(const resp of responses){
      const items = resp?.data || (Array.isArray(resp) ? resp : []);
      ALL_BILLS.push(...items);
    }
    ALL_BILLS.sort((a,b)=>(b.data_inregistrare_cd||'').localeCompare(a.data_inregistrare_cd||''));

    const total = ALL_BILLS.length;
    const promulgate = ALL_BILLS.filter(p=>p.stadiu==='promulgat').length;
    const stadiuOptions = [...new Set(ALL_BILLS.map(p=>p.stadiu).filter(Boolean))]
      .sort()
      .map(s=>`<option value="${s}">${stadiuLabel(s)}</option>`)
      .join('');

    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
        <h1 style="margin:0">Proiecte legislative — legislatura ${LEG}</h1>
        <div class="view-toggle">${NAV.renderLegToggle(LEG,'proiect.html',[2024,2020])}</div>
      </div>
      <p class="sub">${total} proiecte cu dată de înregistrare · <a href="proiecte-stats.html?leg=${LEG}">Statistici agregate ↗</a>
        <span style="color:var(--text3)"> · Proiectele fără dată nu sunt incluse în browser</span></p>
      <div class="search-bar">
        <input class="search-input" id="search-input" placeholder="Caută titlu, inițiator sau număr…" oninput="searchQuery=this.value;renderList()">
        <select class="filter-sel" onchange="filterStadiu=this.value;renderList()">
          <option value="">Toate stadiile</option>
          ${stadiuOptions}
        </select>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:8px" id="result-count"></div>
      <div class="bill-list" id="bill-list"></div>
    `;
    renderList();
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Eroare la încărcarea datelor: ${e.message}</div>`;
  }
}

async function loadDetail(idp){
  try{
    const [proiecteResps, votIdxResp] = await Promise.all([
      Promise.all(yearFiles.map(y=>fetch(`data/v1/proiecte/legislatura-${LEG}/${y}.json`).then(r=>r.ok?r.json():null).catch(()=>null))),
      fetch(`data/v1/voturi/${LEG}/_index.json`).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    const votIdx = votIdxResp?.data || [];
    let bill = null;
    for(const resp of proiecteResps){
      const items = resp?.data || (Array.isArray(resp) ? resp : []);
      bill = items.find(p=>String(p.cdep_idp)===String(idp));
      if(bill) break;
    }
    if(!bill){
      const cdepUrl = `https://www.cdep.ro/pls/proiecte/upl_pck2015.proiect?idp=${idp}&cam=2&leg=${LEG}`;
      document.getElementById('content').innerHTML=`
        <div style="font-size:13px;color:var(--text3);margin-bottom:16px"><a href="proiecte-stats.html?leg=${LEG}">← Statistici proiecte</a></div>
        <div class="error" style="background:var(--amber-bg);color:var(--amber-text)">
          Proiectul cu idp=${idp} nu se află în browserul local (fișierele cu dată necunoscută nu sunt incluse în deploy).<br><br>
          <a href="${cdepUrl}" target="_blank" rel="noopener">Vizualizează pe cdep.ro ↗</a>
        </div>`;
      return;
    }
    const voteItem = findMatchingVote(bill, votIdx);
    document.getElementById('content').innerHTML = renderBillDetail(bill, voteItem);
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Eroare: ${e.message}</div>`;
  }
}

if(IDP){
  loadDetail(IDP);
}else{
  loadList();
}
</script>
<script>
NAV.renderHeader();
NAV.renderFooter();
</script>
<script src="i18n.js"></script>
</body>
</html>
