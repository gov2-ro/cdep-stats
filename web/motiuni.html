<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moțiuni parlamentare — Camera Deputaților</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="description" content="Moțiuni parlamentare simple — Camera Deputaților, 1992–2024.">
<meta property="og:type" content="website">
<meta property="og:title" content="Moțiuni parlamentare — Camera Deputaților">
<meta property="og:description" content="Moțiuni parlamentare simple ale Camerei Deputaților, 1992–2024.">
<meta property="og:url" content="https://lab.gov2.ro/cdep/motiuni.html">
<meta property="og:image" content="https://lab.gov2.ro/cdep/assets/screenshots/cdep-stats-5.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-bg:#EAF3DE;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root:not(.light-mode){--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
:root.dark-mode{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:8px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.logo em{font-style:normal;color:var(--text2)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{white-space:nowrap;font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
@media(max-width:820px){
  .header-inner{gap:12px;padding:0 16px}
  .nav a{font-size:12px;padding:4px 8px}
  .nav span:not(#lang-toggle-slot){display:none}
}
@media(max-width:620px){
  .header-inner{flex-wrap:wrap;gap:8px}
  .logo{flex:0 0 auto}
  .nav{flex:0 1 auto;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;min-width:0}
  .nav a{font-size:11px;padding:3px 6px;flex-shrink:0}
}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:16px;font-weight:600;margin:28px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px}
.card{background:var(--bg2);border-radius:var(--radius);padding:16px;text-align:center}
.card .num{font-size:22px;font-weight:600;margin-bottom:4px}
.card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.card .num.good{color:var(--green-text)}
.card .num.bad{color:var(--red-text)}

.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 12px;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text2);cursor:pointer}
.filter-btn.active{background:var(--blue-bg);color:var(--blue-text);border-color:var(--blue);font-weight:600}

.timeline{display:flex;flex-direction:column;gap:0}
.leg-group{margin-bottom:0}
.leg-heading{font-size:13px;font-weight:600;color:var(--text3);padding:10px 0 6px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.leg-heading .count{font-size:11px;font-weight:400;color:var(--text3)}

.motion-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.motion-row:last-child{border-bottom:none}
.motion-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:5px}
.motion-body{flex:1;min-width:0}
.motion-title{font-size:13px;line-height:1.4;margin-bottom:4px}
.motion-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:11px;color:var(--text3)}
.rezultat-badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}
.rez-respinsa{background:var(--red-bg);color:var(--red-text)}
.rez-adoptata{background:var(--green-bg);color:var(--green-text)}
.rez-in_procedura{background:var(--amber-bg);color:var(--amber-text)}
.rez-other{background:var(--bg3);color:var(--text2)}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
.header{background:#42133c;border-bottom-color:transparent}.logo{color:#fff}.logo span{color:#88dfc4}.nav a{white-space:nowrap;color:rgba(255,255,255,.72)}.nav a:hover{background:rgba(255,255,255,.11);color:#fff}.nav a.active{color:#fff;background:rgba(255,255,255,.08)}.header .nav a[style*=color]{color:rgba(255,255,255,.85)!important}.notice-bar{display:flex;align-items:center;gap:8px;padding:7px 24px;background:rgba(250,204,21,.1);border-bottom:1px solid rgba(250,204,21,.2);font-size:12px;color:var(--text2)}.notice-bar a{color:inherit;text-decoration:underline;opacity:.85}.notice-icon{font-size:13px;opacity:.8;flex-shrink:0}.notice-text{flex:1}.notice-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;flex-shrink:0}.notice-close:hover{color:var(--text)}.nav button{color:rgba(255,255,255,.72);background:transparent;border:none}.nav button:hover{background:rgba(255,255,255,.11);color:#fff}#lang-toggle-slot button,#lang-toggle-slot a{color:rgba(255,255,255,.72)!important}#lang-toggle-slot button:hover,#lang-toggle-slot a:hover{color:#fff!important}.notice-bar.hidden{display:none}
</style>
</head>
<body>

<div class="notice-bar hidden" id="notice-bar"><span class="notice-icon">⚠</span><span class="notice-text">Versiune alfa / preview. Acesta NU ESTE un proiect oficial al Guvernului României. Date preluate de pe <a href="https://cdep.ro" target="_blank" rel="noopener">cdep.ro</a>.</span><button class="notice-close" id="notice-close" aria-label="Închide">×</button></div>
<div id="site-header"></div>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<div id="site-footer"></div>

<script src="assets/nav.js"></script>
<script>
const LEGS = [2024,2020,2016,2012,2008,2004,2000,1996,1992];
const DATA_URLS = LEGS.map(l=>`data/v1/motiuni/legislatura-${l}.json`);

const REZ_LABEL = {
  respinsa:'Respinsă', adoptata:'Adoptată', in_procedura:'În procedură', other:'Alta'
};
const REZ_CLASS = {
  respinsa:'rez-respinsa', adoptata:'rez-adoptata', in_procedura:'rez-in_procedura', other:'rez-other'
};
const REZ_COLOR = {
  respinsa:'var(--red-text)', adoptata:'var(--green-text)', in_procedura:'var(--amber-text)', other:'var(--text3)'
};

let ALL_DATA = [];
let activeFilter = 'all';

function rezBadge(r){
  const cls = REZ_CLASS[r]||'rez-other';
  const lbl = REZ_LABEL[r]||r||'Necunoscut';
  return`<span class="rezultat-badge ${cls}">${lbl}</span>`;
}

function renderMotion(m){
  const rez = m.rezultat||'other';
  const color = REZ_COLOR[rez]||'var(--text3)';
  const date = m.data_inregistrare||m.data_vot||'';
  const pdf = m.pdf_url?`<a href="${m.pdf_url}" target="_blank" rel="noopener">PDF ↗</a>`:'';
  const signers = (m.semnatari||[]).length;
  const signersNote = signers?`${signers} semnatari`:'';
  return`<div class="motion-row">
    <div class="motion-dot" style="background:${color}"></div>
    <div class="motion-body">
      <div class="motion-title">${m.titlu||'(fără titlu)'}</div>
      <div class="motion-meta">
        ${rezBadge(rez)}
        ${date?`<span>${date}</span>`:''}
        ${signersNote?`<span>${signersNote}</span>`:''}
        ${pdf}
      </div>
    </div>
  </div>`;
}

function render(){
  const data = activeFilter==='all'
    ? ALL_DATA
    : ALL_DATA.filter(m=>(m.rezultat||'other')===activeFilter);

  const byLeg = {};
  for(const m of data){
    const l = m.legislatura;
    if(!byLeg[l]) byLeg[l]=[];
    byLeg[l].push(m);
  }

  const timeline = LEGS
    .filter(l=>byLeg[l]?.length)
    .map(l=>`
      <div class="leg-group">
        <div class="leg-heading">Legislatura ${l} <span class="count">(${byLeg[l].length})</span></div>
        ${byLeg[l].map(renderMotion).join('')}
      </div>
    `).join('');

  document.getElementById('timeline-wrap').innerHTML = timeline||'<p style="color:var(--text3);padding:20px 0">Nicio moțiune pentru filtrul selectat.</p>';
}

function setFilter(f){
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  render();
}

async function load(){
  try{
    const responses = await Promise.all(DATA_URLS.map(u=>fetch(u).then(r=>r.ok?r.json():null).catch(()=>null)));
    for(const resp of responses){
      if(resp?.data) ALL_DATA.push(...resp.data);
    }
    ALL_DATA.sort((a,b)=>{
      const la=a.legislatura, lb=b.legislatura;
      if(lb!==la) return lb-la;
      const da=a.data_inregistrare||'', db=b.data_inregistrare||'';
      return db.localeCompare(da);
    });

    const total = ALL_DATA.length;
    const adoptate = ALL_DATA.filter(m=>m.rezultat==='adoptata').length;
    const respinse = ALL_DATA.filter(m=>m.rezultat==='respinsa').length;
    const inProcedura = ALL_DATA.filter(m=>m.rezultat==='in_procedura').length;

    document.getElementById('content').innerHTML = `
      <div style="margin-bottom:6px">
        <h1 style="margin:0">Moțiuni parlamentare simple</h1>
      </div>
      <p class="sub">${total} moțiuni înregistrate la Camera Deputaților · 1992–2024</p>
      <div class="cards">
        <div class="card"><div class="num">${total}</div><div class="lbl">Total</div></div>
        <div class="card"><div class="num bad">${respinse}</div><div class="lbl">Respinse</div></div>
        <div class="card"><div class="num good">${adoptate}</div><div class="lbl">Adoptate</div></div>
        <div class="card"><div class="num" style="color:var(--amber-text)">${inProcedura}</div><div class="lbl">În procedură</div></div>
      </div>
      <div class="filter-bar">
        <button class="filter-btn active" data-f="all" onclick="setFilter('all')">Toate</button>
        <button class="filter-btn" data-f="respinsa" onclick="setFilter('respinsa')">Respinse</button>
        <button class="filter-btn" data-f="adoptata" onclick="setFilter('adoptata')">Adoptate</button>
        <button class="filter-btn" data-f="in_procedura" onclick="setFilter('in_procedura')">În procedură</button>
      </div>
      <div class="timeline" id="timeline-wrap"></div>
    `;
    render();
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Eroare la încărcarea datelor: ${e.message}</div>`;
  }
}
load();
</script>
<script>
NAV.renderHeader();
NAV.renderFooter();
</script>
<script src="i18n.js"></script>
</body>
</html>
