<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proiecte legislative — statistici · Camera Deputaților</title>
<meta name="description" content="Statistici proiecte legislative · Camera Deputaților 2024">
<meta property="og:type" content="website">
<meta property="og:title" content="Proiecte legislative — statistici">
<meta property="og:description" content="Statistici proiecte legislative · Camera Deputaților 2024">
<meta property="og:url" content="https://endimion2k.github.io/cdep-api-poc/proiecte-stats.html">
<meta property="og:image" content="https://endimion2k.github.io/cdep-api-poc/data/assets/og/proiecte-stats.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#555;--text3:#888;
  --border:#e0deda;--border2:#ccc;
  --green:#1D9E75;--green-text:#3B6D11;
  --blue:#185FA5;--blue-bg:#E6F1FB;--blue-text:#185FA5;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --amber-bg:#FAEEDA;--amber-text:#854F0B;
  --radius:10px;--radius-sm:6px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--bg2:#232323;--bg3:#2a2a2a;--text:#e8e6e0;--text2:#aaa;--text3:#666;--border:#333;--border2:#444;}
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;font-size:15px}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:16px}
.logo{font-size:15px;font-weight:600;color:var(--text);text-decoration:none}
.logo span{color:var(--green)}
.nav{margin-left:auto;display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.nav a{font-size:13px;padding:5px 10px;border-radius:var(--radius-sm);color:var(--text2);text-decoration:none}
.nav a:hover{background:var(--bg2)}
.nav a.active{color:var(--text);font-weight:600}
.container{max-width:1100px;margin:0 auto;padding:28px 24px}
h1{font-size:24px;font-weight:600;margin-bottom:4px}
.sub{color:var(--text3);font-size:13px;margin-bottom:24px}
h2{font-size:17px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.view-toggle{display:inline-flex;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;vertical-align:middle}
.view-btn{padding:4px 11px;font-size:12px;border:none;background:var(--bg);color:var(--text2);cursor:pointer}
.view-btn.active{background:var(--blue-bg);color:var(--blue-text);font-weight:600}

/* Pipeline / funnel */
.pipeline{display:flex;align-items:stretch;gap:0;margin-bottom:32px;overflow-x:auto}
.pipe-stage{flex:1;min-width:110px;padding:16px 12px;text-align:center;position:relative}
.pipe-stage:not(:last-child)::after{content:'→';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text3);z-index:1}
.pipe-stage .p-num{font-size:26px;font-weight:700;margin-bottom:4px}
.pipe-stage .p-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.pipe-stage .p-pct{font-size:11px;margin-top:2px}
.pipe-in-lucru{background:var(--bg2);border-radius:var(--radius) 0 0 var(--radius)}
.pipe-adoptat{background:var(--blue-bg)}
.pipe-promulgat{background:#e6f6ee;color:var(--green-text)}
.pipe-respins{background:var(--red-bg);border-radius:0 var(--radius) var(--radius) 0}
.pipe-promulgat .p-num{color:var(--green-text)}
.pipe-adoptat .p-num{color:var(--blue-text)}
.pipe-respins .p-num{color:var(--red-text)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:32px}
.card{background:var(--bg2);border-radius:var(--radius);padding:14px;text-align:center}
.card .num{font-size:20px;font-weight:600;margin-bottom:4px}
.card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}

.section{margin-bottom:32px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
@media(max-width:680px){.grid2{grid-template-columns:1fr}}

table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border)}
th{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
td.num,th.num{text-align:right;font-family:var(--mono)}
.pill{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--text2)}
.bar-wrap{display:flex;align-items:center;gap:5px}
.bar-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;min-width:40px}
.bar-fill{height:6px;border-radius:3px}

/* Monthly chart */
.month-chart{display:flex;align-items:flex-end;gap:2px;height:80px;padding:4px 0}
.month-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:stretch;justify-content:flex-end;height:100%;position:relative;cursor:default}
.month-bar-wrap:hover .month-bar-tip{display:block}
.mb-total{border-radius:2px 2px 0 0;background:var(--blue-bg);flex-shrink:0}
.mb-promo{background:var(--green);border-radius:2px 2px 0 0;flex-shrink:0}
.month-bar-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;white-space:nowrap;pointer-events:none;z-index:10}
.month-labels{display:flex;gap:2px;margin-top:2px}
.month-label{flex:1;font-size:8px;color:var(--text3);text-align:center;overflow:hidden;white-space:nowrap}
.chart-legend{display:flex;gap:12px;font-size:11px;color:var(--text3);margin-bottom:6px}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}

.loading{text-align:center;padding:60px 0;color:var(--text3)}
.error{padding:20px;background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);margin:20px 0}
.footer{border-top:1px solid var(--border);padding:20px 24px;margin-top:48px;font-size:12px;color:var(--text3);text-align:center}
.footer a{color:var(--text2)}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">cdep<span>-api</span> <em>stats</em></a>
    <nav class="nav">
      <a href="avere.html">Averi</a>
      <a href="deputati-avere.html">Averi++</a>
      <a href="deputati-activitate.html">Activitate</a>
      <a href="interpelari-stats.html">Interpelări</a>
      <a href="proiecte-stats.html" class="active">Proiecte</a>
      <a href="judete.html">Județe</a>
      <!-- <a href="search.html" data-i18n="search">Caută</a> -->
      <span id="lang-toggle-slot" style="margin-left:4px;display:flex;align-items:center"></span>
    </nav>
  </div>
</header>

<div class="container">
  <div id="content"><div class="loading" data-i18n="loading">Se încarcă…</div></div>
</div>

<footer class="footer">
  <p><span data-i18n="data_from">Date din</span> <a href="https://cdep.ro" target="_blank">cdep.ro</a>, via CDEP API: <a href="https://github.com/Endimion2k/cdep-api-poc" target="_blank">Endimion2k/cdep-api-poc</a> ·
  <span data-i18n="source">Sursă JSON</span>: <a id="json-link" href="#">proiecte.json</a> ·
  <a href="index.html" data-i18n="page_main">Pagina principală</a></p>
</footer>

<script>
function getParam(n){return new URL(location).searchParams.get(n);}
const LEG = Number(getParam('leg') || 2024);
const DATA_URL = `data/v1/stats/proiecte-${LEG}.json`;
document.getElementById('json-link').href = DATA_URL;
document.getElementById('json-link').textContent = `proiecte-${LEG}.json`;

const PARTY_COLORS = {
  'PSD':'#185FA5','PNL':'#993C1D','USR':'#3B6D11','AUR':'#854F0B',
  'UDMR':'#5F5E5A','SOS RO':'#A32D2D','POT':'#553378','Guvern':'#444',
};
function partyColor(p){return PARTY_COLORS[p]||'#777';}

function pct(a,b){return b?Math.round(a/b*100):0;}

function monthChart(monthly){
  if(!monthly.length) return '';
  const maxT = Math.max(...monthly.map(m=>m.total),1);
  const bars = monthly.map(m=>{
    const hT = Math.max(2, Math.round(m.total/maxT*72));
    const hP = m.total ? Math.round(m.promulgate/m.total*hT) : 0;
    const hR = hT - hP;
    return`<div class="month-bar-wrap">
      <span class="month-bar-tip">${m.month}: ${m.total} proiecte, ${m.promulgate} promulgate</span>
      <div class="mb-total" style="height:${hR}px"></div>
      <div class="mb-promo" style="height:${hP}px"></div>
    </div>`;
  }).join('');
  const labels = monthly.map(m=>`<span class="month-label">${m.month.slice(2)}</span>`).join('');
  return`<div class="chart-legend">
    <span><span class="legend-dot" style="background:var(--blue-bg)"></span>Înregistrate</span>
    <span><span class="legend-dot" style="background:var(--green)"></span>Promulgate</span>
  </div>
  <div class="month-chart">${bars}</div>
  <div class="month-labels">${labels}</div>`;
}

function rateBar(rate, color){
  return`<div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill" style="width:${Math.min(rate,100)}%;background:${color}"></div></div>
    <span style="font-family:var(--mono);font-size:11px;min-width:36px;text-align:right;color:${color}">${rate}%</span>
  </div>`;
}

async function load(){
  try{
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error(res.statusText);
    const d = await res.json();
    const c = d.cards;

    const tipPL = d.by_tip['propunere_legislativa'] || 0;
    const tipLL = d.by_tip['proiect_lege'] || 0;

    const legToggle = [2024,2020].map(l=>
      `<button class="view-btn${l===LEG?' active':''}" onclick="location.href='proiecte-stats.html?leg=${l}'">${l}</button>`
    ).join('');

    // Party table
    const partyRows = d.per_partid.map((p,i)=>`<tr>
      <td class="num" style="color:var(--text3);font-size:11px">${i+1}</td>
      <td><span class="pill" style="background:${partyColor(p.partid)}22;color:${partyColor(p.partid)}">${p.partid}</span></td>
      <td class="num">${p.total.toLocaleString('ro-RO')}</td>
      <td class="num" style="color:var(--green-text)">${p.promulgate}</td>
      <td>${rateBar(p.rate_promulgate, p.rate_promulgate>=30?'var(--green-text)':p.rate_promulgate>=15?'var(--amber-text)':'var(--red-text)')}</td>
    </tr>`).join('');

    // Camera table
    const cameraRows = d.camera_decizionala.map(c=>
      `<tr><td>${c.camera}</td><td class="num">${c.total.toLocaleString('ro-RO')}</td><td class="num">${pct(c.total,d.cards.total)}%</td></tr>`
    ).join('');

    document.getElementById('content').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap">
        <h1 style="margin:0">Proiecte legislative — legislatura ${LEG}</h1>
        <div class="view-toggle">${legToggle}</div>
      </div>
      <p class="sub">${c.total.toLocaleString('ro-RO')} proiecte înregistrate · ${tipLL.toLocaleString('ro-RO')} proiecte de lege · ${tipPL.toLocaleString('ro-RO')} propuneri legislative</p>

      <div class="pipeline">
        <div class="pipe-stage pipe-in-lucru">
          <div class="p-num">${c.in_lucru.toLocaleString('ro-RO')}</div>
          <div class="p-lbl">În lucru</div>
          <div class="p-pct" style="color:var(--text3)">${pct(c.in_lucru,c.total)}%</div>
        </div>
        <div class="pipe-stage pipe-adoptat">
          <div class="p-num">${c.adoptate.toLocaleString('ro-RO')}</div>
          <div class="p-lbl">Adoptate</div>
          <div class="p-pct" style="color:var(--blue-text)">${pct(c.adoptate,c.total)}%</div>
        </div>
        <div class="pipe-stage pipe-promulgat">
          <div class="p-num">${c.promulgate.toLocaleString('ro-RO')}</div>
          <div class="p-lbl">Promulgate</div>
          <div class="p-pct">${c.rate_promulgate}%</div>
        </div>
        <div class="pipe-stage pipe-respins">
          <div class="p-num">${c.respinse.toLocaleString('ro-RO')}</div>
          <div class="p-lbl">Respinse</div>
          <div class="p-pct" style="color:var(--red-text)">${pct(c.respinse,c.total)}%</div>
        </div>
      </div>

      <div class="cards">
        <div class="card"><div class="num">${c.total.toLocaleString('ro-RO')}</div><div class="lbl">Total proiecte</div></div>
        <div class="card"><div class="num" style="color:var(--green-text)">${c.rate_promulgate}%</div><div class="lbl">Rată promulgare</div></div>
        <div class="card"><div class="num">${c.urgente}</div><div class="lbl">Procedură urgență</div></div>
        <div class="card"><div class="num">${tipPL.toLocaleString('ro-RO')}</div><div class="lbl">Propuneri legislative</div></div>
        <div class="card"><div class="num">${tipLL.toLocaleString('ro-RO')}</div><div class="lbl">Proiecte de lege</div></div>
      </div>

      <div class="grid2">
        <div class="section">
          <h2>Rată promulgare pe inițiator</h2>
          <table>
            <thead><tr><th></th><th>Inițiator</th><th class="num">Total</th><th class="num">Promulgate</th><th>Rată</th></tr></thead>
            <tbody>${partyRows}</tbody>
          </table>
        </div>
        <div>
          <div class="section">
            <h2>Cameră decizională</h2>
            <table>
              <thead><tr><th>Cameră</th><th class="num">Total</th><th class="num">%</th></tr></thead>
              <tbody>${cameraRows}</tbody>
            </table>
          </div>
          <div class="section">
            <h2>Evoluție lunară înregistrări</h2>
            ${monthChart(d.monthly)}
          </div>
        </div>
      </div>
    `;
  }catch(e){
    document.getElementById('content').innerHTML=
      `<div class="error">Nu pot încărca ${DATA_URL} (${e.message}).<br>Rulează <code>python scripts/build_proiecte_stats.py --leg ${LEG}</code>.</div>`;
  }
}
load();
</script>
<script src="i18n.js"></script>
</body>
</html>
